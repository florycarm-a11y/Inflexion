el.style.setProperty('--scroll',p)
el.querySelector('.hero-content').style.transform=`translateY(${p*40}px)`

}
window.addEventListener('scroll',onScroll,{passive:true})

},[])

   h('h2',null,'I. Dix-neuf ans pour un accord\u00a0: chronologie du FTA UE-Inde'),
   h('p',null,
    'L\u2019histoire de l\u2019accord de libre-\u00e9change UE-Inde est celle d\u2019un marathon diplomatique. Les n\u00e9gociations d\u00e9butent en ',h('strong',null,'juin\u00a02007'),', port\u00e9es par un optimisme post-mondialisation. Mais les divergences s\u2019accumulent\u00a0: protection des appellations d\u2019origine europ\u00e9ennes, acc\u00e8s au march\u00e9 des services, propri\u00e9t\u00e9 intellectuelle. En ',h('strong',null,'2013'),', les n\u00e9gociations sont officiellement suspendues. L\u2019Inde de Narendra Modi, \u00e9lue en 2014, privil\u00e9gie les accords bilat\u00e9raux et le programme \u00ab\u00a0Make in India\u00a0\u00bb.'
   ),
   h('p',null,
    'La relance survient en ',h('strong',null,'mai\u00a02022'),', lors du sommet UE-Inde \u00e0 Porto. Le contexte g\u00e9opolitique a radicalement chang\u00e9\u00a0: la guerre en Ukraine r\u00e9v\u00e8le la d\u00e9pendance europ\u00e9enne \u00e0 la Russie, la strat\u00e9gie ',h('strong',null,'China+1'),' pousse les industriels occidentaux \u00e0 diversifier leurs cha\u00eenes d\u2019approvisionnement, et les ',h('strong',null,'tarifs Trump'),' (jusqu\u2019\u00e0 50\u00a0% sur les produits indiens) incitent New Delhi \u00e0 chercher des partenaires alternatifs. Les n\u00e9gociations reprennent \u00e0 un rythme acc\u00e9l\u00e9r\u00e9\u00a0: 14\u00a0rounds formels, dont le ',h('strong',null,'14e en octobre\u00a02025'),', qui scelle les derni\u00e8res concessions.'
   ),
   h('p',null,
    'Le ',h('strong',null,'27\u00a0janvier\u00a02026'),', \u00e0 Hyderabad House \u00e0 New Delhi, les deux parties annoncent la conclusion de l\u2019accord. ',h('strong',null,'20 des 24\u00a0chapitres'),' sont pleinement agr\u00e9\u00e9s. Al Jazeera qualifie le FTA de \u00ab\u00a0',h('em',null,'mother of all deals'),'\u00a0\u00bb \u2014 un accord couvrant un march\u00e9 de plus de 2\u00a0milliards de personnes (source\u00a0: ec.europa.eu, CNBC, Al Jazeera, India Briefing).'
   ),
   h('p',null,
    'Le contexte am\u00e9ricain a jou\u00e9 un r\u00f4le d\u00e9terminant. Le 2\u00a0f\u00e9vrier\u00a02026, les \u00c9tats-Unis et l\u2019Inde signent un accord r\u00e9duisant les ',h('strong',null,'tarifs am\u00e9ricains de 50\u00a0% \u00e0 18\u00a0%'),', en \u00e9change d\u2019achats accrus de produits am\u00e9ricains. Mais l\u2019instabilit\u00e9 de la politique commerciale de Trump \u2014 qui a menac\u00e9 la Cor\u00e9e du Sud apr\u00e8s un accord similaire \u2014 renforce l\u2019attrait d\u2019un ancrage europ\u00e9en stable pour l\u2019Inde.'
   ),

   // II. Contenu de l'accord
   h('h2',null,'II. Ce que contient l\u2019accord\u00a0: secteur par secteur'),
   h('h3',null,'Exports europ\u00e9ens vers l\u2019Inde'),
   h('p',null,
    'L\u2019accord \u00e9limine les tarifs sur ',h('strong',null,'96,6\u00a0% des biens export\u00e9s par l\u2019UE vers l\u2019Inde'),'. Les secteurs cl\u00e9s\u00a0: l\u2019Inde r\u00e9duit ses droits de douane sur les ',h('strong',null,'automobiles europ\u00e9ennes'),' (actuellement 60\u00a0\u00e0\u00a0100\u00a0% selon les segments), les ',h('strong',null,'produits agricoles transform\u00e9s'),' (vins, fromages hors appellations prot\u00e9g\u00e9es, huile d\u2019olive), les \u00e9quipements industriels et les biens de haute technologie. Pour les constructeurs automobiles fran\u00e7ais \u2014 Renault, Stellantis \u2014 c\u2019est un acc\u00e8s au ',h('strong',null,'troisi\u00e8me plus grand march\u00e9 automobile mondial'),' \u00e0 des conditions enfin comp\u00e9titives (source\u00a0: ec.europa.eu, India Briefing).'
   ),
   h('h3',null,'Exports indiens vers l\u2019UE'),
   h('p',null,
    'En contrepartie, l\u2019UE r\u00e9duit ses tarifs sur les ',h('strong',null,'textiles, le cuir, les produits de la mer, les pierres pr\u00e9cieuses et la joaillerie'),' indiens. Ces secteurs repr\u00e9sentent une part significative de l\u2019emploi industriel indien et constituaient le principal levier de n\u00e9gociation de New Delhi. Le chapitre services, particuli\u00e8rement sensible, pr\u00e9voit une lib\u00e9ralisation progressive des services IT et de la mobilit\u00e9 des professionnels indiens en Europe (source\u00a0: ECIPE, DLA Piper).'
   ),
   h('h3',null,'Les exclusions strat\u00e9giques'),
   h('p',null,
    'Contrairement au trait\u00e9 UE-Mercosur, le FTA UE-Inde a ',h('strong',null,'exclu les secteurs agricoles les plus sensibles'),' \u2014 b\u0153uf, produits laitiers, volaille. Cette d\u00e9cision est calcul\u00e9e\u00a0: elle \u00e9vite de r\u00e9p\u00e9ter le blocage politique qui a paralyse\u0301 le Mercosur au Parlement europ\u00e9en sous la pression des lobbies agricoles fran\u00e7ais et irlandais. La coop\u00e9ration r\u00e9glementaire couvre les normes SPS (sanitaires et phytosanitaires) et la reconnaissance mutuelle de certaines certifications industrielles.'
   ),

   h('div',{className:'insight-box not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#006650] mb-2'},'Inflexion Insight'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Contrairement au Mercosur, le FTA UE-Inde a exclu les secteurs agricoles sensibles (b\u0153uf, produits laitiers), ',h('strong',null,'r\u00e9duisant consid\u00e9rablement le risque de blocage politique au Parlement europ\u00e9en'),'. La strat\u00e9gie de n\u00e9gociation diff\u00e8re radicalement\u00a0: sacrifier quelques pourcents de couverture tarifaire pour s\u00e9curiser la ratification.'
    )
   ),

   h('h3',null,'Le point de friction\u00a0: CBAM et conventions OIT'),
   h('p',null,
    'Deux tensions structurelles persistent. Le ',h('strong',null,'m\u00e9canisme d\u2019ajustement carbone aux fronti\u00e8res (CBAM)'),' de l\u2019UE, entr\u00e9 en phase transitoire en 2026, pourrait cr\u00e9er une taxation de facto sur les exportations indiennes d\u2019acier, d\u2019aluminium et de ciment \u2014 annulant partiellement les r\u00e9ductions tarifaires. Par ailleurs, le Parlement europ\u00e9en examinera le respect par l\u2019Inde des ',h('strong',null,'conventions fondamentales de l\u2019OIT'),', un sujet qui a d\u00e9j\u00e0 ralenti l\u2019accord avec le Vietnam (source\u00a0: Sullivan & Cromwell, HSF Kramer, EPC).'
   ),

   // III. Ratification
   h('h2',null,'III. Ratification\u00a0: le dernier obstacle'),
   h('p',null,
    'La conclusion de l\u2019accord n\u2019est que la premi\u00e8re \u00e9tape. Le processus de ratification implique trois validations distinctes. C\u00f4t\u00e9 europ\u00e9en\u00a0: le ',h('strong',null,'Conseil de l\u2019UE'),' (vote \u00e0 la majorit\u00e9 qualifi\u00e9e) et le ',h('strong',null,'Parlement europ\u00e9en'),' (vote de consentement, n\u00e9cessitant une majorit\u00e9 simple). C\u00f4t\u00e9 indien\u00a0: le ',h('strong',null,'Union Council of Ministers'),' doit approuver formellement le texte (source\u00a0: ec.europa.eu, DLA Piper).'
   ),
   h('p',null,
    'Un \u00e9l\u00e9ment crucial\u00a0: l\u2019Inde ',h('strong',null,'ne pratique pas l\u2019application provisoire'),' des trait\u00e9s commerciaux. Contrairement \u00e0 ce qui s\u2019est pass\u00e9 avec le CETA (UE-Canada), o\u00f9 une application provisoire a permis d\u2019activer l\u2019essentiel de l\u2019accord d\u00e8s 2017 sans attendre la ratification compl\u00e8te par tous les parlements nationaux, rien ne s\u2019appliquera avant la ratification int\u00e9grale par les deux parties. Cela signifie qu\u2019aucune r\u00e9duction tarifaire ne prendra effet avant la conclusion de tout le processus.'
   ),
   h('p',null,
    'Le calendrier r\u00e9aliste\u00a0: le ',h('strong',null,'Conseil pourrait voter d\u2019ici la fin 2026'),', le Parlement europ\u00e9en n\u00e9cessitera au moins un an d\u2019examen en commission (INTA), le processus indien est g\u00e9n\u00e9ralement plus rapide. ',h('strong',null,'Mise en \u0153uvre attendue\u00a0: d\u00e9but 2027 au plus t\u00f4t'),'. Les risques de d\u00e9lai\u00a0: d\u00e9bats sur les conventions OIT, tensions li\u00e9es au CBAM, \u00e9lections europ\u00e9ennes de 2029 qui pourraient repousser si le processus s\u2019\u00e9ternise.'
   ),

   // IV. Trait\u00e9 fiscal
   h('h2',null,'IV. Le trait\u00e9 fiscal France-Inde\u00a0: autopsie d\u2019une refonte historique'),
   h('p',null,
    'Parall\u00e8lement au FTA, un \u00e9v\u00e9nement de port\u00e9e peut-\u00eatre sup\u00e9rieure pour les entreprises fran\u00e7aises s\u2019est produit en f\u00e9vrier\u00a02026\u00a0: la ',h('strong',null,'r\u00e9\u00e9criture compl\u00e8te du trait\u00e9 de double imposition France-Inde'),'. Le texte original, sign\u00e9 il y a 34\u00a0ans, \u00e9tait devenu obsol\u00e8te face \u00e0 l\u2019\u00e9volution des structures d\u2019investissement, au d\u00e9veloppement de l\u2019\u00e9conomie num\u00e9rique et aux standards BEPS de l\u2019OCDE. La visite d\u2019\u00c9tat de Macron en Inde (17-19\u00a0f\u00e9vrier), qui a \u00e9lev\u00e9 la relation bilat\u00e9rale au rang de \u00ab\u00a0',h('em',null,'Special Global Strategic Partnership'),'\u00a0\u00bb avec plus de 20\u00a0accords sign\u00e9s, a fourni le cadre politique pour finaliser cette refonte (source\u00a0: \u00c9lys\u00e9e, DD News, Eurasia Review).'
   ),

   h('h3',null,'Dividendes\u00a0: le changement majeur'),
   h('p',null,
    'Ancien r\u00e9gime\u00a0: taux unique de ',h('strong',null,'10\u00a0%'),' de retenue \u00e0 la source, quelle que soit la participation. Nouveau r\u00e9gime\u00a0: ',h('strong',null,'5\u00a0%'),' si l\u2019actionnaire d\u00e9tient ',h('strong',null,'\u226510\u00a0% du capital'),' de la soci\u00e9t\u00e9 distributrice, ',h('strong',null,'15\u00a0%'),' dans les autres cas. La logique est claire\u00a0: favoriser l\u2019investissement direct strat\u00e9gique au d\u00e9triment de l\u2019investissement de portefeuille (source\u00a0: EY India, Business Today, India Briefing).'
   ),

   h('h3',null,'Plus-values\u00a0: basculement des droits d\u2019imposition'),
   h('p',null,
    'Le nouveau protocole accorde les ',h('strong',null,'droits d\u2019imposition pleins au pays de r\u00e9sidence de la soci\u00e9t\u00e9'),'. Concr\u00e8tement\u00a0: une entreprise fran\u00e7aise c\u00e9dant sa participation dans une filiale indienne sera impos\u00e9e en France, pas en Inde. C\u2019est un renversement qui s\u00e9curise les strat\u00e9gies de d\u00e9sinvestissement et am\u00e9liore la pr\u00e9visibilit\u00e9 fiscale des op\u00e9rations de M&A transfrontalier.'
   ),

   h('h3',null,'Service PE\u00a0: le pi\u00e8ge pour les PME'),
   h('p',null,
    'Le nouveau trait\u00e9 introduit une disposition cl\u00e9\u00a0: les services fournis au-del\u00e0 d\u2019un ',h('strong',null,'certain seuil d\u00e9clenchent un \u00e9tablissement stable (PE)'),' en Inde. Cons\u00e9quence directe\u00a0: les cabinets de conseil, les SSII et les prestataires de services fran\u00e7ais intervenant r\u00e9guli\u00e8rement en Inde pourront \u00eatre consid\u00e9r\u00e9s comme y ayant un \u00e9tablissement stable \u2014 et donc \u00eatre soumis \u00e0 l\u2019imp\u00f4t sur les soci\u00e9t\u00e9s indien. Les structures de facturation devront imp\u00e9rativement \u00eatre revues (source\u00a0: EY India, International Tax Review).'
   ),

   h('h3',null,'Redevances techniques et clause MFN'),
   h('p',null,
    'Le taux de ',h('strong',null,'10\u00a0% sur les redevances de services techniques est maintenu'),', mais la d\u00e9finition est resserr\u00e9e, align\u00e9e sur le trait\u00e9 Inde-\u00c9tats-Unis. Surtout, la ',h('strong',null,'clause de la nation la plus favoris\u00e9e (MFN) est supprim\u00e9e'),'. Cette clause avait g\u00e9n\u00e9r\u00e9 des litiges all\u00e9s jusqu\u2019\u00e0 la Cour supr\u00eame indienne\u00a0: des entreprises fran\u00e7aises invoquaient les taux plus favorables n\u00e9goci\u00e9s par d\u2019autres pays de l\u2019OCDE avec l\u2019Inde. La suppression met fin \u00e0 cette ins\u00e9curit\u00e9 juridique, au prix d\u2019un abandon de levier pour les investisseurs fran\u00e7ais (source\u00a0: Business Standard, The Week).'
   ),

   h('h3',null,'\u00c9change d\u2019informations et assistance au recouvrement'),
   h('p',null,
    'Le nouveau protocole int\u00e8gre les standards ',h('strong',null,'OCDE/BEPS'),' d\u2019\u00e9change d\u2019informations fiscales renforc\u00e9 et introduit un nouvel article sur l\u2019',h('strong',null,'assistance au recouvrement des cr\u00e9ances fiscales'),' entre les deux pays. Ce dispositif permet \u00e0 l\u2019administration fiscale fran\u00e7aise de demander \u00e0 son homologue indienne de recouvrer une cr\u00e9ance fiscale pour son compte, et inversement. Le protocole entrera en vigueur apr\u00e8s les proc\u00e9dures l\u00e9gales internes dans les deux pays (source\u00a0: EY India, India Briefing).'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Inflexion Insight \u2014 Impact chiffr\u00e9'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Pour une PME fran\u00e7aise d\u00e9tenant \u226510\u00a0% d\u2019une filiale indienne, le nouveau taux de ',h('strong',null,'5\u00a0% sur dividendes (vs 10\u00a0% avant) am\u00e9liore le rendement net de ~5,6\u00a0%'),' \u2014 un diff\u00e9rentiel qui peut justifier une implantation directe plut\u00f4t qu\u2019un simple export. Sur un dividende de \u20ac1\u00a0million, l\u2019\u00e9conomie annuelle est de \u20ac50\u00a0000.'
    )
   ),

   // V. Impact entreprises fran\u00e7aises
   h('h2',null,'V. Impact pour les entreprises fran\u00e7aises\u00a0: qui gagne, qui perd'),

   h('h3',null,'Les gagnants\u00a0: automobile, mat\u00e9riaux, luxe, a\u00e9ronautique'),
   h('p',null,
    h('strong',null,'Automobile'),' \u2014 Renault (pr\u00e9sent en Inde via sa JV avec Nissan \u00e0 Chennai) et Stellantis b\u00e9n\u00e9ficieront de la r\u00e9duction des tarifs douaniers qui rendent enfin les v\u00e9hicules europ\u00e9ens comp\u00e9titifs face aux acteurs locaux (Tata, Mahindra) et cor\u00e9ens (Hyundai). ',h('strong',null,'Mat\u00e9riaux de construction'),' \u2014 Saint-Gobain, d\u00e9j\u00e0 implant\u00e9 au Tamil Nadu (usines de verre plat et de pl\u00e2tre), verra ses co\u00fbts d\u2019importation de composants sp\u00e9cialis\u00e9s depuis l\u2019Europe baisser. ',h('strong',null,'Luxe et vins'),' \u2014 La r\u00e9duction des droits sur les produits agricoles transform\u00e9s ouvre le march\u00e9 indien aux vins fran\u00e7ais (actuellement tax\u00e9s \u00e0 150\u00a0%). ',h('strong',null,'A\u00e9ronautique'),' \u2014 Dassault Aviation (+14,2\u00a0%), Safran (+8,7\u00a0%) et Airbus (+2,8\u00a0%) profitent de la dynamique bilat\u00e9rale, renforc\u00e9e par le corridor d\u00e9fense France-Inde (source\u00a0: Euronext, India Briefing).'
   ),

   h('h3',null,'Le Tamil Nadu\u00a0: hub fran\u00e7ais en Inde'),
   h('p',null,
    'Le Tamil Nadu est le point d\u2019ancrage des entreprises fran\u00e7aises en Inde. ',h('strong',null,'29\u00a0entreprises fran\u00e7aises'),' y ont leur si\u00e8ge indien\u00a0: Michelin, Renault, Saint-Gobain, Valeo, Vivendi. L\u2019\u00c9tat affiche un GSDP de ',h('strong',null,'~410\u00a0milliards\u00a0$'),' (2025-26), une croissance manufacturing de ',h('strong',null,'14,74\u00a0%'),' (3x la moyenne nationale), et repr\u00e9sente ',h('strong',null,'41\u00a0% des exportations \u00e9lectroniques indiennes'),'. Son objectif\u00a0: devenir une \u00e9conomie de $1\u00a0trillion d\u2019ici 2030. C\u2019est la deuxi\u00e8me plus grande \u00e9conomie r\u00e9gionale du pays (9,4\u00a0% du PIB indien). Le PMI manufacturing indien, \u00e0 ',h('strong',null,'56,9 en f\u00e9vrier\u00a02026'),', confirme la solidit\u00e9 de la dynamique industrielle et le positionnement China+1 de l\u2019Inde (source\u00a0: Tamil Nadu State Planning Commission, S&P Global).'
   ),

   h('h3',null,'Le pi\u00e8ge du Service PE'),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Alerte \u2014 Service PE'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Attention au nouveau Service PE\u00a0: les prestataires de services fran\u00e7ais intervenant r\u00e9guli\u00e8rement en Inde au-del\u00e0 du seuil fix\u00e9 ',h('strong',null,'d\u00e9clencheront un \u00e9tablissement stable \u2014 et donc une imposition locale'),'. Les cabinets de conseil, SSII et soci\u00e9t\u00e9s d\u2019ing\u00e9nierie doivent imp\u00e9rativement revoir leurs structures de facturation et la dur\u00e9e de leurs missions sur le territoire indien.'
    )
   ),

   h('h3',null,'Risque de change\u00a0: EUR/INR'),
   h('p',null,
    'Le taux EUR/INR, actuellement \u00e0 ',h('strong',null,'109,7'),', est anticip\u00e9 dans une fourchette de ',h('strong',null,'104 \u00e0 126'),' sur 2026. Cette volatilit\u00e9 potentielle de ~20\u00a0% est un param\u00e8tre cl\u00e9 pour la rentabilit\u00e9 des investissements directs. Les entreprises fran\u00e7aises exportant vers l\u2019Inde ou rapatriant des dividendes devront mettre en place des couvertures de change adapt\u00e9es.'
   ),
