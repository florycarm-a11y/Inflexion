   h('h2',null,'Th\u00e8se centrale'),
   h('p',null,
    'La crise sah\u00e9lienne de 2026 n\u2019est pas un \u00e9pisode de plus dans la s\u00e9rie d\u2019instabilit\u00e9s qui frappe la r\u00e9gion depuis 2012. C\u2019est une ',h('strong',null,'rupture structurelle \u00e0 triple dimension'),'\u00a0: s\u00e9curitaire (expansion jihadiste incontr\u00f4l\u00e9e), politique (pr\u00e9torianisme militaire institutionnalis\u00e9) et g\u00e9opolitique (basculement de l\u2019axe d\u2019alliance vers Moscou et P\u00e9kin). L\u2019Alliance des \u00c9tats du Sahel (AES) constitue un fait accompli\u00a0: la zone de souverainet\u00e9 fran\u00e7aise post-coloniale est d\u00e9finitivement r\u00e9volue. La question n\u2019est plus de savoir si la France peut revenir, mais ',h('strong',null,'comment elle peut prot\u00e9ger ses int\u00e9r\u00eats r\u00e9siduels'),' et se repositionner dans une architecture r\u00e9gionale en recomposition.'
   ),

   // Partie I
   h('h2',null,'I. Triple coup d\u2019\u00c9tat et Alliance des \u00c9tats du Sahel'),

   h('h3',null,'La s\u00e9quence pr\u00e9torienne'),
   h('p',null,
    'En ',h('strong',null,'ao\u00fbt 2020'),', le colonel Assimi Go\u00efta renverse Ibrahim Boubacar Ke\u00efta au Mali, avant de proc\u00e9der \u00e0 un second coup en mai 2021 pour \u00e9carter le gouvernement de transition civilo-militaire. En ',h('strong',null,'janvier puis septembre 2022'),', le capitaine Ibrahim Traor\u00e9 prend le pouvoir au Burkina Faso apr\u00e8s le renversement de Damiba, lui-m\u00eame auteur du putsch de janvier. En ',h('strong',null,'juillet 2023'),', le g\u00e9n\u00e9ral Abdourahamane Tchiani renverse le pr\u00e9sident \u00e9lu Mohamed Bazoum au Niger \u2014 le dernier alli\u00e9 d\u00e9mocratique de la France dans la r\u00e9gion (source\u00a0: ICG, IFRI).'
   ),
   h('p',null,
    'Ces coups d\u2019\u00c9tat partagent un sch\u00e9ma commun\u00a0: ',h('strong',null,'instrumentalisation du sentiment anti-fran\u00e7ais'),', discr\u00e9dit des \u00e9lites civiles accus\u00e9es de corruption et d\u2019inefficacit\u00e9 s\u00e9curitaire, promesses de souverainet\u00e9 retrouv\u00e9e. Dans les trois cas, les juntes ont b\u00e9n\u00e9fici\u00e9 d\u2019un soutien populaire initial significatif, nourri par la d\u00e9ception face \u00e0 l\u2019\u00e9chec des op\u00e9rations anti-terroristes internationales.'
   ),

   h('h3',null,'L\u2019AES\u00a0: un bloc de rupture'),
   h('p',null,
    'Le 16 septembre 2023, le Mali, le Niger et le Burkina Faso signent la ',h('strong',null,'Charte du Liptako-Gourma'),', cr\u00e9ant l\u2019Alliance des \u00c9tats du Sahel. Le 28 janvier 2024, les trois pays annoncent leur retrait de la CEDEAO, effectif en janvier 2025. L\u2019AES se dote d\u2019un passeport commun, d\u2019une banque d\u2019investissement projet\u00e9e et d\u2019un commandement militaire conjoint. En juillet 2024, la Conf\u00e9d\u00e9ration des \u00c9tats du Sahel est proclam\u00e9e \u00e0 Niamey, avec l\u2019ambition d\u2019\u00e9tendre le mod\u00e8le \u00e0 d\u2019autres \u00c9tats (source\u00a0: RFI, Le Monde Afrique).'
   ),
   h('p',null,
    'La sortie de la CEDEAO a des cons\u00e9quences \u00e9conomiques majeures\u00a0: perte d\u2019acc\u00e8s au m\u00e9canisme de r\u00e9gulation commerciale r\u00e9gionale, isolement bancaire (BCEAO), et vuln\u00e9rabilit\u00e9 accrue aux sanctions. Le Burkina et le Niger, pays enclav\u00e9s, d\u00e9pendent du port d\u2019Abidjan et de Cotonou pour leurs approvisionnements \u2014 un levier de pression que la CEDEAO conserve.'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Signal strat\u00e9gique'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'L\u2019AES n\u2019est pas une alliance d\u00e9fensive classique \u2014 c\u2019est un ',h('strong',null,'v\u00e9hicule de l\u00e9gitimation'),'. Les juntes instrumentalisent la souverainet\u00e9 r\u00e9gionale pour repousser ind\u00e9finiment tout calendrier de transition d\u00e9mocratique. Le pr\u00e9c\u00e9dent est dangereux pour l\u2019ensemble de l\u2019Afrique de l\u2019Ouest.'
    )
   ),

   // Partie II
   h('h2',null,'II. Crise s\u00e9curitaire\u00a0: l\u2019expansion jihadiste'),

   h('h3',null,'JNIM et EIGS\u00a0: deux menaces, une r\u00e9gion submerge\u00e9e'),
   h('p',null,
    'La zone sah\u00e9lienne enregistre ',h('strong',null,'7\u00a0200 \u00e9v\u00e9nements violents par an'),' selon ACLED, un niveau record. Deux mouvements dominent\u00a0: le ',h('strong',null,'JNIM'),' (Groupe de soutien \u00e0 l\u2019Islam et aux Musulmans, affili\u00e9 \u00e0 Al-Qa\u00efda) et l\u2019',h('strong',null,'EIGS'),' (\u00c9tat islamique au Grand Sahara). Le JNIM contr\u00f4le de facto de vastes zones rurales au centre du Mali et au nord du Burkina, imposant sa gouvernance, pr\u00e9levant des taxes et rendant la justice. L\u2019EIGS, plus brutal, op\u00e8re dans la zone des trois fronti\u00e8res et s\u2019\u00e9tend vers le sud (source\u00a0: ACLED, ISS Africa).'
   ),
   h('p',null,
    'Le ',h('strong',null,'massacre de Barsalogho'),' (ao\u00fbt 2024) illustre la catastrophe s\u00e9curitaire\u00a0: au moins 200 civils tu\u00e9s lors d\u2019une attaque du JNIM contre des volontaires pour la d\u00e9fense de la patrie (VDP) r\u00e9unis par l\u2019arm\u00e9e burkinab\u00e8. Human Rights Watch \u00e9voque l\u2019une des pires atrocit\u00e9s commises au Sahel. Ce massacre r\u00e9v\u00e8le l\u2019\u00e9chec de la strat\u00e9gie d\u2019armement des milices civiles comme substitut \u00e0 une arm\u00e9e professionnelle (source\u00a0: HRW, Le Monde Afrique).'
   ),

   h('h3',null,'Wagner/Africa Corps\u00a0: le remplacement fran\u00e7ais'),
   h('p',null,
    'Le retrait de la force Barkhane (2022) puis de Takuba (2023) a laiss\u00e9 un vide partiellement combl\u00e9 par le ',h('strong',null,'groupe Wagner'),' (devenu Africa Corps apr\u00e8s la mort de Prigojine). Au Mali, ',h('strong',null,'1\u00a0500 \u00e0 2\u00a0000 mercenaires'),' russes sont d\u00e9ploy\u00e9s, op\u00e9rant aux c\u00f4t\u00e9s des FAMa. Au Burkina, la pr\u00e9sence est estim\u00e9e \u00e0 300-400 \u00e9l\u00e9ments. Le mod\u00e8le est transactionnel\u00a0: s\u00e9curit\u00e9 (anti-insurrection, protection de la junte) contre acc\u00e8s aux ressources mini\u00e8res (or, uranium) (source\u00a0: SIPRI, IFRI).'
   ),
   h('p',null,
    'L\u2019efficacit\u00e9 de Wagner est contest\u00e9e. Le massacre de Moura (mars 2022, 300+ civils tu\u00e9s selon l\u2019ONU), attribu\u00e9 conjointement aux FAMa et Wagner, illustre une strat\u00e9gie de contre-insurrection fond\u00e9e sur la terreur plut\u00f4t que sur le contr\u00f4le territorial. Les pertes russes se multiplient\u00a0: en juillet 2024, une embuscade du JNIM \u00e0 Tinzaouatine (nord du Mali) a co\u00fbt\u00e9 la vie \u00e0 ',h('strong',null,'plus de 80 combattants Wagner'),', l\u2019une des plus lourdes d\u00e9faites du groupe (source\u00a0: Le Monde, ISS Africa).'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Risque critique'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'L\u2019expansion jihadiste ne se limite plus au Sahel. Le JNIM et l\u2019EIGS progressent vers les \u00c9tats c\u00f4tiers\u00a0: B\u00e9nin, Togo, Ghana, C\u00f4te d\u2019Ivoire. Le risque d\u2019un \u00ab\u00a0arc d\u2019instabilit\u00e9\u00a0\u00bb s\u2019\u00e9tendant du Sahel au golfe de Guin\u00e9e menace l\u2019ensemble de l\u2019architecture de s\u00e9curit\u00e9 ouest-africaine et les int\u00e9r\u00eats \u00e9conomiques europ\u00e9ens dans la r\u00e9gion.'
    )
   ),

   // Partie III
   h('h2',null,'III. Dimension sociale et environnementale'),

   h('h3',null,'Crise humanitaire\u00a0: 3 millions de d\u00e9plac\u00e9s'),
   h('p',null,
    'Le Burkina Faso concentre la crise humanitaire la plus aig\u00fc\u00e8 du Sahel avec ',h('strong',null,'plus de 2 millions de d\u00e9plac\u00e9s internes'),' \u2014 le pays comptant la croissance la plus rapide de d\u00e9placements forc\u00e9s au monde. Le Mali enregistre 400\u00a0000 d\u00e9plac\u00e9s, le Niger 350\u00a0000. Au total, plus de ',h('strong',null,'3 millions de personnes'),' ont fui leur foyer dans les trois pays. L\u2019ins\u00e9curit\u00e9 alimentaire touche ',h('strong',null,'16 millions de personnes'),' dans le Sahel central (source\u00a0: OCHA, PAM).'
   ),
   h('p',null,
    'Les blocus militaires aggravent la situation\u00a0: au Burkina, plusieurs localit\u00e9s sont assi\u00e9g\u00e9es par les groupes arm\u00e9s, sans acc\u00e8s humanitaire. Au Mali, les combats dans la r\u00e9gion de Kidal apr\u00e8s la reprise de la ville par les FAMa et Wagner (novembre 2023) ont provoqu\u00e9 le d\u00e9placement de dizaines de milliers de Touaregs vers l\u2019Alg\u00e9rie et la Mauritanie. Les camps de r\u00e9fugi\u00e9s sont d\u00e9bord\u00e9s et sous-financ\u00e9s.'
   ),

   h('h3',null,'Stress environnemental et d\u00e9mographie'),
   h('p',null,
    'Le Sahel est l\u2019une des r\u00e9gions les plus vuln\u00e9rables au changement climatique. Les temp\u00e9ratures augmentent ',h('strong',null,'1,5 fois plus vite que la moyenne mondiale'),'. Le stress hydrique s\u2019intensifie\u00a0: la saisonnalit\u00e9 des pluies devient impr\u00e9visible, les nappes phr\u00e9atiques s\u2019\u00e9puisent, les conflits agropastoraux (cultivateurs vs \u00e9leveurs) se multiplient. Le lac Tchad a perdu ',h('strong',null,'90\u00a0% de sa surface'),' en 50 ans (source\u00a0: PNUE, Banque mondiale).'
   ),
   h('p',null,
    'La d\u00e9mographie amplifie toutes les tensions. Le Niger affiche le ',h('strong',null,'taux de f\u00e9condit\u00e9 le plus \u00e9lev\u00e9 au monde'),' (6,7 enfants/femme). Le Burkina et le Mali d\u00e9passent 5 enfants/femme. La population des trois pays devrait passer de 70 millions (2025) \u00e0 ',h('strong',null,'130 millions d\u2019ici 2050'),'. Cette bombe d\u00e9mographique, dans un contexte de rarification des ressources et de gouvernance d\u00e9faillante, constitue un multiplicateur de risque structurel.'
   ),

   h('div',{className:'insight-box not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#006650] mb-2'},'Dynamique de fond'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le triptyque climat-d\u00e9mographie-gouvernance est le v\u00e9ritable moteur de la crise sah\u00e9lienne. Les coups d\u2019\u00c9tat et les guerres sont les sympt\u00f4mes d\u2019une fragilit\u00e9 structurelle que ni les arm\u00e9es nationales, ni Wagner, ni les interventions internationales n\u2019ont su traiter. Toute strat\u00e9gie de long terme doit int\u00e9grer ces param\u00e8tres.'
    )
   ),

   // Partie IV
   h('h2',null,'IV. G\u00e9opolitique des alliances\u00a0: le grand basculement'),

   h('h3',null,'Le pivot russe'),
   h('p',null,
    'La Russie est devenue le partenaire s\u00e9curitaire de r\u00e9f\u00e9rence des trois juntes. Au-del\u00e0 de Wagner/Africa Corps, Moscou fournit des \u00e9quipements militaires (h\u00e9licopt\u00e8res Mi-171, blinds, munitions), forme des officiers et offre une couverture diplomatique au Conseil de s\u00e9curit\u00e9 de l\u2019ONU. En \u00e9change, les compagnies russes acc\u00e8dent aux ',h('strong',null,'gisements aurifres du Mali'),' (premier producteur d\u2019or d\u2019Afrique de l\u2019Ouest) et aux ressources uranif\u00e8res du Niger (source\u00a0: SIPRI, Africa Intelligence).'
   ),
   h('p',null,
    'L\u2019axe Moscou-Sahel s\u2019inscrit dans la strat\u00e9gie russe de ',h('strong',null,'p\u00e9n\u00e9tration africaine'),'\u00a0: d\u00e9stabiliser l\u2019influence occidentale, s\u00e9curiser des ressources strat\u00e9giques, cr\u00e9er des bases d\u2019influence dans l\u2019arri\u00e8re-cour europ\u00e9enne. Cependant, la capacit\u00e9 russe \u00e0 fournir une alternative cr\u00e9dible \u00e0 l\u2019aide au d\u00e9veloppement occidentale reste limit\u00e9e\u00a0: Moscou n\u2019a ni les moyens financiers ni l\u2019expertise pour adresser les causes profondes de l\u2019instabilit\u00e9.'
   ),

   h('h3',null,'Le r\u00f4le chinois\u00a0: discret mais strat\u00e9gique'),
   h('p',null,
    'P\u00e9kin adopte une approche diff\u00e9rente\u00a0: investissements dans les infrastructures (routes, t\u00e9l\u00e9communications, \u00e9nergie), non-ing\u00e9rence proclam\u00e9e, relations pragmatiques avec tous les r\u00e9gimes. La Chine est le premier partenaire commercial du Niger et finance des projets de pipeline (p\u00e9trole nig\u00e9rien vers le port de S\u00e9m\u00e9, B\u00e9nin). L\u2019ouvrage du pipeline Niger-B\u00e9nin, ',h('strong',null,'2\u00a0000 km, 4 milliards de dollars'),', est op\u00e9r\u00e9 par CNPC (source\u00a0: Reuters, China-Global South Project).'
   ),

   h('h3',null,'Le retrait fran\u00e7ais\u00a0: chronique d\u2019une \u00e9viction'),
   h('p',null,
    'La France a \u00e9t\u00e9 expuls\u00e9e du Mali (f\u00e9vrier 2022, retrait Barkhane), du Burkina (f\u00e9vrier 2023, retrait des forces sp\u00e9ciales) et du Niger (d\u00e9cembre 2023, retrait des 1\u00a0500 soldats de la base de Niamey). L\u2019ambassadeur fran\u00e7ais a \u00e9t\u00e9 retenu \u00e0 Niamey avant d\u2019\u00eatre rappel\u00e9. Les relations diplomatiques sont au plus bas. Le ',h('strong',null,'sentiment anti-fran\u00e7ais'),', aliment\u00e9 par les r\u00e9seaux sociaux et les campagnes de d\u00e9sinformation (y compris russes), est d\u00e9sormais un fait structurel de la politique sah\u00e9lienne (source\u00a0: IFRI, Le Monde).'
   ),

   h('h3',null,'L\u2019axe Ankara-Moscou et la recomposition r\u00e9gionale'),
   h('p',null,
    'La Turquie renforce sa pr\u00e9sence au Sahel via la vente de drones Bayraktar TB2 au Niger et au Burkina, le d\u00e9ploiement de programmes de coop\u00e9ration militaire et l\u2019expansion de la TIKA (agence de coop\u00e9ration turque). Ankara et Moscou, bien que rivaux en Libye et en Syrie, convergent au Sahel sur un objectif commun\u00a0: ',h('strong',null,'r\u00e9duire l\u2019espace occidental'),'. L\u2019AES vs CEDEAO cristallise un affrontement plus large entre mod\u00e8les de gouvernance\u00a0: souverainet\u00e9 autoritaire vs int\u00e9gration r\u00e9gionale d\u00e9mocratique (source\u00a0: ISS Africa, SIPRI).'
   ),

      ),

     )
    )

   h('h3',null,'Uranium\u00a0: la vuln\u00e9rabilit\u00e9 Orano'),
   h('p',null,
    'Le Niger fournissait environ ',h('strong',null,'15\u00a0% de l\u2019uranium import\u00e9 par la France'),' via les sites d\u2019Orano (ex-Areva) \u00e0 Arlit et Akouta. Le permis d\u2019exploitation d\u2019Imouraren, ',h('strong',null,'l\u2019un des plus grands gisements au monde'),' (5\u00a0000 tonnes de r\u00e9serves), a \u00e9t\u00e9 r\u00e9voqu\u00e9 par la junte en juin 2024. La mine d\u2019Arlit (SOMAÏR) op\u00e8re en mode d\u00e9grad\u00e9, les expatri\u00e9s ont \u00e9t\u00e9 largement rapatri\u00e9s. Le risque de nationalisation compl\u00e8te des actifs Orano est \u00e9lev\u00e9, sur le mod\u00e8le des d\u00e9cisions maliennes et burkinab\u00e8 concernant les mines d\u2019or (source\u00a0: Reuters, Le Monde, Africa Intelligence).'
   ),

   h('h3',null,'Recommandations op\u00e9rationnelles'),
   h('p',null,
    h('strong',null,'Imm\u00e9diat (0-3 mois)'),' \u2014 Cartographier tous les actifs et personnels fran\u00e7ais r\u00e9siduels dans la zone AES. Activer les plans de continuit\u00e9 pour les approvisionnements uranif\u00e8res. Renforcer la veille s\u00e9curitaire sur les \u00c9tats c\u00f4tiers (B\u00e9nin, Togo, C\u00f4te d\u2019Ivoire). Engager un dialogue discret avec les autorit\u00e9s de transition via des canaux tiers (Alg\u00e9rie, Mauritanie).'
   ),
   h('p',null,
    h('strong',null,'Court terme (3-12 mois)'),' \u2014 Diversifier les sources d\u2019uranium (acc\u00e9l\u00e9rer les partenariats Kazakhstan/Cameco, Australie). Repositionner la pr\u00e9sence militaire fran\u00e7aise vers les \u00c9tats c\u00f4tiers partenaires (C\u00f4te d\u2019Ivoire, S\u00e9n\u00e9gal). Soutenir la CEDEAO dans sa strat\u00e9gie de r\u00e9int\u00e9gration. Investir dans la lutte informationnelle pour contrer les narratifs anti-fran\u00e7ais.'
