# Inflexion — Pipeline de briefing unifié (marché + stratégique + RAG)
# Remplace generate-daily-briefing.yml + analyze-sentiment.yml
#
# Ce workflow :
# 1. Génère l'analyse marché consolidée (sentiment + alertes + macro + briefing)
# 2. Archive le briefing précédent dans data/briefing-history/
# 3. Indexe les articles dans le store RAG
# 4. Génère le briefing stratégique avec contexte RAG + sentiment frais
# 5. Indexe le briefing produit dans le store RAG
#
# Tourne QUOTIDIENNEMENT (pas de filtre jour de la semaine)
# Coût : ~3 appels Haiku/jour + 1 Sonnet le lundi
#
# Prérequis :
#   - ANTHROPIC_API_KEY dans GitHub Secrets
#   - PAT_TOKEN dans GitHub Secrets
#   - data/news.json + data de marché (générés par fetch-data.yml)

name: "🧠 Generate Unified Briefing"

on:
  # Déclenché automatiquement après fetch-data (données marché fraîches)
  workflow_run:
    workflows: ["📊 Fetch Market Data"]
    types: [completed]

  # Exécution manuelle depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour committer les fichiers
permissions:
  contents: write

# Une seule exécution à la fois
concurrency:
  group: "generate-unified-briefing"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Ne s'exécuter que si fetch-data a réussi (ou si déclenché manuellement)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: "📥 Checkout du repo"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: "🟢 Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔄 Fetch latest commits (workflow_run may have stale checkout)"
        run: git fetch origin main && git reset --hard origin/main

      - name: "🔍 Vérifier la fraîcheur des données et l'absence de doublon"
        id: check-data
        run: |
          SHOULD_RUN=true

          # 1. Vérifier que les données sont fraîches (< 60 min)
          # Exécutions manuelles (workflow_dispatch) bypassen ce check
          NOW=$(date +%s)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ Exécution manuelle — checks de fraîcheur et doublon ignorés"
          else
            LAST_DATA_CHANGE=$(git log -1 --format="%ct" -- data/)
            DATA_AGE=$((NOW - LAST_DATA_CHANGE))
            echo "📊 Dernier commit data/ il y a ${DATA_AGE}s ($((DATA_AGE / 60)) min)"
            if [ $DATA_AGE -gt 3600 ]; then
              echo "⏭ Pas de nouvelles données (> 60 min)"
              SHOULD_RUN=false
            else
              echo "✅ Données fraîches détectées"
            fi

            # 2. Vérifier que le briefing n'a pas déjà été généré récemment (< 10h)
            if [ -f data/daily-briefing.json ]; then
              BRIEFING_DATE=$(node -e "try { const b = JSON.parse(require('fs').readFileSync('data/daily-briefing.json','utf8')); console.log(b.generated_at || b.date || ''); } catch(e) { console.log(''); }")
              if [ -n "$BRIEFING_DATE" ]; then
                LAST_BRIEFING=$(node -e "console.log(Math.floor(new Date('$BRIEFING_DATE').getTime()/1000))")
                BRIEFING_AGE=$((NOW - LAST_BRIEFING))
                echo "📊 Dernier briefing : $BRIEFING_DATE (il y a $((BRIEFING_AGE / 3600))h)"
                if [ $BRIEFING_AGE -lt 36000 ]; then
                  echo "⏭ Briefing déjà généré (< 10h) — skip"
                  SHOULD_RUN=false
                fi
              fi
            fi
          fi

          echo "data_changed=${SHOULD_RUN}" >> $GITHUB_OUTPUT
          echo "📊 SHOULD_RUN=${SHOULD_RUN}"

      - name: "🔄 Cache modèle transformers.js"
        uses: actions/cache@v4
        with:
          path: .cache/transformers
          key: transformers-all-MiniLM-L6-v2

      - name: "📚 RAG — Indexation des articles du jour"
        if: steps.check-data.outputs.data_changed == 'true'
        continue-on-error: true
        run: node scripts/rag-index.mjs --articles

      - name: "🧠 Pipeline unifié (marché + archivage + briefing stratégique)"
        if: steps.check-data.outputs.data_changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-unified-briefing.mjs

      - name: "📋 RAG — Indexation du briefing produit"
        if: steps.check-data.outputs.data_changed == 'true'
        continue-on-error: true
        run: node scripts/rag-index.mjs --briefing

      - name: "⏭ Génération ignorée — données inchangées"
        if: steps.check-data.outputs.data_changed != 'true'
        run: echo "Les données n'ont pas changé depuis la dernière exécution. Pipeline ignoré."

      - name: "📝 Commit et push"
        if: steps.check-data.outputs.data_changed == 'true'
        run: |
          git config user.name "Inflexion Bot"
          git config user.email "bot@inflexionhub.com"

          # Ajouter tous les fichiers produits par le pipeline
          [ -f data/sentiment.json ] && git add data/sentiment.json || true
          [ -f data/alerts.json ] && git add data/alerts.json || true
          [ -f data/macro-analysis.json ] && git add data/macro-analysis.json || true
          [ -f data/market-briefing.json ] && git add data/market-briefing.json || true
          [ -f data/daily-briefing.json ] && git add data/daily-briefing.json || true
          [ -d data/briefing-history ] && git add data/briefing-history/ || true
          [ -d data/rag ] && git add data/rag/ || true

          # Vérifier s'il y a des changements
          if git diff --staged --quiet; then
            echo "Aucun changement"
            exit 0
          fi

          # Commit avec timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "🧠 Pipeline unifié (marché + briefing + RAG) — ${TIMESTAMP}

          Analyse marché consolidée + briefing stratégique + archivage historique."

          # Push avec retry (en cas de conflit avec d'autres workflows)
          git checkout -- .
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push && break
            echo "⟳ Retry push $i/3..."
            sleep 5
          done
