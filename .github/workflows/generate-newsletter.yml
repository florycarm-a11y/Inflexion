# Inflexion — Newsletter hebdomadaire
# Exécuté chaque dimanche à 10h UTC
#
# Prérequis :
#   - ANTHROPIC_API_KEY dans GitHub Secrets
#   - PAT_TOKEN dans GitHub Secrets
#   - data/articles/ doit contenir les articles quotidiens de la semaine

name: "📰 Generate Weekly Newsletter"

on:
  schedule:
    # Chaque dimanche à 10h UTC
    - cron: '0 10 * * 0'

  # Exécution manuelle depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour créer une PR
permissions:
  contents: write
  pull-requests: write

# Une seule exécution à la fois
concurrency:
  group: "generate-newsletter"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout du repo"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: "🟢 Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔍 Vérifier l'absence de doublon"
        id: check-freshness
        run: |
          SHOULD_RUN=true
          NOW=$(date +%s)
          # Utilise la date interne du JSON (fiable en shallow clone) plutôt que git log
          if [ -f data/newsletter.json ]; then
            NEWSLETTER_DATE=$(node -e "try { const n = JSON.parse(require('fs').readFileSync('data/newsletter.json','utf8')); console.log(n.updated || n.generated_at || n.date || ''); } catch(e) { console.log(''); }")
            if [ -n "$NEWSLETTER_DATE" ]; then
              LAST_NEWSLETTER=$(node -e "console.log(Math.floor(new Date('$NEWSLETTER_DATE').getTime()/1000))")
              NEWSLETTER_AGE=$((NOW - LAST_NEWSLETTER))
              # Skip si newsletter générée il y a moins de 6 jours (518400s)
              if [ $NEWSLETTER_AGE -lt 518400 ]; then
                echo "⏭ Newsletter déjà générée il y a $((NEWSLETTER_AGE / 86400))j (< 6j) — skip"
                SHOULD_RUN=false
              else
                echo "📊 Dernière newsletter : $NEWSLETTER_DATE (il y a $((NEWSLETTER_AGE / 86400))j)"
              fi
            fi
          fi
          echo "should_run=${SHOULD_RUN}" >> $GITHUB_OUTPUT

      - name: "📰 Génération newsletter hebdomadaire"
        if: steps.check-freshness.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-newsletter.mjs

      - name: "⏭ Génération ignorée — newsletter récente"
        if: steps.check-freshness.outputs.should_run != 'true'
        run: echo "Newsletter déjà générée récemment. Génération ignorée."

      - name: "🔀 Créer une PR pour relecture"
        if: steps.check-freshness.outputs.should_run == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: |
            📰 Newsletter hebdomadaire — ${{ github.run_id }}

            Synthèse automatique de la semaine via Claude.
          title: "📰 Newsletter hebdomadaire — ${{ github.run_id }}"
          body: |
            ## Newsletter générée par IA

            Ce PR contient la newsletter hebdomadaire, générée automatiquement par Claude.

            **Fichier modifié :**
            - `data/newsletter.json` — synthèse de la semaine

            > À relire avant merge pour publication sur GitHub Pages.
          branch: ai/newsletter-hebdo
          delete-branch: true
          add-paths: |
            data/newsletter.json
