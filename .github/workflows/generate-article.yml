# Inflexion — Rédaction IA quotidienne & Classification
# Déclenché automatiquement après le succès de fetch-data (workflow_run)
#
# Prérequis :
#   - ANTHROPIC_API_KEY dans GitHub Secrets (console.anthropic.com)
#   - TAVILY_API_KEY dans GitHub Secrets (app.tavily.com — optionnel, enrichit les articles)
#   - PAT_TOKEN dans GitHub Secrets (pour committer)
#   - data/news.json doit exister (généré par fetch-data.yml)

name: "✍️ Generate Daily Article"

on:
  # Déclenché automatiquement après fetch-data
  workflow_run:
    workflows: ["📊 Fetch Market Data"]
    types: [completed]

  # Exécution manuelle depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour committer
permissions:
  contents: write

# Une seule exécution à la fois
concurrency:
  group: "generate-article"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Ne s'exécuter que si fetch-data a réussi (ou si déclenché manuellement/push)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: "📥 Checkout du repo"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: "🟢 Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔄 Fetch latest commits (workflow_run may have stale checkout)"
        run: git fetch origin main && git reset --hard origin/main

      - name: "🔍 Vérifier la fraîcheur des données et l'absence de doublon"
        id: check-data
        run: |
          SHOULD_RUN=true
          NOW=$(date +%s)

          # 1. Vérifier que les données sont fraîches (< 60 min)
          # Seulement pour les exécutions automatiques — les déclenchements manuels
          # (workflow_dispatch) bypassen ce check pour permettre de forcer la génération
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ Exécution manuelle — check de fraîcheur ignoré"
          else
            LAST_DATA_CHANGE=$(git log -1 --format="%ct" -- data/)
            DATA_AGE=$((NOW - LAST_DATA_CHANGE))
            echo "📊 Dernier commit data/ il y a ${DATA_AGE}s ($((DATA_AGE / 60)) min)"
            if [ $DATA_AGE -gt 3600 ]; then
              echo "⏭ Pas de nouvelles données (> 60 min)"
              SHOULD_RUN=false
            else
              echo "✅ Données fraîches détectées"
            fi
          fi

          # 2. Vérifier que l'article n'a pas déjà été généré récemment (< 10h)
          # Utilise la date interne du JSON (fiable) plutôt que git log (peu fiable en shallow clone)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ Exécution manuelle — check de doublon ignoré"
          elif [ -f data/article-du-jour.json ]; then
            ARTICLE_DATE=$(node -e "try { const a = JSON.parse(require('fs').readFileSync('data/article-du-jour.json','utf8')); console.log(a.generated_at || a.date || ''); } catch(e) { console.log(''); }")
            if [ -n "$ARTICLE_DATE" ]; then
              LAST_ARTICLE=$(node -e "console.log(Math.floor(new Date('$ARTICLE_DATE').getTime()/1000))")
              ARTICLE_AGE=$((NOW - LAST_ARTICLE))
              echo "📊 Dernier article : $ARTICLE_DATE (il y a $((ARTICLE_AGE / 3600))h)"
              if [ $ARTICLE_AGE -lt 36000 ]; then
                echo "⏭ Article déjà généré (< 10h) — skip"
                SHOULD_RUN=false
              fi
            else
              echo "📊 Aucune date valide dans l'article — régénération forcée"
            fi
          else
            echo "📊 Aucun article précédent trouvé"
          fi

          echo "data_changed=${SHOULD_RUN}" >> $GITHUB_OUTPUT
          echo "📊 SHOULD_RUN=${SHOULD_RUN}"

      - name: "🌐 Traduction des articles EN→FR"
        if: steps.check-data.outputs.data_changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/translate-articles.mjs

      - name: "✍️ Génération article + classification"
        if: steps.check-data.outputs.data_changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: "✅ Validation qualité de l'article"
        if: steps.check-data.outputs.data_changed == 'true'
        run: node scripts/validate-article.mjs

      - name: "⏭ Génération ignorée — données inchangées"
        if: steps.check-data.outputs.data_changed != 'true'
        run: echo "Les données n'ont pas changé depuis la dernière exécution. Génération ignorée."

      - name: "📝 Commit et push"
        if: steps.check-data.outputs.data_changed == 'true'
        run: |
          git config user.name "Inflexion Bot"
          git config user.email "bot@inflexionhub.com"

          # Ajouter les fichiers générés
          [ -f data/news.json ] && git add data/news.json || true
          [ -f data/article-du-jour.json ] && git add data/article-du-jour.json || true
          [ -d data/articles ] && git add data/articles/ || true

          # Vérifier s'il y a des changements
          if git diff --staged --quiet; then
            echo "Aucun changement"
            exit 0
          fi

          # Commit avec timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "✍️ Article du jour + classification — ${TIMESTAMP}

          Article de synthèse et classification des news générés par Claude."

          # Push avec retry (en cas de conflit concurrent)
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push && break
            echo "⟳ Retry push $i/3..."
            sleep 5
          done
