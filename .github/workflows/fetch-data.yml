# Inflexion — Workflow de récupération automatique des données
# Exécuté toutes les 6h + manuellement + à chaque push sur main
#
# APIs (15 sources) :
#   - CoinGecko (crypto) → sans clé
#   - Finnhub (marchés, VIX) → FINNHUB_API_KEY
#   - GNews (actualités) → GNEWS_API_KEY
#   - FRED (macro US, 10 séries) → FRED_API_KEY
#   - Alpha Vantage (forex, secteurs) → ALPHA_VANTAGE_API_KEY
#   - Messari (crypto avancé) → MESSARI_API_KEY
#   - Twelve Data (indices européens) → TWELVE_DATA_API_KEY
#   - NewsAPI (news complémentaires) → NEWSAPI_API_KEY
#   - World Bank (macro internationale) → sans clé
#   + Traduction EN→FR (Claude Haiku) → ANTHROPIC_API_KEY (optionnel)
#   - Alternative.me, DefiLlama, ECB, Mempool.space, metals.dev, Etherscan → sans clé
#
# Flux RSS (157 sources spécialisées, sans clé) :
#   🌍 Géopolitique (21) : France 24, BBC, Al Jazeera, Brookings, CFR, CSIS, Carnegie...
#   📈 Marchés (25) : MarketWatch, Yahoo Finance, Wolf Street, BIS, IMF Blog, WEF, OECD...
#   ₿ Crypto (14) : Cryptoast, Journal du Coin, Blockworks, Unchained, Chainalysis...
#   ⛏️ Commodités (19) : OilPrice, Rigzone, MetalMiner, IEA, IRENA, Carbon Brief...
#   🤖 IA & Tech (18) : TechCrunch, IEEE Spectrum, Krebs, BleepingComputer, The Register...
#   🇪🇺 Politique EU & Tech (18) : Bruegel, CEPS, ECFR, Euractiv, AlgorithmWatch, CNIL...
#   🛡️ Défense & Stratégie (12) : RUSI, RAND, CNAS, Bellingcat, Defense One, Lawfare...
#   🌐 Think tanks non-occidentaux (4) : ORF India, ISS Africa, ISEAS Singapore, NTI
#   + autres sources thématiques
#
# Résultat : fichiers JSON dans /data/ committés et déployés automatiquement

name: "📊 Fetch Market Data"

on:
  schedule:
    # 2 fois par jour (UTC) : 06h et 18h
    - cron: '0 6,18 * * *'

  # Exécution manuelle depuis l'onglet Actions
  workflow_dispatch:

  # Exécuter aussi au push sur main (pour les premiers tests)
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-data.mjs'
      - '.github/workflows/fetch-data.yml'

# Permissions nécessaires pour committer les fichiers JSON
permissions:
  contents: write

# Une seule exécution à la fois
concurrency:
  group: "fetch-data"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout du repo"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: "🟢 Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: "📦 Installation des dépendances"
        run: npm ci

      - name: "📊 Récupération des données"
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          MESSARI_API_KEY: ${{ secrets.MESSARI_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: node scripts/fetch-data.mjs

      # Traduction EN→FR déplacée dans generate-article.yml (évite les doublons)

      - name: "📝 Commit et push des données"
        run: |
          git config user.name "Inflexion Bot"
          git config user.email "bot@inflexionhub.com"

          # Vérifier s'il y a des changements
          git add data/
          if git diff --staged --quiet; then
            echo "Aucun changement dans les données"
            exit 0
          fi

          # Commit avec timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "📊 Données mises à jour — ${TIMESTAMP}

          Mise à jour automatique des données marché, crypto et actualités.
          Prochaine mise à jour dans ~6h."

          git push

      - name: "🚀 Trigger Master Routine"
        if: success()
        env:
          ROUTINE_WEBHOOK_TOKEN: ${{ secrets.ROUTINE_WEBHOOK_TOKEN }}
          ROUTINE_MASTER_URL: ${{ secrets.ROUTINE_MASTER_URL }}
        run: |
          if [ -z "$ROUTINE_WEBHOOK_TOKEN" ] || [ -z "$ROUTINE_MASTER_URL" ]; then
            echo "⚠️ ROUTINE_WEBHOOK_TOKEN ou ROUTINE_MASTER_URL non défini — skip trigger (fallback schedule gère)"
            exit 0
          fi
          curl -X POST "$ROUTINE_MASTER_URL" \
            -H "Authorization: Bearer $ROUTINE_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"trigger_source\":\"fetch-data-success\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            --fail --retry 3 --retry-delay 10 \
            || echo "⚠️ Routine trigger failed, fallback schedule will handle"

      - name: "🚨 Alerte d'échec"
        if: failure()
        run: |
          echo "::error::Le workflow '${{ github.workflow }}' a échoué!"
          echo "Branche: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # --- Webhook Discord (décommenter et ajouter DISCORD_WEBHOOK_URL dans les secrets) ---
          # curl -s -H "Content-Type: application/json" \
          #   -d "{\"content\": \"🚨 **${{ github.workflow }}** a échoué sur \`${{ github.ref_name }}\`\nCommit: ${{ github.sha }}\nLogs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          #   "${{ secrets.DISCORD_WEBHOOK_URL }}"
          # --- Webhook Slack (décommenter et ajouter SLACK_WEBHOOK_URL dans les secrets) ---
          # curl -s -X POST -H "Content-Type: application/json" \
          #   -d "{\"text\": \"🚨 *${{ github.workflow }}* a échoué sur \`${{ github.ref_name }}\`\nCommit: ${{ github.sha }}\nLogs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          #   "${{ secrets.SLACK_WEBHOOK_URL }}"
