name: Audit linguistique français

on:
  pull_request:
    branches-ignore:
      - 'ai/**'
    paths:
      - '*.html'
      - 'app.js'
      - 'data-loader.js'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-francais:
    name: Vérification du français
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/check-french.py

      - name: Installer les dépendances
        run: pip install anthropic

      - name: Lancer l'audit linguistique
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/check-french.py --json > audit-results.json

      - name: Afficher les résultats
        if: always()
        run: |
          if [ ! -f audit-results.json ]; then
            echo '{"_info": "Aucun résultat généré"}' > audit-results.json
          fi
          echo "## Résultats de l'audit linguistique" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json, sys
          try:
              with open('audit-results.json') as f:
                  results = json.load(f)
              if '_info' in results:
                  print(f"> ⚠️ {results['_info']}")
                  print()
                  print("Pour activer l'audit, ajoutez le secret `ANTHROPIC_API_KEY` dans")
                  print("**Settings → Secrets and variables → Actions**.")
              else:
                  for page, report in results.items():
                      print(f"### 📄 {page}")
                      print(report)
                      print()
          except Exception as e:
              print(f"Erreur de lecture du rapport : {e}")
          PYEOF

      - name: Sauvegarder le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-linguistique
          path: audit-results.json
