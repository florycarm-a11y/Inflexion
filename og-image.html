<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OG Image — Inflexion</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#888;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif}

.og{
  width:1200px;
  height:630px;
  background:#06402A;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 90px;
}

/* Glow */
.glow{
  position:absolute;
  top:-150px;right:-100px;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(27,107,74,.20) 0%,transparent 70%);
  pointer-events:none;
}
.glow-2{
  position:absolute;
  bottom:-200px;left:-80px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(27,107,74,.10) 0%,transparent 70%);
  pointer-events:none;
}

/* Grid pattern */
.grid-pattern{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* Top bar */
.top-bar{
  position:absolute;
  top:0;left:0;right:0;
  height:4px;
  background:linear-gradient(90deg,#006650,#2A9D6E,#34d399,#2A9D6E,#006650);
}

/* Logo */
.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:40px;
}
.logo img{
  height:50px;
  filter:brightness(5) saturate(0.3);
}

/* Eyebrow */
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 16px;
  border-radius:100px;
  border:1px solid rgba(255,255,255,.12);
  font-size:13px;
  font-weight:500;
  color:rgba(255,255,255,.45);
  letter-spacing:0.5px;
  margin-bottom:32px;
}
.eyebrow .dot{
  width:6px;height:6px;
  border-radius:50%;
  background:#34d399;
}

/* Title */
.title{
  font-family:'Libre Baskerville',Georgia,serif;
  font-size:52px;
  font-weight:700;
  color:#FFFFFF;
  line-height:1.15;
  letter-spacing:-0.02em;
  max-width:800px;
}

/* Subtitle */
.subtitle{
  margin-top:20px;
  font-size:18px;
  color:rgba(255,255,255,.40);
  font-style:italic;
  font-family:'Libre Baskerville',Georgia,serif;
  max-width:600px;
}

/* Bottom stats */
.stats{
  position:absolute;
  bottom:50px;left:90px;right:90px;
  display:flex;
  gap:40px;
  padding-top:24px;
  border-top:1px solid rgba(255,255,255,.08);
}
.stat-value{
  font-family:'Inter',sans-serif;
  font-size:22px;
  font-weight:700;
  color:#34d399;
}
.stat-label{
  font-size:11px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:rgba(255,255,255,.30);
  margin-top:4px;
}

/* URL */
.url{
  position:absolute;
  bottom:54px;right:90px;
  font-size:14px;
  font-weight:600;
  color:rgba(255,255,255,.25);
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="og">
  <div class="glow"></div>
  <div class="glow-2"></div>
  <div class="grid-pattern"></div>
  <div class="top-bar"></div>

  <div class="logo">
    <img src="logo-header.png" alt="Inflexion"/>
  </div>

  <div class="eyebrow">
    <span class="dot"></span>
    178 sources &middot; 15 APIs &middot; IA Claude
  </div>

  <div class="title">
    R&eacute;v&eacute;ler les signaux<br>que le bruit dissimule.
  </div>

  <div class="subtitle">
    Intelligence g&eacute;opolitique &amp; financi&egrave;re en temps r&eacute;el
  </div>

  <div class="stats">
    <div>
      <div class="stat-value">158</div>
      <div class="stat-label">Sources</div>
    </div>
    <div>
      <div class="stat-value">15</div>
      <div class="stat-label">APIs</div>
    </div>
    <div>
      <div class="stat-value">24/7</div>
      <div class="stat-label">Veille IA</div>
    </div>
  </div>

  <div class="url">inflexionhub.com</div>
</div>
</body>
</html>
