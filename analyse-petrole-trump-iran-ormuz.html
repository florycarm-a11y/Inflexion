   h('h2',null,'I. Op\u00e9ration Epic Fury : le fait d\u00e9clencheur'),
   h('p',null,
    'Le 28 f\u00e9vrier 2026, les \u00c9tats-Unis et Isra\u00ebl ont lanc\u00e9 des frappes coordonn\u00e9es massives sur l\u2019Iran, baptis\u00e9es \u00ab\u00a0',h('em',null,'Operation Epic Fury'),'\u00a0\u00bb c\u00f4t\u00e9 am\u00e9ricain et \u00ab\u00a0',h('em',null,'Operation Roaring Lion'),'\u00a0\u00bb c\u00f4t\u00e9 isra\u00e9lien. Pr\u00e8s de ',h('strong',null,'900 frappes en 12 heures'),' ont cibl\u00e9 les sites nucl\u00e9aires, les d\u00e9fenses a\u00e9riennes, l\u2019infrastructure militaire et le leadership iranien (source\u00a0: CSIS, Britannica, Stimson Center).'
   ),
   h('p',null,
    'Le Guide supr\u00eame ',h('strong',null,'Ali Khamenei a \u00e9t\u00e9 tu\u00e9'),' dans les frappes initiales, avec des dizaines de hauts responsables. Le 8 mars, son fils ',h('strong',null,'Mojtaba Khamenei'),' a \u00e9t\u00e9 \u00e9lu nouveau Guide supr\u00eame \u2014 une succession dynastique sans pr\u00e9c\u00e9dent dans la R\u00e9publique islamique. Le contexte\u00a0: l\u2019\u00e9chec des n\u00e9gociations nucl\u00e9aires Iran-USA d\u2019avril 2025, dont le deadline de 60 jours impos\u00e9 par Trump avait expir\u00e9 sans accord.'
   ),
   h('p',null,
    'La r\u00e9ponse iranienne a \u00e9t\u00e9 massive. Entre le 28 f\u00e9vrier et le 5 mars, l\u2019Iran a lanc\u00e9 ',h('strong',null,'plus de 500 missiles balistiques et navals'),' et ',h('strong',null,'environ 2\u00a0000 drones'),', ciblant Isra\u00ebl (~40\u00a0%) et les bases am\u00e9ricaines dans ',h('strong',null,'neuf pays'),' de la r\u00e9gion\u00a0: Qatar, Bahre\u00efn, EAU, Kowe\u00eft, Irak, Jordanie, Arabie Saoudite, Turquie et Azerba\u00efdjan (source\u00a0: Wikipedia, Defense Update). L\u2019ambassade US au Kowe\u00eft a \u00e9t\u00e9 touch\u00e9e par un missile iranien. Un incident de tir ami a vu un F/A-18 kowe\u00eftien abattre trois F-15E am\u00e9ricains.'
   ),

   // II. Ormuz ferm\u00e9
   h('h2',null,'II. D\u00e9troit d\u2019Ormuz : la fermeture de facto'),
   h('p',null,
    'Dans les heures suivant les frappes, l\u2019IRGC (Gardiens de la R\u00e9volution) a \u00e9mis des avertissements VHF interdisant le passage des navires dans le d\u00e9troit. Le trafic p\u00e9trolier a chut\u00e9 de ',h('strong',null,'70\u00a0% imm\u00e9diatement'),', puis est tomb\u00e9 \u00e0 ',h('strong',null,'quasi-z\u00e9ro'),' pour le trafic commercial. Plus de ',h('strong',null,'150 navires'),' se sont ancr\u00e9s \u00e0 l\u2019ext\u00e9rieur du d\u00e9troit en attente (source\u00a0: Kpler, Lloyd\u2019s List, CBS News).'
   ),
   h('p',null,
    'L\u2019enjeu est colossal. Le d\u00e9troit d\u2019Ormuz achemine ',h('strong',null,'20 millions de barils par jour'),' \u2014 environ 20\u00a0% de la consommation mondiale \u2014 plus environ ',h('strong',null,'20\u00a0% du GNL mondial'),' (exports du Qatar et des EAU). C\u2019est, selon Rapidan Energy, la ',h('strong',null,'plus grande perturbation d\u2019approvisionnement p\u00e9trolier de l\u2019histoire'),' (source\u00a0: CNN, EIA).'
   ),
   h('p',null,
    'Le 5 mars, l\u2019IRGC annonce qu\u2019Ormuz est ferm\u00e9 uniquement aux navires des ',h('strong',null,'\u00c9tats-Unis, d\u2019Isra\u00ebl et de leurs alli\u00e9s occidentaux'),' \u2014 une fermeture s\u00e9lective r\u00e9affirm\u00e9e le 8 mars (source\u00a0: CNBC, CSIS). Le m\u00eame jour, les assureurs maritimes ont retir\u00e9 la couverture guerre pour le d\u00e9troit, rendant tout transit ',h('strong',null,'\u00e9conomiquement impossible'),' m\u00eame pour les armateurs volontaires. Seuls les navires de la \u00ab\u00a0flotte fant\u00f4me\u00a0\u00bb (iraniens et chinois) continuent de transiter \u2014 repr\u00e9sentant environ ',h('strong',null,'50\u00a0% des passages'),' entre le 1er et le 8 mars (source\u00a0: Lloyd\u2019s List). Les grandes compagnies \u2014 Maersk, MSC, CMA CGM, Hapag-Lloyd, COSCO \u2014 ont toutes suspendu les transits et r\u00e9achemin\u00e9 leurs flottes vers le cap de Bonne-Esp\u00e9rance, ajoutant ',h('strong',null,'10 \u00e0 14 jours'),' aux trajets Moyen-Orient\u2013Europe.'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Crise duale des chokepoints'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Ormuz ferm\u00e9 + mer Rouge toujours perturb\u00e9e par les Houthis = ',h('strong',null,'double blocage des points d\u2019\u00e9tranglement maritimes mondiaux'),'. Les routes alternatives sont satur\u00e9es. Les taux d\u2019affr\u00e8tement VLCC ont atteint un record historique de ',h('strong',null,'423\u00a0736\u00a0$/jour'),' (+77\u00a0%), refl\u00e9tant une p\u00e9nurie structurelle de capacit\u00e9 de transport (source\u00a0: CNBC, Maritime News).'
    )
   ),

   // III. Le choc p\u00e9trolier
   h('h2',null,'III. Le choc p\u00e9trolier : anatomie d\u2019une flambée historique'),
   h('p',null,
    'Le Brent est pass\u00e9 de ',h('strong',null,'~72\u00a0$ \u00e0 119\u00a0$ en dix jours'),' (+65\u00a0%), le WTI atteignant \u00e9galement 119\u00a0$, des niveaux non revus depuis juin 2022. Le 9 mars, le p\u00e9trole a boug\u00e9 de ',h('strong',null,'~30\u00a0$ en une seule journ\u00e9e'),' \u2014 ouverture \u00e0 ~85\u00a0$, pic \u00e0 115\u00a0$, retour \u00e0 85\u00a0$ en quelques heures sur les d\u00e9clarations de Trump (source\u00a0: NPR, Bloomberg, Al Jazeera).'
   ),
   h('p',null,
    'La perturbation ne se limite pas au d\u00e9troit. La production irakienne \u2014 ',h('strong',null,'deuxi\u00e8me producteur OPEC'),' \u2014 s\u2019est effondr\u00e9e de ',h('strong',null,'70\u00a0% sur ses trois principaux champs du sud'),', tombant \u00e0 1,3 million de barils/jour (source\u00a0: Bloomberg). Le Kowe\u00eft a annonc\u00e9 des coupes pr\u00e9ventives. Les EAU g\u00e8rent \u00ab\u00a0prudemment\u00a0\u00bb leur production offshore. Goldman Sachs anticipe un Brent \u00e0 ',h('strong',null,'135\u00a0$'),' si la crise dure quatre mois.'
   ),
   h('p',null,
    'L\u2019OPEC+ maintient paradoxalement une hausse de production de ',h('strong',null,'206\u00a0kb/j pour avril 2026'),', d\u00e9cid\u00e9e avant le conflit. Mais cette d\u00e9cision est potentiellement caduque\u00a0: le p\u00e9trole ne peut pas atteindre les march\u00e9s si le d\u00e9troit reste ferm\u00e9 (source\u00a0: CNBC, Enerdata, Rigzone).'
   ),

   // IV. La contradiction Trump
   h('h2',null,'IV. La contradiction Trump : apaisement et \u00ab\u00a0mort et fureur\u00a0\u00bb'),
   h('p',null,
    'Le 9 mars, face \u00e0 la pression \u00e9conomique et politique mont\u00e9e, Trump a d\u00e9clar\u00e9 que la guerre \u00ab\u00a0se terminera tr\u00e8s bient\u00f4t\u00a0\u00bb et annonc\u00e9 la lev\u00e9e partielle de sanctions p\u00e9troli\u00e8res et l\u2019escorte navale de p\u00e9troliers dans le d\u00e9troit. Le march\u00e9 a r\u00e9agi imm\u00e9diatement\u00a0: le Brent est pass\u00e9 de 119\u00a0$ \u00e0 ',h('strong',null,'moins de 90\u00a0$'),' en quelques heures (source\u00a0: Bloomberg, Fortune, Euronews).'
   ),
   h('p',null,
    'Mais le 10 mars, Trump menace l\u2019Iran de \u00ab\u00a0',h('strong',null,'mort, feu et fureur'),'\u00a0\u00bb si le flux p\u00e9trolier est bloqu\u00e9 (source\u00a0: Time). Cette ',h('strong',null,'contradiction fondamentale'),' \u2014 discours d\u2019apaisement et menaces d\u2019escalade simultan\u00e9s \u2014 d\u00e9finit la volatilit\u00e9 extr\u00eame des march\u00e9s. Le ministre iranien des Affaires \u00e9trang\u00e8res Araghchi a r\u00e9pondu s\u00e8chement\u00a0: \u00ab\u00a0',h('em',null,'N\u00e9gocier avec les Am\u00e9ricains n\u2019est plus \u00e0 l\u2019ordre du jour'),'\u00a0\u00bb.'
   ),
   h('p',null,
    'L\u2019asym\u00e9trie est structurelle. Les promesses de lev\u00e9e de sanctions ne s\u2019adressent qu\u2019aux pays tiers (Irak, EAU, partiellement Russie), pas \u00e0 l\u2019Iran lui-m\u00eame. L\u2019escorte navale ne r\u00e9sout pas le probl\u00e8me assurantiel \u2014 sans couverture guerre, les armateurs ne transiteront pas. Les march\u00e9s risquent une ',h('strong',null,'d\u00e9ception de 2-3 semaines'),' quand l\u2019\u00e9cart entre paroles et r\u00e9alit\u00e9 logistique deviendra \u00e9vident.'
   ),

   // IV-bis. Mise \u00e0 jour 10 mars
   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Mise \u00e0 jour \u2014 10 mars 2026, 15h UTC'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     h('strong',null,'Chute brutale du brut.'),' Le Brent plonge de ',h('strong',null,'10,5\u00a0% \u00e0 88,60\u00a0$'),', le WTI de 11,2\u00a0% \u00e0 84,12\u00a0$ apr\u00e8s que Trump d\u00e9clare la guerre \u00ab\u00a0',h('em',null,'very complete'),'\u00a0\u00bb (BBC). L\u2019',h('strong',null,'Agence internationale de l\u2019\u00e9nergie (AIE) tient une r\u00e9union extraordinaire'),' ce mardi pour discuter d\u2019une lib\u00e9ration coordonn\u00e9e des r\u00e9serves strat\u00e9giques \u2014 les pays membres d\u00e9tiennent collectivement ',h('strong',null,'1,2 milliard de barils'),' en r\u00e9serve (source\u00a0: CNBC, Reuters). Parall\u00e8lement, ',h('strong',null,'Saudi Aramco alerte sur des \u00ab\u00a0cons\u00e9quences catastrophiques\u00a0\u00bb'),' si le d\u00e9troit reste bloqu\u00e9 (Reuters), et l\u2019Arabie saoudite ferme pr\u00e9ventivement certains champs p\u00e9troliers (The New Arab). L\u2019UNCTAD publie une analyse sur les implications pour le commerce mondial. La volatilit\u00e9 intrajournali\u00e8re reste extr\u00eame.'
    )
   ),

   // V. Impact Europe
   h('h2',null,'V. L\u2019Europe en premi\u00e8re ligne'),
   h('p',null,
    'L\u2019Europe est particuli\u00e8rement vuln\u00e9rable. Le continent importe la quasi-totalit\u00e9 de son p\u00e9trole et une part significative de son GNL. Les ',h('strong',null,'stockages gaziers europ\u00e9ens'),' sont \u00e0 ',h('strong',null,'46 milliards de m\u00e8tres cubes (bcm)'),' fin f\u00e9vrier 2026, contre 60 bcm en 2025 et 77 bcm en 2024 \u2014 les niveaux les plus bas depuis la crise \u00e9nerg\u00e9tique post-invasion russe de l\u2019Ukraine (source\u00a0: Bruegel).'
   ),
   h('p',null,
    'Si le GNL qatarien et \u00e9mirati est coup\u00e9 durablement, l\u2019Europe devra concurrencer l\u2019Asie pour les cargaisons spot \u2014 un sc\u00e9nario v\u00e9cu en 2021-2023. Oxford Economics estime l\u2019impact inflationniste \u00e0 ',h('strong',null,'+0,3 \u00e0 0,5 point'),' sur la zone euro, poussant l\u2019inflation \u00e0 ~2,3\u00a0%. En Allemagne, l\u2019ADAC rapporte une hausse des prix des carburants ',h('strong',null,'\u00e0 deux chiffres en une semaine'),' (source\u00a0: Euronews, Detroit News).'
   ),
   h('p',null,
    'La ',h('strong',null,'divergence mon\u00e9taire'),' s\u2019accentue. La BCE, qui a termin\u00e9 son cycle de baisses \u00e0 ~2\u00a0%, pourrait \u00eatre forc\u00e9e de remonter ses taux si l\u2019inflation import\u00e9e s\u2019installe. La Fed, elle, continue de couper vers 3\u00a0%. Les \u00c9tats-Unis, producteur net de p\u00e9trole, b\u00e9n\u00e9ficient m\u00eame d\u2019une escalade contr\u00f4l\u00e9e. Le spread 10Y-2Y \u00e0 ',h('strong',null,'0,56\u00a0%'),' signale cette fracture transatlantique (source\u00a0: Bank of England, Rabobank).'
   ),
