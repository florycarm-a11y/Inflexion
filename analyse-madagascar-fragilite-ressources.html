   h('h2',null,'Th\u00e8se centrale'),
   h('p',null,
    'Madagascar est un paradoxe : une ',h('strong',null,'richesse naturelle exceptionnelle encha\u00een\u00e9e \u00e0 une pauvret\u00e9 structurelle'),'. L\u2019\u00eele abrite 5\u00a0% de la biodiversit\u00e9 mondiale, des gisements de nickel, cobalt et terres rares strat\u00e9giques, et une position g\u00e9ographique cl\u00e9 dans le canal du Mozambique. Pourtant, son PIB par habitant reste parmi les plus bas du monde (environ 500\u00a0$ par an), ses institutions sont captur\u00e9es par des \u00e9lites pr\u00e9datrices, et sa population subit des crises r\u00e9currentes sans filet de s\u00e9curit\u00e9. La question n\u2019est pas de savoir si Madagascar peut se d\u00e9velopper \u2014 c\u2019est de comprendre ',h('strong',null,'pourquoi les m\u00e9canismes de pr\u00e9dation l\u2019en emp\u00eachent syst\u00e9matiquement'),'.'
   ),

   // Partie I
   h('h2',null,'I. Crise politique chronique : le d\u00e9ficit d\u00e9mocratique'),

   h('h3',null,'La r\u00e9\u00e9lection contest\u00e9e de Rajoelina'),
   h('p',null,
    'En novembre 2023, Andry Rajoelina a \u00e9t\u00e9 r\u00e9\u00e9lu pr\u00e9sident avec ',h('strong',null,'58,9\u00a0% des voix'),', mais dans un scrutin boycott\u00e9 par les principaux candidats de l\u2019opposition (source\u00a0: France 24, RFI). Le taux de participation officiel de 46\u00a0% masque une abstention massive dans les zones urbaines, o\u00f9 le m\u00e9contentement est le plus fort. La Communaut\u00e9 de d\u00e9veloppement d\u2019Afrique australe (SADC) et l\u2019Union africaine ont valid\u00e9 le processus, mais les observateurs ind\u00e9pendants ont relev\u00e9 de nombreuses irr\u00e9gularit\u00e9s \u2014 achat de votes, instrumentalisation de la CENI (Commission \u00e9lectorale nationale ind\u00e9pendante), et couverture m\u00e9diatique d\u00e9s\u00e9quilibr\u00e9e.'
   ),
   h('p',null,
    'Ce d\u00e9ficit de l\u00e9gitimit\u00e9 mine la capacit\u00e9 du pouvoir \u00e0 conduire des r\u00e9formes structurelles. Le Parlement, domin\u00e9 par le parti pr\u00e9sidentiel IRD (Isika Rehetra miaraka amin\u2019i Andry Rajoelina), fonctionne comme une chambre d\u2019enregistrement. L\u2019opposition, fragment\u00e9e entre l\u2019ancien pr\u00e9sident Marc Ravalomanana et plusieurs figures r\u00e9gionales, peine \u00e0 s\u2019organiser. La soci\u00e9t\u00e9 civile, dynamique mais vuln\u00e9rable, fait face \u00e0 des pressions croissantes \u2014 ',h('strong',null,'sept journalistes poursuivis en 2025'),' selon Reporters sans fronti\u00e8res (RSF).'
   ),

   h('h3',null,'La capture institutionnelle'),
   h('p',null,
    'L\u2019indice de perception de la corruption de Transparency International classe Madagascar au ',h('strong',null,'149e rang sur 180 pays'),' en 2025 (score 24/100). La justice est soumise \u00e0 des pressions politiques constantes. Le Bureau ind\u00e9pendant anti-corruption (BIANCO), cr\u00e9\u00e9 en 2004, dispose de moyens limit\u00e9s et d\u2019une ind\u00e9pendance contest\u00e9e. Les march\u00e9s publics, en particulier dans les secteurs minier et des infrastructures, sont r\u00e9guli\u00e8rement entach\u00e9s de favoritisme. Cette capture institutionnelle constitue le premier obstacle \u00e0 tout d\u00e9veloppement durable.'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Risque politique'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le cycle politique malgache est marqu\u00e9 par une instabilit\u00e9 chronique : quatre crises majeures depuis 1991 (1991, 2002, 2009, 2018). Chaque transition de pouvoir s\u2019accompagne de paralysie \u00e9conomique et de recul des investissements \u00e9trangers. La prochaine \u00e9ch\u00e9ance critique : les \u00e9lections l\u00e9gislatives de 2028, potentiel d\u00e9clencheur de tensions.'
    )
   ),

   // Partie II
   h('h2',null,'II. Pr\u00e9dation des ressources : le mal end\u00e9mique'),

   h('h3',null,'Le bois de rose : un trafic mondial'),
   h('p',null,
    'Le bois de rose malgache (',h('em',null,'Dalbergia'),'), inscrit \u00e0 l\u2019Annexe II de la CITES depuis 2013, reste l\u2019objet d\u2019un trafic massif. L\u2019ONG Environmental Investigation Agency (EIA) estime que ',h('strong',null,'plus de 350\u00a0000 arbres'),' ont \u00e9t\u00e9 abattus ill\u00e9galement entre 2010 et 2023, repr\u00e9sentant une valeur de march\u00e9 d\u00e9passant ',h('strong',null,'2 milliards de dollars'),'. La destination principale reste la Chine, o\u00f9 le bois de rose alimente l\u2019industrie du mobilier de luxe hongmu. Malgr\u00e9 le moratoire officiel sur l\u2019exportation, les saisies douani\u00e8res internationales attestent de la persistance du trafic \u2014 42 conteneurs intercept\u00e9s au port de Singapour en 2024 (source\u00a0: TRAFFIC).'
   ),
   h('p',null,
    'Le r\u00e9seau de trafic implique des acteurs \u00e0 tous les niveaux : communaut\u00e9s rurales pouss\u00e9es par la pauvret\u00e9, interm\u00e9diaires locaux, exportateurs li\u00e9s au pouvoir politique, et importateurs chinois. La corruption des services douaniers et forestiers rend toute r\u00e9pression structurelle illusoire. Le CITES Standing Committee a menac\u00e9 Madagascar de suspension commerciale en 2024, mais l\u2019effet dissuasif reste limit\u00e9.'
   ),

   h('h3',null,'Nickel, cobalt et ilm\u00e9nite : la mal\u00e9diction mini\u00e8re'),
   h('p',null,
    'Le projet ',h('strong',null,'Ambatovy'),', op\u00e9r\u00e9 par le consortium japonais Sumitomo (avec la participation de Korea Resources Corp), repr\u00e9sente l\u2019un des plus grands investissements miniers d\u2019Afrique subsaharienne \u2014 environ ',h('strong',null,'8 milliards de dollars'),' investis. La mine produit du nickel et du cobalt, deux minerais critiques pour la transition \u00e9nerg\u00e9tique (batteries de v\u00e9hicules \u00e9lectriques). Cependant, le projet a connu des d\u00e9passements de co\u00fbts massifs, des difficult\u00e9s techniques et des tensions avec les communaut\u00e9s locales. La production reste en de\u00e7\u00e0 des objectifs initiaux.'
   ),
   h('p',null,
    'Le groupe Rio Tinto exploite le gisement d\u2019ilm\u00e9nite de ',h('strong',null,'Fort Dauphin'),' (QIT Madagascar Minerals) depuis 2009. Ce projet, cens\u00e9 g\u00e9n\u00e9rer des retomb\u00e9es \u00e9conomiques locales, est r\u00e9guli\u00e8rement critiqu\u00e9 pour ses impacts environnementaux \u2014 d\u00e9forestation de la for\u00eat littorale, contamination des nappes phr\u00e9atiques, d\u00e9placement de communaut\u00e9s. Le ',h('strong',null,'taux de redistribution fiscale'),' aux collectivit\u00e9s locales reste opaque et contest\u00e9 (source\u00a0: Publish What You Pay, Global Witness).'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Signal strat\u00e9gique'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le cobalt et le nickel malgaches int\u00e9ressent directement la strat\u00e9gie europ\u00e9enne des minerais critiques (Critical Raw Materials Act, 2024). Mais le risque op\u00e9rationnel \u2014 instabilit\u00e9 politique, corruption, d\u00e9ficit d\u2019infrastructures \u2014 rend tout nouvel investissement conditionn\u00e9 \u00e0 des garanties de gouvernance que le r\u00e9gime actuel ne peut offrir.'
    )
   ),

   h('h3',null,'L\u2019or et les saphirs : l\u2019\u00e9conomie de l\u2019ombre'),
   h('p',null,
    'Au-del\u00e0 des grands projets industriels, l\u2019extraction artisanale d\u2019or et de pierres pr\u00e9cieuses (saphirs d\u2019Ilakaka, rubis d\u2019Andilamena) alimente une \u00e9conomie informelle massive. On estime \u00e0 ',h('strong',null,'500\u00a0000 le nombre de mineurs artisanaux'),' dans des conditions de travail extr\u00eames. Le travail des enfants dans les mines reste document\u00e9 par l\u2019OIT et Human Rights Watch. Les fili\u00e8res d\u2019exportation, largement informelles, \u00e9chappent presque totalement \u00e0 la fiscalit\u00e9 malgache \u2014 un manque \u00e0 gagner estim\u00e9 \u00e0 ',h('strong',null,'200-400 millions de dollars par an'),' (source\u00a0: EITI Madagascar, Banque mondiale).'
   ),

   // Partie III
   h('h2',null,'III. La dimension sociale : un pays au bord du gouffre'),

   h('h3',null,'Pauvret\u00e9 extr\u00eame et in\u00e9galit\u00e9s'),
   h('p',null,
    'Avec ',h('strong',null,'81\u00a0% de sa population vivant sous le seuil de pauvret\u00e9 international'),' (2,15 $/jour PPA), Madagascar est l\u2019un des pays les plus pauvres du monde (source\u00a0: Banque mondiale, 2025). Le PIB par habitant, environ 500 dollars, a ',h('strong',null,'diminu\u00e9 en termes r\u00e9els depuis l\u2019ind\u00e9pendance en 1960'),' \u2014 un cas unique parmi les grandes \u00eeles. L\u2019indice de d\u00e9veloppement humain (IDH) classe le pays au ',h('strong',null,'173e rang sur 193'),' (UNDP, 2025). Le coefficient de Gini de 0,43 refl\u00e8te des in\u00e9galit\u00e9s marqu\u00e9es entre la capitale Antananarivo et le reste du pays.'
   ),
   h('p',null,
    'La malnutrition chronique touche ',h('strong',null,'42\u00a0% des enfants de moins de 5 ans'),' (stunting), un taux parmi les plus \u00e9lev\u00e9s au monde (source\u00a0: UNICEF). Dans le sud du pays (r\u00e9gions Androy et Anosy), la s\u00e9cheresse r\u00e9currente a provoqu\u00e9 ce que le PAM a qualifi\u00e9 de premi\u00e8re \u00ab\u00a0famine climatique\u00a0\u00bb au monde en 2021-2022. La situation reste pr\u00e9caire en 2026, avec ',h('strong',null,'1,3 million de personnes en ins\u00e9curit\u00e9 alimentaire aig\u00fce'),' (IPC phase 3+).'
   ),

   h('h3',null,'L\u2019effondrement des services publics'),
   h('p',null,
    'La soci\u00e9t\u00e9 d\u2019\u00e9lectricit\u00e9 JIRAMA (Jiro sy Rano Malagasy) est devenue le symbole du d\u00e9labrement institutionnel. Les coupures d\u00e9passent ',h('strong',null,'12 heures par jour'),' dans la plupart des villes de province, et la JIRAMA accumule un d\u00e9ficit chronique de plus de ',h('strong',null,'100 millions de dollars par an'),'. Le syst\u00e8me de sant\u00e9 ne dispose que de ',h('strong',null,'2 m\u00e9decins pour 10\u00a0000 habitants'),' (OMS) \u2014 contre 32 en France. Le taux de mortalit\u00e9 maternelle reste parmi les plus \u00e9lev\u00e9s au monde (392 pour 100\u00a0000 naissances vivantes). L\u2019\u00e9ducation souffre de taux d\u2019abandon massifs : moins de ',h('strong',null,'30\u00a0% des enfants ach\u00e8vent le cycle secondaire'),'.'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Alerte humanitaire'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le sud de Madagascar reste en situation de crise alimentaire chronique. Le cumul de s\u00e9cheresse, cyclones et pauvret\u00e9 structurelle cr\u00e9e un cercle vicieux que l\u2019aide internationale ne parvient pas \u00e0 briser. Le PAM alerte sur un risque de famine localis\u00e9e en cas de saison cyclonique particuli\u00e8rement destructrice en 2026-2027.'
    )
   ),

   // Partie IV
   h('h2',null,'IV. Vuln\u00e9rabilit\u00e9 climatique : un pays en premi\u00e8re ligne'),

   h('h3',null,'Cyclones r\u00e9currents et \u00e9rosion c\u00f4ti\u00e8re'),
   h('p',null,
    'Madagascar est l\u2019un des pays les plus expos\u00e9s aux cyclones tropicaux dans l\u2019oc\u00e9an Indien. Le ',h('strong',null,'cyclone Gamane (mars 2024)'),' a caus\u00e9 124 d\u00e9c\u00e8s, d\u00e9plac\u00e9 460\u00a0000 personnes et d\u00e9truit 120\u00a0000 hectares de cultures (source\u00a0: OCHA, BNGRC). En moyenne, 3 \u00e0 4 cyclones frappent l\u2019\u00eele par saison, chaque passage effondrant un peu plus des infrastructures d\u00e9j\u00e0 fragiles. Les co\u00fbts de reconstruction absorbent une part croissante du budget national \u2014 en 2023-2024, les dommages cumul\u00e9s sont estim\u00e9s \u00e0 ',h('strong',null,'plus de 600 millions de dollars'),' (source\u00a0: Banque mondiale, Global Facility for Disaster Reduction).'
   ),
   h('p',null,
    'L\u2019\u00e9l\u00e9vation du niveau de la mer menace les zones c\u00f4ti\u00e8res basses, en particulier la c\u00f4te est et les villes portuaires de Toamasina et Mahajanga. Les mod\u00e8les climatiques du GIEC pr\u00e9voient une intensification de la fr\u00e9quence et de la puissance des cyclones dans le canal du Mozambique d\u2019ici 2050, rendant les projections de d\u00e9veloppement c\u00f4tier incertaines.'
   ),

   h('h3',null,'D\u00e9forestation : 90\u00a0% du couvert originel perdu'),
   h('p',null,
    'Madagascar a perdu ',h('strong',null,'plus de 90\u00a0% de sa for\u00eat originelle'),'. Le rythme de d\u00e9forestation reste alarmant : environ ',h('strong',null,'100\u00a0000 hectares par an'),' selon Global Forest Watch. La culture sur br\u00fblis (tavy), pratiqu\u00e9e par des millions de paysans faute d\u2019alternatives, est la premi\u00e8re cause de d\u00e9forestation. Le charbon de bois, principale source d\u2019\u00e9nergie domestique (utilis\u00e9 par 90\u00a0% des m\u00e9nages), alimente la destruction des for\u00eats r\u00e9siduelles. Les cons\u00e9quences sont en cascade : \u00e9rosion des sols (les ',h('em',null,'lavaka'),', ravines g\u00e9antes, sont visibles depuis l\u2019espace), envasement des rivi\u00e8res, perte de biodiversit\u00e9.'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Enjeu biodiversit\u00e9'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Madagascar est un hotspot de biodiversit\u00e9 absolument unique : ',h('strong',null,'environ 90\u00a0% de ses esp\u00e8ces sont end\u00e9miques'),' (l\u00e9muriens, baobabs, cam\u00e9l\u00e9ons). L\u2019UICN classe 120 esp\u00e8ces de l\u00e9muriens sur 111 comme menac\u00e9es. La perte de cet h\u00e9ritage biologique est irr\u00e9versible et constitue un enjeu mondial, pas seulement malgache.'
    )
   ),

   h('h3',null,'La France et Madagascar : un lien historique \u00e0 r\u00e9inventer'),
   h('p',null,
    'La France reste le premier bailleur bilat\u00e9ral de Madagascar, avec une enveloppe AFD d\u2019environ ',h('strong',null,'150 millions d\u2019euros par an'),'. Mais l\u2019efficacit\u00e9 de cette aide est contest\u00e9e : les indicateurs de d\u00e9veloppement ne cessent de se d\u00e9grader malgr\u00e9 des d\u00e9cennies de coop\u00e9ration. La communaut\u00e9 fran\u00e7aise (environ 25\u00a0000 ressortissants) est expos\u00e9e \u00e0 l\u2019ins\u00e9curit\u00e9 croissante \u2014 ',h('strong',null,'agressions, kidnappings et cambriolages en hausse de 35\u00a0% en 2024-2025'),' selon le MEAE.'
   ),
   h('p',null,
    'La base militaire fran\u00e7aise de La R\u00e9union (FAZSOI \u2014 Forces arm\u00e9es de la zone sud de l\u2019oc\u00e9an Indien) surveille le canal du Mozambique, corridor maritime strat\u00e9gique pour le commerce Asie-Europe. La piraterie r\u00e9siduelle et le trafic maritime ill\u00e9gal (p\u00eache, drogue) justifient une pr\u00e9sence navale continue. L\u2019enjeu francophone est \u00e9galement significatif : Madagascar est le ',h('strong',null,'4e pays francophone par la population'),', et la progression du mandarin (via les programmes Confucius) et de l\u2019anglais \u00e9rode l\u2019influence linguistique fran\u00e7aise.'
   ),

   h('h3',null,'Recommandations op\u00e9rationnelles'),
   h('p',null,
    h('strong',null,'Imm\u00e9diat (0-3 mois)'),' \u2014 Renforcer la veille s\u00e9curit\u00e9 pour les ressortissants et entreprises fran\u00e7ais \u00e0 Madagascar. Conditionner les nouveaux d\u00e9caissements AFD \u00e0 des progr\u00e8s mesurables en mati\u00e8re de gouvernance. \u00c9valuer l\u2019exposition des fournisseurs fran\u00e7ais aux fili\u00e8res nickel/cobalt malgaches.'
   ),
   h('p',null,
    h('strong',null,'Court terme (3-12 mois)'),' \u2014 Soutenir les m\u00e9canismes de transparence EITI pour le secteur extractif. Renforcer les programmes de conservation biodiversit\u00e9 (parcs nationaux, corridors forestiers). Int\u00e9grer Madagascar dans la strat\u00e9gie fran\u00e7aise des minerais critiques, mais avec des exigences ESG contraignantes.'
   ),
   h('p',null,
    h('strong',null,'Moyen terme (1-3 ans)'),' \u2014 Accompagner la r\u00e9forme du secteur \u00e9lectrique (JIRAMA) comme levier de stabilisation \u00e9conomique. Soutenir la d\u00e9centralisation effective pour r\u00e9duire la concentration du pouvoir \u00e0 Antananarivo. Maintenir l\u2019engagement francophone via l\u2019\u00e9ducation et la formation professionnelle.'
   ),
