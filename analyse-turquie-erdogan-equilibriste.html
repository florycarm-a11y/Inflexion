   h('h3',null,'Le tournant des municipales 2024'),
   h('p',null,
    'Les \u00e9lections municipales de mars 2024 ont constitu\u00e9 un ',h('strong',null,'s\u00e9isme politique'),'. Le CHP (Parti r\u00e9publicain du peuple) a remport\u00e9 Istanbul, Ankara et 35 des 81 m\u00e9tropoles \u2014 sa meilleure performance depuis les ann\u00e9es 1970. Ekrem \u0130mamo\u011flu, r\u00e9\u00e9lu \u00e0 Istanbul avec 51,1\u00a0% des voix, s\u2019est impos\u00e9 comme le principal rival d\u2019Erdo\u011fan (source\u00a0: Reuters, Financial Times). Ce r\u00e9sultat a bris\u00e9 le mythe de l\u2019invincibilit\u00e9 \u00e9lectorale de l\u2019AKP dans les grandes villes.'

   ),

   h('h3',null,'Concentration du pouvoir et \u00e9rosion d\u00e9mocratique'),
   h('p',null,
    'Depuis la r\u00e9forme constitutionnelle de 2017 et le passage au r\u00e9gime pr\u00e9sidentiel, le pouvoir est concentr\u00e9 entre les mains d\u2019Erdo\u011fan. Le syst\u00e8me judiciaire a perdu son ind\u00e9pendance \u2014 le Conseil des juges et procureurs (HSK) est d\u00e9sormais align\u00e9 sur l\u2019ex\u00e9cutif. Freedom House classe la Turquie comme \u00ab\u00a0',h('strong',null,'Not Free'),'\u00a0\u00bb depuis 2018, avec un score de 32/100 en 2025. Le s\u00e9isme de f\u00e9vrier 2023 (plus de 50\u00a0000 morts) a r\u00e9v\u00e9l\u00e9 les failles de la gouvernance\u00a0: corruption dans les permis de construire, lenteur des secours, opacit\u00e9 de la reconstruction (source\u00a0: Brookings, Carnegie).'

     'L\u2019arrestation d\u2019\u0130mamo\u011flu a radicalis\u00e9 l\u2019opposition et fragment\u00e9 le champ politique. Le risque d\u2019instabilit\u00e9 est maximal \u00e0 l\u2019approche des \u00e9lections pr\u00e9sidentielles de 2028. Si le pouvoir tente de bloquer la candidature de l\u2019opposition, un sc\u00e9nario de contestation massive est probable.'

   h('h2',null,'II. Crise \u00e9conomique\u00a0: de l\u2019h\u00e9t\u00e9rodoxie au retour forc\u00e9 \u00e0 l\u2019orthodoxie'),

   h('h3',null,'L\u2019effondrement de la lira'),
   h('p',null,
    'La livre turque a perdu ',h('strong',null,'plus de 80\u00a0% de sa valeur face au dollar depuis 2018'),'. En mars 2026, le taux d\u00e9passe 38 TRY/USD, contre 5,3 en 2018. Cette d\u00e9pr\u00e9ciation est le fruit direct de la politique mon\u00e9taire h\u00e9t\u00e9rodoxe impos\u00e9e par Erdo\u011fan entre 2019 et 2023\u00a0: baisse des taux directeurs en pleine inflation, limogeage de quatre gouverneurs de la Banque centrale (TCMB) en quatre ans, interventions sur le march\u00e9 des changes d\u00e9stabilisantes (source\u00a0: Financial Times, Reuters).'
   ),
   h('p',null,
    'L\u2019inflation a atteint un pic de ',h('strong',null,'67\u00a0% en octobre 2022'),' (85\u00a0% selon des estimations ind\u00e9pendantes), \u00e9rodant le pouvoir d\u2019achat de la classe moyenne. Apr\u00e8s la r\u00e9\u00e9lection d\u2019Erdo\u011fan en mai 2023, le virage vers l\u2019orthodoxie s\u2019est amorc\u00e9 avec la nomination de Hafize Gaye Erkan puis Fatih Karahan \u00e0 la t\u00eate de la TCMB. Le taux directeur a \u00e9t\u00e9 relev\u00e9 de 8,5\u00a0% \u00e0 ',h('strong',null,'50\u00a0%'),' entre juin 2023 et mars 2024 (source\u00a0: TCMB, Bloomberg).'

   h('h3',null,'Le retour \u00e0 l\u2019orthodoxie et ses limites'),
   h('p',null,
    'La politique de resserrement mon\u00e9taire produit des r\u00e9sultats\u00a0: l\u2019inflation est redescendue sous les ',h('strong',null,'40\u00a0% en d\u00e9but 2026'),', les r\u00e9serves de la TCMB se reconstituent, et les agences de notation ont rel\u00e8v\u00e9 la perspective de la Turquie (Fitch B+ stable, Moody\u2019s B3 positive). Mais le co\u00fbt social est \u00e9lev\u00e9\u00a0: le cr\u00e9dit \u00e0 la consommation s\u2019est effondr\u00e9, le ch\u00f4mage r\u00e9el d\u00e9passe 25\u00a0% chez les jeunes, et la croissance a ralenti \u00e0 2,1\u00a0% en 2025 (source\u00a0: TurkStat, OCDE).'
   ),
   h('p',null,
    'Le d\u00e9ficit courant reste structurel (',h('strong',null,'~4\u00a0% du PIB'),'), aliment\u00e9 par la d\u00e9pendance \u00e9nerg\u00e9tique\u00a0: la Turquie importe 93\u00a0% de son gaz et 89\u00a0% de son p\u00e9trole. Le programme KKM (m\u00e9canisme de protection des d\u00e9p\u00f4ts index\u00e9s sur le change), h\u00e9rit\u00e9 de la p\u00e9riode h\u00e9t\u00e9rodoxe, a co\u00fbt\u00e9 plus de 20 milliards de dollars au Tr\u00e9sor et n\u2019est pas encore totalement liquid\u00e9. La question cl\u00e9\u00a0: ',h('strong',null,'Erdo\u011fan tiendra-t-il la ligne orthodoxe jusqu\u2019en 2028'),', ou c\u00e8dera-t-il \u00e0 la pression populiste \u00e0 l\u2019approche des \u00e9lections\u00a0?'
   ),

    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Signal \u00e9conomique'),

   h('h3',null,'OTAN\u00a0: l\u2019alli\u00e9 indisciplin\u00e9'),
   h('p',null,

   h('p',null,
