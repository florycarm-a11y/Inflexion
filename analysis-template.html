<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Titre de l'analyse — Inflexion</title>
<meta name="description" content="Description de l'analyse pour le SEO et les réseaux sociaux."/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{brand:{900:'#06402A',800:'#33B894',700:'#1E7E56',600:'#2A9D6E',500:'#10b981',400:'#34d399',300:'#6ee7b7',200:'#a7f3d0',100:'#d1fae5',50:'#E8F5EE'},navy:{900:'#06402A',800:'#06402A',700:'#06402A'},cool:{50:'#F7F8FA',100:'#ECEEF2',200:'#E2E5EB',300:'#D1D5DE'}},fontFamily:{display:['Libre Baskerville','Georgia','serif'],body:['Inter','Helvetica Neue','sans-serif'],data:['JetBrains Mono','SF Mono','monospace']}}}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Helvetica Neue',sans-serif;background:#FFFFFF;color:#1A1F2E;overflow-x:hidden}

/* Typography */
h1,h2,h3,.display-text{font-family:'Libre Baskerville',Georgia,serif;font-weight:700;line-height:1.15;letter-spacing:-0.02em;color:#1A1F2E}
.category-label{font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#33B894}

/* Animations */
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-track{animation:ticker-scroll 30s linear infinite}
.ticker-track:hover{animation-play-state:paused}
@keyframes fade-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.anim-fade-up{animation:fade-up .6s ease-out both}
.anim-d1{animation-delay:.1s}.anim-d2{animation-delay:.2s}.anim-d3{animation-delay:.3s}

/* Nav */
.nav-link{position:relative}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:2px;background:#33B894;transform:scaleX(0);transition:transform .25s ease}
.nav-link:hover::after,.nav-link.active::after{transform:scaleX(1)}
.mega-trigger{position:relative}
.mega-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%) translateY(8px);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .22s ease,transform .22s ease,visibility .22s;min-width:520px;z-index:60}
.mega-trigger:hover .mega-menu,.mega-menu:hover{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.mega-item{transition:background .15s ease}
.mega-item:hover{background:rgba(27,107,74,.06)}
.mega-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.nav-scrolled{background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid #E2E5EB;box-shadow:0 1px 8px rgba(0,0,0,.04)}

/* Hamburger */
.hamburger span{display:block;width:24px;height:2px;background:#1A1F2E;margin:5px 0;transition:all .3s ease}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-overlay{opacity:0;visibility:hidden;transition:opacity .35s cubic-bezier(.4,0,.2,1),visibility .35s}
.mobile-overlay.open{opacity:1;visibility:visible}
@keyframes menu-item-in{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.menu-item{opacity:0}
.mobile-overlay.open .menu-item{animation:menu-item-in .4s ease-out forwards}

/* Article prose */
.prose p{margin-bottom:1.25rem;font-size:1.0625rem;line-height:1.8;color:#3A3A3A}
.prose strong{color:#1A1F2E}
.prose h2{font-size:1.625rem;color:#006650;margin-top:3.25rem;margin-bottom:1.25rem;line-height:1.3}
.prose h3{font-family:'Inter',sans-serif;font-size:1.0625rem;font-weight:600;color:#33B894;margin-top:2rem;margin-bottom:0.75rem;letter-spacing:0.3px}

/* Key figure */
.key-figure{background:linear-gradient(135deg,#006650 0%,#06402A 100%);border-radius:0.5rem;padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.key-figure::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#33B894,#2A9D6E,rgba(255,255,255,0.3))}

/* Insight box */
.insight-box{border-left:3px solid #33B894;background:#F7F8FA;padding:1.25rem 1.5rem;margin:1.75rem 0;border-radius:0 0.5rem 0.5rem 0}
.insight-box.alert{border-left-color:#DC2626}
.insight-box.gold{border-left-color:#EAB308}

/* Matrix table */
.matrix-table{width:100%;border-collapse:collapse;font-family:'Inter',sans-serif;font-size:0.875rem}
.matrix-table thead th{background:#006650;color:white;padding:0.75rem 1rem;text-align:left;font-weight:600;font-size:0.75rem;letter-spacing:0.5px;text-transform:uppercase}
.matrix-table thead th:first-child{border-radius:0.5rem 0 0 0}
.matrix-table thead th:last-child{border-radius:0 0.5rem 0 0}
.matrix-table tbody td{padding:0.875rem 1rem;border-bottom:1px solid #ECEEF2;vertical-align:top;line-height:1.55;color:#3A3A3A}
.matrix-table tbody tr:nth-child(odd) td{background:#F7F8FA}
.matrix-table tbody tr:nth-child(even) td{background:#FFFFFF}
.matrix-table tbody tr:last-child td:first-child{border-radius:0 0 0 0.5rem}
.matrix-table tbody tr:last-child td:last-child{border-radius:0 0 0.5rem 0}
.matrix-table td strong{color:#1A1F2E}

/* Data rows */
.data-row{display:flex;justify-content:space-between;align-items:baseline;padding:0.625rem 0;border-bottom:1px solid #ECEEF2;font-size:0.875rem;color:#3A3A3A}
.data-row:last-child{border-bottom:none}

/* Article card */
.article-card{transition:transform .2s ease,box-shadow .2s ease}
.article-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(10,22,40,.08)}

/* Categories */
.category-geo{background:#2563eb}.category-marches{background:#33B894}.category-crypto{background:#f59e0b}.category-matieres{background:#ef4444}.category-iatech{background:#8b5cf6}

/* Section number */
.section-number{font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2A9D6E;display:block;margin-bottom:0.5rem}

/* Font data */
.font-data{font-family:'JetBrains Mono','SF Mono',monospace}
</style>
</head>
<body>
<div id="app"></div>
<script src="nav-config.js"></script>
<script type="module">
import React,{useState,useEffect} from 'https://esm.sh/react@18.2.0'
import{createRoot}from 'https://esm.sh/react-dom@18.2.0/client'

const h=React.createElement

// ─── TEMPLATE DATA — Replace these for each article ─────────────────────────

const ARTICLE_DATA={
 category:'ANALYSE',
 categoryColor:'#33B894',
 theme:'Infrastructure & Souveraineté',
 title:'Titre principal de l\'analyse',
 titleEmphasis:'mot clé en emphase',

 author:'Inflexion Research',

 readTime:'9 min de lecture',
}

const KEY_FIGURES=[
 {value:'610 Mds $',label:'Dépenses d\'investissement cumulées',highlight:'×7 en six ans'},
 {value:'75 %',label:'Fléchés vers l\'infrastructure IA',highlight:'soit 450 Mds $'},
]

const MATRIX_DATA={
 columns:['Profil','Priorité stratégique','Action clé 2026'],
 rows:[
  {cells:['Jeune entreprise IA','Flexibilité maximale','Action recommandée pour ce profil.'],sub:'10 pers., 5-15 k€/mois'},
  {cells:['PME éditrice de logiciel','Prévisibilité des marges','Action recommandée pour ce profil.'],sub:'50 pers., 30-80 k€/mois'},
  {cells:['ETI européenne','Souveraineté et résilience','Action recommandée pour ce profil.'],sub:'200+ pers., 100 k+ €/mois'},
 ]
}

const DATA_ROWS=[

 {label:'Azure — « Reserved » + « Hybrid Benefit »',value:'−80 %'},
 {label:'GCP — « Committed Use Discounts » (3 ans)',value:'−70 %'},
 {label:'GCP — « Sustained Use Discounts » (auto)',value:'−30 %',highlight:true},
]

const RELATED_ARTICLES=[
 {id:1,cat:'geopolitique',catLabel:'Géopolitique',title:'Tensions en mer de Chine : Pékin renforce ses positions',img:'https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=300&h=200&fit=crop',href:'#'},
 {id:2,cat:'marches',catLabel:'Marchés',title:'La Fed maintient ses taux : les marchés anticipent juin',img:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=300&h=200&fit=crop',href:'#'},
 {id:3,cat:'crypto',catLabel:'Crypto',title:'Bitcoin franchit les 68 000 $ : l\'effet ETF se confirme',img:'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=300&h=200&fit=crop',href:'#'},
]

const SOURCES_TEXT='Publications de résultats T4 2025 (Amazon, Alphabet, Microsoft, Meta). Documentation tarifaire officielle AWS, Azure, GCP. NVIDIA — carnet de commandes Blackwell B200/GB200. Commission européenne — proposition « Digital Omnibus » (novembre 2025).'

// ─── SHARED DATA ─────────────────────────────────────────────────────────────

const MEGA_NAV=window.MEGA_NAV

const TICKER_DATA=[
{symbol:'S&P 500',value:'5 248.32',change:'+0.87%',up:true},
{symbol:'CAC 40',value:'7 892.15',change:'+0.42%',up:true},
{symbol:'DAX',value:'18 456.78',change:'-0.15%',up:false},
{symbol:'BTC',value:'$68 420',change:'+2.34%',up:true},
{symbol:'ETH',value:'$3 812',change:'+1.56%',up:true},
{symbol:'EUR/USD',value:'1.0847',change:'-0.12%',up:false},
{symbol:'Or',value:'$2 178',change:'+0.65%',up:true},
{symbol:'VIX',value:'14.32',change:'-3.21%',up:true},
{symbol:'Euro Stoxx 50',value:'5 012.44',change:'+0.31%',up:true},
{symbol:'Nikkei 225',value:'39 876',change:'+1.12%',up:true},
{symbol:'Pétrole WTI',value:'$78.45',change:'-0.89%',up:false},
{symbol:'Argent',value:'$25.12',change:'+1.23%',up:true},
]

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function Navigation(){
const[open,setOpen]=useState(false)
const[scrolled,setScrolled]=useState(false)
useEffect(()=>{
const fn=()=>setScrolled(window.scrollY>60)
window.addEventListener('scroll',fn,{passive:true})
return()=>window.removeEventListener('scroll',fn)
},[])
return h('div',null,
 h('header',{className:`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled?'nav-scrolled':'bg-transparent'}`},
  h('div',{className:'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8'},
   h('div',{className:'flex items-center justify-between h-16'},
    h('a',{href:'index.html',className:'flex items-center gap-2'},
     h('img',{src:'logo-header.png',alt:'Inflexion',className:'h-[65px] w-auto',style:{filter:scrolled?'none':'brightness(5) saturate(0.3)',transition:'filter 0.3s ease'}})
    ),
    h('nav',{className:'hidden md:flex items-center gap-1'},
     ...MEGA_NAV.map((cat,ci)=>
      h('div',{key:ci,className:'mega-trigger'},
       h('span',{className:'nav-link px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors cursor-default select-none'},cat.label),
       h('div',{className:'mega-menu bg-white rounded-2xl shadow-xl border border-gray-100 p-5'},
        h('div',{className:'grid gap-1'},
         ...cat.children.map((item,ii)=>
          h('a',{key:ii,href:item.href,className:'mega-item flex items-start gap-3 px-3 py-2.5 rounded-xl no-underline'},
           h('span',{className:'mega-icon bg-[#33B894]/10 text-[#33B894]'},item.icon),
           h('span',{className:'flex flex-col'},
            h('span',{className:'text-sm font-semibold text-gray-900'},item.label),
            h('span',{className:'text-xs text-gray-500 mt-0.5'},item.desc)
           )
          )
         )
        )
       )
      )
     ),
     h('a',{href:'#diagnostic',className:'ml-4 px-4 py-2 bg-[#33B894] hover:bg-[#06402A] text-white font-semibold text-sm rounded-lg transition-colors'},'Réserver un diagnostic')
    ),
    h('button',{className:`hamburger md:hidden p-2 ${open?'open':''}`,onClick:()=>setOpen(!open)},
     h('span'),h('span'),h('span')
    )
   )
  )
 ),
 h('div',{className:`mobile-overlay fixed inset-0 z-40 flex flex-col ${open?'open':''}`,style:{backgroundColor:'#06402A'}},
  h('div',{className:'flex items-center justify-between px-6 pt-6 pb-4'},
   h('span',{className:'text-xs uppercase tracking-[.25em] text-white/50 font-medium'},'Navigation'),
   h('button',{onClick:()=>setOpen(false),className:'w-10 h-10 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors','aria-label':'Fermer'},
    h('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',className:'text-white'},h('path',{d:'M18 6L6 18M6 6l12 12'}))
   )
  ),
  h('div',{className:'flex-1 overflow-y-auto px-6 pt-4'},
   ...MEGA_NAV.map((cat,ci)=>[
    h('p',{key:'h'+ci,className:'menu-item text-[11px] uppercase tracking-[.2em] text-white/40 font-semibold mb-3'+(ci>0?' mt-8':''),style:{animationDelay:`${0.05+ci*0.18}s`}},cat.label),

     h('a',{key:'m'+ci+'-'+ii,href:item.href,onClick:()=>setOpen(false),className:'menu-item flex items-center gap-3 py-3 text-white/90 hover:text-white transition-colors border-b border-white/8',style:{animationDelay:`${0.08+ci*0.18+ii*0.05}s`}},
      h('span',{className:'text-base'},item.icon),
      h('span',{className:'text-[20px] font-medium'},item.label)
     )

   ]).flat()

  h('div',{className:'px-6 py-6'},
   h('a',{href:'#diagnostic',onClick:()=>setOpen(false),className:'menu-item block w-full text-center px-6 py-3.5 bg-white/10 hover:bg-white/15 text-white font-semibold rounded-xl transition-colors text-base',style:{animationDelay:'0.85s'}},'Réserver un diagnostic')

 )

}

// ─── ARTICLE HERO ────────────────────────────────────────────────────────────

function ArticleHero(){
const d=ARTICLE_DATA
return h('section',{className:'relative pt-28 pb-16 md:pt-36 md:pb-20',style:{backgroundColor:'#06402A'}},

  h('p',{className:'anim-fade-up anim-d2 mt-5 text-base md:text-lg text-white/60 leading-relaxed'},d.chapo),

 )
)
}

// ─── ARTICLE CONTENT ─────────────────────────────────────────────────────────

  // ── Main prose column ──
  h('article',{className:'prose flex-1 max-w-[680px]'},

   // Intro paragraph
   h('p',null,'Premier paragraphe d\'introduction. Contextualisez le sujet, donnez les chiffres clés et posez la problématique principale. Ce bloc doit accrocher le lecteur et justifier pourquoi cette analyse est pertinente maintenant.'),

   // Key figures row
   h('div',{className:'grid grid-cols-1 sm:grid-cols-2 gap-4 my-10 not-prose'},

   h('div',{className:'overflow-x-auto my-6 not-prose'},

  // ── Sidebar ──

      h('a',{key:a.id,href:a.href,className:'article-card block rounded-xl overflow-hidden bg-white border border-[#E2E5EB] no-underline'},
       h('div',{className:'aspect-[16/9] overflow-hidden'},
        h('img',{src:a.img,alt:'',className:'w-full h-full object-cover',loading:'lazy'})
       ),
       h('div',{className:'p-3'},
        h('span',{className:`category-${a.cat} text-[9px] font-semibold uppercase tracking-wider text-white px-1.5 py-0.5 rounded`},a.catLabel),
        h('h4',{className:'mt-2 text-xs font-semibold text-[#1A1F2E] leading-snug line-clamp-2',style:{fontFamily:'Libre Baskerville, Georgia, serif'}},a.title)
       )
      )
     )
    )
   )
  )
 )
)
}

// ─── MARKET TICKER ───────────────────────────────────────────────────────────

function MarketTicker(){
const items=[...TICKER_DATA,...TICKER_DATA]
return h('div',{className:'fixed bottom-0 left-0 right-0 z-50 border-t border-white/10 overflow-hidden py-3 bg-[#06402A]'},
 h('div',{className:'ticker-track flex gap-8 whitespace-nowrap'},
  items.map((t,i)=>h('div',{key:i,className:'flex items-center gap-2 text-sm'},
   h('span',{className:'font-medium text-white/70'},t.symbol),
   h('span',{className:'text-white/90 font-semibold font-data'},t.value),
   h('span',{className:`font-medium font-data ${t.up?'text-[#34D399]':'text-[#F87171]'}`},
    (t.up?'▲ ':'▼ ')+t.change
   )
  ))
 )
)
}
