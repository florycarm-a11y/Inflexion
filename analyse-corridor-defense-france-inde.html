      'Le 17 f\u00e9vrier 2026, Emmanuel Macron et Narendra Modi \u00e9l\u00e8vent la relation bilat\u00e9rale au rang de \u00ab\u00a0',h('strong',null,'Partenariat Strat\u00e9gique Global Sp\u00e9cial'),'\u00a0\u00bb et ent\u00e9rinent un package d\u00e9fense de ',h('strong',null,'$39,7 milliards'),' \u2014 le plus grand contrat militaire franco-\u00e9tranger de l\u2019histoire. 140 Rafale au total (26 Marine + 114 MRFA), dont ',h('strong',null,'96 fabriqu\u00e9s en Inde'),' dans une usine Dassault \u00e0 Nagpur capable de produire 24 appareils par an. Autour de ce noyau, un \u00e9cosyst\u00e8me industriel se structure\u00a0: JV Safran-BEL pour le missile HAMMER, cha\u00eene d\u2019assemblage Airbus-Tata pour l\u2019H125, moteurs HAL-Safran, fuselage TASL \u00e0 Hyderabad. Le corridor d\u00e9fense du Tamil Nadu, avec ',h('strong',{className:'text-[#006650]'},'\u20b923\u00a0000\u00a0Cr d\u00e9j\u00e0 investis'),' et un objectif de \u20b975\u00a0000\u00a0Cr d\u2019ici 2032, offre aux sous-traitants fran\u00e7ais Tier 2/3 une porte d\u2019entr\u00e9e directe dans cette cha\u00eene de valeur.'
     )
    )
   ),

   // ─── I. Le m\u00e9ga-contrat ─────────────────────────────────────────────────────
   h('h2',null,'I. Le m\u00e9ga-contrat\u00a0: anatomie de $39,7 milliards'),

   h('h3',null,'26 Rafale Marine\u00a0: le d\u00e9clencheur'),
   h('p',null,
    'Le 28 avril 2025, New Delhi et Paris signent le contrat pour ',h('strong',null,'26 Rafale Marine'),' d\u2019une valeur de ',h('strong',null,'$7,5 milliards'),'. La commande porte sur 22 monoplaces et 4 biplaces, tous compatibles porte-avions et destin\u00e9s \u00e0 l\u2019',h('em',null,'Indian Navy'),'. Les quatre premiers appareils seront livr\u00e9s d\u2019ici 2029, l\u2019int\u00e9gralit\u00e9 de la flotte \u00e9tant attendue pour 2030 (source\u00a0: CNBC, Aviation Week). C\u2019est le premier contrat Rafale Marine export de l\u2019histoire de Dassault Aviation \u2014 un signal fort pour les futurs prospects, notamment l\u2019Indon\u00e9sie et la Malaisie.'
   ),

   h('h3',null,'114 Rafale MRFA\u00a0: le basculement industriel'),
   h('p',null,
    'En f\u00e9vrier 2026, le gouvernement indien approuve l\u2019acquisition de ',h('strong',null,'114 Rafale suppl\u00e9mentaires'),' dans le cadre du programme MRFA (',h('em',null,'Multi-Role Fighter Aircraft'),'), int\u00e9gr\u00e9 \u00e0 un package d\u00e9fense colossal de ',h('strong',null,'\u20b93,6 trillions ($39,7 milliards)'),'. La structure est in\u00e9dite\u00a0: ',h('strong',null,'18 appareils fournis directement par Dassault'),' depuis M\u00e9rignac, et ',h('strong',null,'96 fabriqu\u00e9s sur le sol indien'),' dans la nouvelle usine de Nagpur. Le CEO de Dassault Aviation se dit confiant pour une signature finale en 2026 (source\u00a0: CNBC, Breaking Defense, IDRW).'
   ),
   h('p',null,
    'Le volume total \u2014 ',h('strong',null,'140 Rafale'),' \u2014 fait de l\u2019Inde le plus grand client export de l\u2019avion de combat fran\u00e7ais, et de ce contrat ',h('strong',null,'la plus grande exportation militaire fran\u00e7aise de l\u2019histoire'),'. Pour comparaison, le contrat de 2016 portait sur 36 appareils pour \u20ac7,87 milliards. Ici, le volume est multipli\u00e9 par quatre.'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Rupture historique'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le package de ',h('strong',null,'$39,7 milliards'),' repr\u00e9sente le plus grand contrat militaire franco-\u00e9tranger de l\u2019histoire. Pour comparaison, le contrat Rafale de 2016 portait sur 36 appareils pour \u20ac7,87 milliards. Ici, le volume est multipli\u00e9 par 4 et le mod\u00e8le industriel bascule\u00a0: pour la premi\u00e8re fois, ',h('strong',null,'plus des deux tiers des Rafale seront fabriqu\u00e9s hors de France'),'.'
    )
   ),

   h('h3',null,'Le \u00ab\u00a0Partenariat Strat\u00e9gique Global Sp\u00e9cial\u00a0\u00bb'),
   h('p',null,
    'La visite d\u2019\u00c9tat d\u2019Emmanuel Macron du ',h('strong',null,'17 au 19 f\u00e9vrier 2026'),' a scell\u00e9 l\u2019\u00e9l\u00e9vation de la relation bilat\u00e9rale au rang de \u00ab\u00a0Partenariat Strat\u00e9gique Global Sp\u00e9cial\u00a0\u00bb \u2014 un statut que l\u2019Inde n\u2019accorde qu\u2019\u00e0 une poign\u00e9e de partenaires. Au-del\u00e0 de la d\u00e9fense, l\u2019accord couvre la coop\u00e9ration spatiale, le nucl\u00e9aire civil, l\u2019intelligence artificielle et les corridors de connectivit\u00e9 (source\u00a0: \u00c9lys\u00e9e, PIB India, Indian Masterminds).'
   ),

   // ─── II. L\u2019usine du monde militaire ──────────────────────────────────────────
   h('h2',null,'II. L\u2019usine du monde militaire\u00a0: Nagpur, Hyderabad, Bangalore'),

   h('h3',null,'Dassault Nagpur\u00a0: le deuxi\u00e8me hub mondial'),
   h('p',null,
    'L\u2019usine Dassault de ',h('strong',null,'Nagpur'),' sera le ',h('strong',null,'deuxi\u00e8me plus grand site de production Rafale au monde'),', apr\u00e8s M\u00e9rignac. Sa capacit\u00e9 est calibr\u00e9e \u00e0 ',h('strong',null,'24 Rafale par an'),'. Il ne s\u2019agit pas d\u2019une simple ligne d\u2019assemblage\u00a0: le site est structur\u00e9 comme un \u00ab\u00a0',h('em',null,'fully industrialised production hub'),'\u00a0\u00bb, avec la fabrication int\u00e9gr\u00e9e de sous-ensembles, l\u2019int\u00e9gration des syst\u00e8mes et les essais en vol. C\u2019est une premi\u00e8re absolue\u00a0: jamais Dassault n\u2019avait transf\u00e9r\u00e9 une capacit\u00e9 de production aussi compl\u00e8te hors de France (source\u00a0: Dassault Aviation press, Aviation Week).'
   ),

   h('h3',null,'Dassault-TASL Hyderabad\u00a0: fuselage et composants'),
   h('p',null,
    'En juin 2025, Dassault Aviation et ',h('strong',null,'Tata Advanced Systems Limited (TASL)'),' ont sign\u00e9 un accord pour la fabrication de ',h('strong',null,'sections de fuselage Rafale \u00e0 Hyderabad'),' \u2014 la premi\u00e8re production de ce type hors de France. TASL produit d\u00e9j\u00e0 des composants pour le Falcon 2000 et d\u2019autres programmes Dassault. L\u2019int\u00e9gration verticale de la cha\u00eene de valeur indienne s\u2019acc\u00e9l\u00e8re (source\u00a0: IDRW, Defence Express).'
   ),

   h('h3',null,'Airbus-Tata Bangalore\u00a0: l\u2019h\u00e9licopt\u00e8re H125'),
   h('p',null,
    'Inaugur\u00e9e en f\u00e9vrier 2026 lors de la visite Macron, la ligne d\u2019assemblage ',h('strong',null,'Airbus-Tata pour l\u2019h\u00e9licopt\u00e8re H125 \u00e0 Bangalore'),' marque l\u2019entr\u00e9e d\u2019Airbus Helicopters dans la production indienne. L\u2019objectif\u00a0: r\u00e9pondre \u00e0 la demande civile et parapublique indienne tout en cr\u00e9ant un hub d\u2019export r\u00e9gional (source\u00a0: DD News, BW Businessworld).'
   ),

   h('h3',null,'Safran-HAL et BEL-Safran\u00a0: moteurs et armement'),
   h('p',null,
    h('strong',null,'Safran et HAL'),' n\u00e9gocient l\u2019implantation d\u2019une ',h('strong',null,'usine de production de moteurs \u00e0 Hyderabad'),' ainsi qu\u2019un hub de MRO (',h('em',null,'Maintenance, Repair and Overhaul'),') pr\u00e8s de Jewar dans l\u2019Uttar Pradesh. Parall\u00e8lement, la JV ',h('strong',null,'BEL-Safran'),' pour la production du missile air-sol ',h('strong',null,'HAMMER en Inde'),' a \u00e9t\u00e9 formalis\u00e9e en f\u00e9vrier 2026. Le HAMMER \u00e9quipe d\u00e9j\u00e0 les 36 Rafale indiens actuels \u2014 la production locale est une condition sine qua non du programme MRFA (source\u00a0: Aviation Week, \u00c9lys\u00e9e).'
   ),

   h('h3',null,'Falcon 2000LXS et Dassault Syst\u00e8mes'),
   h('p',null,
    'Dassault Aviation pr\u00e9voit l\u2019',h('strong',null,'assemblage du Falcon 2000LXS en Inde'),' \u2014 une premi\u00e8re pour l\u2019aviation d\u2019affaires hors de France, avec un premier vol attendu en ',h('strong',null,'2028'),'. C\u00f4t\u00e9 num\u00e9rique, ',h('strong',null,'Dassault Syst\u00e8mes'),' a annonc\u00e9 une expansion R&D de ',h('strong',null,'\u20ac100 millions \u00e0 Pune'),', renfor\u00e7ant l\u2019empreinte du groupe dans le pays. Dassault Aviation a livr\u00e9 26 Rafale en 2025 et pr\u00e9voit 28 livraisons en 2026, avec un chiffre d\u2019affaires de \u20ac7,42 milliards en 2025 (source\u00a0: Dassault Aviation press).'
   ),

   h('div',{className:'insight-box not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#006650] mb-2'},'Inflexion Insight \u2014 Transfert industriel in\u00e9dit'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Pour la premi\u00e8re fois, Dassault transf\u00e8re une capacit\u00e9 de production compl\u00e8te du Rafale hors de France. L\u2019usine de Nagpur ne sera pas une simple ligne d\u2019assemblage, mais un ',h('strong',null,'hub industriel autonome'),' capable de supporter commandes indiennes et exports. Ce mod\u00e8le pourrait \u00eatre r\u00e9pliqu\u00e9 pour d\u2019autres clients si l\u2019Inde d\u00e9montre la viabilit\u00e9 du sch\u00e9ma \u00ab\u00a0Make in India\u00a0\u00bb appliqu\u00e9 \u00e0 l\u2019a\u00e9ronautique militaire.'
    )
   ),

   // ─── III. Le corridor d\u00e9fense Tamil Nadu ────────────────────────────────────
   h('h2',null,'III. Le corridor d\u00e9fense Tamil Nadu\u00a0: l\u2019\u00e9cosyst\u00e8me fran\u00e7ais en formation'),

   h('h3',null,'\u20b923\u00a0000 Cr investis, \u20b975\u00a0000 Cr vis\u00e9s'),
   h('p',null,
    'Le ',h('strong',null,'Tamil Nadu Defence Industrial Corridor'),', l\u2019un des deux corridors d\u00e9fense officiels de l\u2019Inde, a d\u00e9j\u00e0 s\u00e9curis\u00e9 ',h('strong',null,'\u20b923\u00a0000\u00a0Cr d\u2019investissements'),'. L\u2019objectif fix\u00e9 par le gouvernement central et l\u2019\u00c9tat est d\u2019atteindre ',h('strong',null,'\u20b975\u00a0000\u00a0Cr d\u2019investissements a\u00e9rospatiale-d\u00e9fense d\u2019ici 2032'),'. Le corridor s\u2019appuie sur trois parcs a\u00e9rospatiaux strat\u00e9giques\u00a0: ',h('strong',null,'Sulur'),' (Coimbatore), ',h('strong',null,'Vallam Vadagal'),' (Trichy) et ',h('strong',null,'Sriperumbudur'),' (Chennai), chacun dot\u00e9 d\u2019infrastructures d\u00e9di\u00e9es et de r\u00e9gimes fiscaux attractifs (source\u00a0: Invest India, tndefencecorridor.in).'
   ),

   h('h3',null,'Spatial et missiles\u00a0: Tuticorin et le SSLV'),
   h('p',null,
    'Le corridor int\u00e8gre un ',h('strong',null,'Space Propellant Park \u00e0 Tuticorin'),', \u00e0 proximit\u00e9 des installations ISRO, ainsi qu\u2019une ',h('strong',null,'installation SSLV de 2\u00a0300 acres'),' actuellement en construction, avec une mise en service pr\u00e9vue en ',h('strong',null,'d\u00e9cembre 2026'),'. L\u2019int\u00e9gration spatial-d\u00e9fense est une sp\u00e9cificit\u00e9 du mod\u00e8le tamoul, qui permet aux entreprises de mutualiser les comp\u00e9tences propulsion et mat\u00e9riaux composites entre programmes civils et militaires (source\u00a0: Business Standard, PIB India).'
   ),

   h('h3',null,'Un \u00e9cosyst\u00e8me mature'),
   h('p',null,
    'Le Tamil Nadu compte d\u00e9j\u00e0 ',h('strong',null,'120+ entreprises de fabrication a\u00e9rospatiale'),', ',h('strong',null,'700+ fournisseurs des PSU d\u00e9fense'),' (HAL, BEL, BEML) et produit ',h('strong',null,'5\u00a0000 ing\u00e9nieurs a\u00e9ronautiques par an'),' gr\u00e2ce \u00e0 ses universit\u00e9s techniques (IIT Madras, Anna University, Madras Institute of Technology). L\u2019AeroDefCon 2025, salon d\u00e9fense organis\u00e9 \u00e0 Chennai, a r\u00e9uni ',h('strong',null,'300+ entreprises de 19 pays'),', g\u00e9n\u00e9rant ',h('strong',null,'5\u00a0000+ rencontres B2B'),' et 1\u00a0000 d\u00e9l\u00e9gu\u00e9s (source\u00a0: Tamil Nadu Defence Corridor, The Federal).'
   ),

   h('h3',null,'Chantiers navals\u00a0: la dimension maritime'),
   h('p',null,
    'Le volet naval est massif. ',h('strong',null,'Cochin Shipyard'),' et ',h('strong',null,'Mazagon Dock'),' ont chacun sign\u00e9 des contrats de ',h('strong',null,'\u20b915\u00a0000\u00a0Cr'),' en septembre 2025 pour de nouveaux chantiers navals, g\u00e9n\u00e9rant chacun ',h('strong',null,'10\u00a0000 emplois directs et 50\u00a0000 emplois indirects'),'. Ces capacit\u00e9s sont directement li\u00e9es aux programmes de fr\u00e9gates, sous-marins et patrouilleurs o\u00f9 Naval Group (ex-DCNS) et Thales sont positionn\u00e9s (source\u00a0: Business Standard, PIB India).'
   ),

   h('h3',null,'Terres rares\u00a0: le maillon critique'),
   h('p',null,
    'Le Budget 2026 a cr\u00e9\u00e9 des \u00ab\u00a0',h('strong',null,'corridors de terres rares'),'\u00a0\u00bb dans le Tamil Nadu, le Kerala, l\u2019Odisha et l\u2019Andhra Pradesh, dot\u00e9s du ',h('strong',null,'\u20b97\u00a0280\u00a0Cr REPM Manufacturing Scheme'),' (',h('em',null,'Rare Earth Permanent Magnet'),') pour r\u00e9duire la d\u00e9pendance \u00e0 la Chine. Les aimants permanents sont essentiels aux moteurs \u00e9lectriques, \u00e0 l\u2019avionique et aux syst\u00e8mes de guidage \u2014 un enjeu direct pour la cha\u00eene de valeur Rafale (source\u00a0: PIB India, Business Standard).'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Opportunit\u00e9 PME fran\u00e7aises'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le corridor d\u00e9fense TN concentre ',h('strong',null,'700+ fournisseurs existants'),' et produit ',h('strong',null,'5\u00a0000 ing\u00e9nieurs a\u00e9ro par an'),'. Pour une PME fran\u00e7aise d\u2019usinage de pr\u00e9cision ou de traitement de surface, c\u2019est un point d\u2019entr\u00e9e direct dans la supply chain Rafale \u2014 avec un co\u00fbt de main-d\u2019\u0153uvre ',h('strong',null,'5 \u00e0 8\u00d7 inf\u00e9rieur \u00e0 la France'),'. Cr\u00e9neaux prioritaires\u00a0: usinage CNC a\u00e9ronautique, traitement de surface (anodisation, peinture technique), composites structurels, sous-syst\u00e8mes avioniques, bancs d\u2019essai et outillage sp\u00e9cial.'
    )
   ),

   // ─── IV. Tamil Nadu\u00a0: au-del\u00e0 de la d\u00e9fense ──────────────────────────────────
   h('h2',null,'IV. Tamil Nadu\u00a0: au-del\u00e0 de la d\u00e9fense, le hub manufacturier total'),

   h('h3',null,'Poids \u00e9conomique et dynamique'),
   h('p',null,
    'Le Tamil Nadu est la ',h('strong',null,'deuxi\u00e8me plus grande \u00e9conomie r\u00e9gionale de l\u2019Inde'),', repr\u00e9sentant ',h('strong',null,'9,4\u00a0% du PIB national'),'. Son GSDP atteint ',h('strong',null,'~410\u00a0milliards\u00a0$'),' pour l\u2019exercice 2025-26, avec une croissance r\u00e9elle de ',h('strong',null,'9\u00a0%'),'. Le secteur manufacturier cro\u00eet de ',h('strong',null,'14,74\u00a0%'),' \u2014 trois fois la moyenne nationale. L\u2019\u00c9tat concentre ',h('strong',null,'41\u00a0% des exportations d\u2019\u00e9lectronique indiennes'),' et a multipli\u00e9 par huit ses exports \u00e9lectroniques en quelques ann\u00e9es, port\u00e9 par la strat\u00e9gie China+1 (Foxconn, Pegatron, Flex). Le PMI manufacturier indien atteint ',h('strong',null,'56,9'),' en f\u00e9vrier 2026, signal d\u2019expansion soutenue (source\u00a0: Tamil Nadu Budget, Business Standard).'
   ),

   h('h3',null,'Pr\u00e9sence fran\u00e7aise'),
   h('p',null,
    h('strong',null,'29 entreprises fran\u00e7aises'),' ont leur si\u00e8ge r\u00e9gional au Tamil Nadu. ',h('strong',null,'Renault'),' est en train d\u2019acqu\u00e9rir la participation de 51\u00a0% de Nissan dans l\u2019usine de Chennai, avec un investissement de ',h('strong',null,'$600 millions'),' pour six nouveaux mod\u00e8les dont deux v\u00e9hicules \u00e9lectriques. ',h('strong',null,'Saint-Gobain'),' investit $400 millions dans un greenfield \u00e0 Oragadam, portant son investissement total \u00e0 \u20b98\u00a0000\u00a0Cr dans l\u2019\u00c9tat. Michelin, Valeo, Schneider Electric et L\u2019Or\u00e9al compl\u00e8tent un tissu industriel fran\u00e7ais dense (source\u00a0: Business Standard, BW Businessworld).'
   ),

   h('h3',null,'Infrastructures en construction'),
   h('p',null,
    'L\u2019\u00c9tat b\u00e9n\u00e9ficie d\u2019un cycle d\u2019investissement massif en infrastructures. L\u2019',h('strong',null,'autoroute Bangalore-Chennai (262\u00a0km)'),' est quasi achev\u00e9e. Le ',h('strong',null,'port ext\u00e9rieur de Chennai'),' fait l\u2019objet d\u2019une expansion de \u20b915\u00a0000\u00a0Cr. Deux ',h('strong',null,'corridors de train \u00e0 grande vitesse'),' sont planifi\u00e9s avec Chennai comme hub (Chennai-Bangalore et Chennai-Hyderabad). Un ',h('strong',null,'Multimodal Logistics Park'),' \u00e0 Chennai sera op\u00e9rationnel en 2025-26. L\u2019ensemble cr\u00e9e un \u00e9cosyst\u00e8me logistique int\u00e9gr\u00e9 id\u00e9al pour les exportations manufacturi\u00e8res (source\u00a0: Invest India, PIB India).'
   ),

   h('h3',null,'\u00c9nergie et China+1'),
   h('p',null,
    'Le Tamil Nadu dispose de ',h('strong',null,'10\u00a0GW de capacit\u00e9 solaire install\u00e9e'),' avec un objectif de 20\u00a0GW, plus des projets BESS (',h('em',null,'Battery Energy Storage Systems'),') de 500\u00a0MW. L\u2019\u00c9tat est le principal b\u00e9n\u00e9ficiaire indien de la strat\u00e9gie ',h('strong',null,'China+1'),'\u00a0: Foxconn, Dell et HP y assemblent d\u00e9sormais une part croissante de leurs produits. Les exportations d\u2019\u00e9lectronique ont \u00e9t\u00e9 multipli\u00e9es par huit, faisant du Tamil Nadu le premier \u00c9tat exportateur d\u2019\u00e9lectronique en Inde (source\u00a0: Tamil Nadu Budget, The Federal).'
   ),

   // ─── V. Risques et turbulences ────────────────────────────────────────────────
   h('h2',null,'V. Risques et turbulences'),

   h('h3',null,'\u00c9lections Tamil Nadu 2026'),
   h('p',null,
    'Les \u00e9lections r\u00e9gionales du Tamil Nadu pr\u00e9vues en 2026 introduisent une incertitude politique significative. Le ',h('strong',null,'DMK au pouvoir'),' (36-38\u00a0% d\u2019intentions de vote) fait face \u00e0 un perturbateur inattendu\u00a0: le ',h('strong',null,'TVK'),' (parti de l\u2019acteur Vijay, 12-23\u00a0% selon les sondages), qui pourrait fragmenter le vote anti-AIADMK et rendre le r\u00e9sultat impr\u00e9visible. Un changement de gouvernement pourrait ralentir l\u2019ex\u00e9cution des projets du corridor d\u00e9fense, m\u00eame si la politique industrielle b\u00e9n\u00e9ficie d\u2019un consensus transpartisan au Tamil Nadu.'

   h('p',null,
