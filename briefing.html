<script type="module">

return()=>window.removeEventListener('scroll',fn)

return()=>document.body.classList.remove('menu-open')
},[open])
return h('div',null,
 h('div',{className:'fixed top-0 left-0 right-0 z-[51] h-[3px] bg-[#C8955A]'}),
 h('header',{className:`fixed top-[3px] left-0 right-0 z-50 transition-all duration-300 ${scrolled?'nav-scrolled':'bg-transparent'}`},
  h('div',{className:'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8'},

    ),
    h('nav',{className:'hidden md:flex items-center gap-1'},

      h('div',{key:ci,className:'mega-trigger'},
       h('span',{className:`nav-link px-3 py-2 text-sm font-medium transition-colors cursor-default select-none ${scrolled?'text-gray-500 hover:text-[#006650]':'text-white/70 hover:text-white'}`},cat.label),
       h('div',{className:'mega-menu bg-white rounded-2xl shadow-xl border border-gray-100 p-5'},
        h('div',{className:'grid gap-1'},
         ...cat.children.map((item,ii)=>
          h('a',{key:ii,href:item.href,className:'mega-item flex items-start gap-3 px-3 py-2.5 rounded-xl no-underline'},

    ),

     h('span',{style:scrolled?{}:{background:'#fff'}}),h('span',{style:scrolled?{}:{background:'#fff'}}),h('span',{style:scrolled?{}:{background:'#fff'}})
    )
   )
  )
 ),
 h('div',{className:`mobile-overlay fixed inset-0 z-[60] flex flex-col ${open?'open':''}`,style:{backgroundColor:'#006650'}},
  h('div',{className:'flex items-center justify-between px-6 pt-5 pb-4 flex-shrink-0'},
   h('img',{src:'logo-header.png',alt:'Inflexion',className:'h-8 w-auto',style:{filter:'brightness(10) saturate(0)'}}),
   h('button',{onClick:()=>setOpen(false),className:'w-11 h-11 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors','aria-label':'Fermer'},
    h('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',className:'text-white'},h('path',{d:'M18 6L6 18M6 6l12 12'}))
   )
  ),

   ...MEGA_NAV.map((cat,ci)=>[
    h('p',{key:'h'+ci,className:'menu-item text-[11px] uppercase tracking-[.2em] text-white/40 font-semibold mb-3'+(ci>0?' mt-8':''),style:{animationDelay:`${0.05+ci*0.18}s`}},cat.label),
    ...cat.children.map((item,ii)=>
     h('a',{key:'m'+ci+'-'+ii,href:item.href,onClick:()=>setOpen(false),className:'menu-item flex items-center gap-3 py-3 text-white/90 hover:text-white transition-colors border-b border-white/8',style:{animationDelay:`${0.08+ci*0.18+ii*0.05}s`}},
      h('span',{className:'text-base'},item.icon),
      h('span',{className:'text-base sm:text-lg md:text-[20px] font-medium'},item.label)
     )
    )
   ]).flat()
  ),
  h('div',{className:'px-6 pt-4 pb-20 flex-shrink-0'},

// ─── HERO ────────────────────────────────────────────────────────────────────

function BriefingHero({briefing}){
var heroRef=useRef(null)
useEffect(function(){
var el=heroRef.current
if(!el)return
var onScroll=function(){
var r=el.getBoundingClientRect()
var p=Math.max(0,Math.min(1,-r.top/(r.height||1)))
el.style.setProperty('--scroll',p)
var content=el.querySelector('.hero-content')
if(content){content.style.transform='translateY('+p*40+'px)';content.style.opacity=1-p*0.6}
}
window.addEventListener('scroll',onScroll,{passive:true})
return function(){window.removeEventListener('scroll',onScroll)}
},[])

var dateStr=''
if(briefing&&briefing.date){
try{dateStr=new Date(briefing.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}catch(e){}
}

var sentimentLabel=briefing&&briefing.sentiment_global?briefing.sentiment_global:'neutre'
var sentimentColor=sentimentLabel==='haussier'?'#10b981':sentimentLabel==='baissier'?'#ef4444':sentimentLabel==='mixte'?'#eab308':'#94a3b8'

return h('section',{ref:heroRef,className:'hero-dynamic relative pt-28 pb-24 md:pt-36 md:pb-28'},
 h('div',{className:'hero-content relative z-[3] max-w-3xl mx-auto px-4 sm:px-6',style:{willChange:'transform,opacity'}},
  h('div',{className:'anim-fade-up flex items-center gap-3 mb-6'},
   h('span',{className:'px-3 py-1 text-[10px] font-semibold uppercase tracking-wider text-white rounded bg-[#33B894]'},'BRIEFING STRAT\u00c9GIQUE'),
   h('span',{className:'text-xs uppercase tracking-wider text-white/50'},'Intelligence quotidienne')
  ),
  h('h1',{className:'anim-fade-up anim-d1 text-2xl sm:text-3xl md:text-[2.75rem] font-bold text-white leading-[1.15] tracking-tight',style:{fontFamily:'Libre Baskerville, Georgia, serif'}},
   briefing&&briefing.synthese&&briefing.synthese.titre?briefing.synthese.titre:'Briefing du jour'
  ),
  briefing&&briefing.synthese&&briefing.synthese.sous_titre?
   h('p',{className:'anim-fade-up anim-d2 mt-5 text-base md:text-lg text-white/60 leading-relaxed'},briefing.synthese.sous_titre):
   h('p',{className:'anim-fade-up anim-d2 mt-5 text-base md:text-lg text-white/60 leading-relaxed'},'Synth\u00e8se IA quotidienne \u2014 signaux g\u00e9opolitiques, financiers et risk radar'),
  h('div',{className:'anim-fade-up anim-d3 mt-8 flex flex-wrap items-center gap-5 text-sm text-white/40'},
   h('div',{className:'w-12 h-[2px] bg-[#C8955A]'}),
   h('span',null,h('strong',{className:'text-white/60'},'Inflexion Research')),
   dateStr?h('span',null,dateStr):null,
   h('span',{style:{color:sentimentColor,fontWeight:700,textTransform:'uppercase',fontSize:'0.75rem',letterSpacing:'0.05em'}},sentimentLabel)
  )
 ),
 h('div',{className:'hero-wave'},
  h('svg',{viewBox:'0 0 1440 80',preserveAspectRatio:'none',xmlns:'http://www.w3.org/2000/svg'},
   h('path',{d:'M0,40 C180,80 360,0 540,40 C720,80 900,10 1080,40 C1200,60 1350,20 1440,40 L1440,80 L0,80 Z',fill:'#FFFFFF',fillOpacity:'0.07'}),
   h('path',{d:'M0,50 C200,20 400,70 600,40 C800,10 1000,60 1200,35 C1320,20 1400,50 1440,45 L1440,80 L0,80 Z',fill:'#FFFFFF',fillOpacity:'0.05'}),
   h('path',{d:'M0,60 C240,40 480,75 720,55 C960,35 1200,65 1440,50 L1440,80 L0,80 Z',fill:'#FFFFFF'})
  )
 )
)
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function md(s){
if(!s)return''
return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')
}
function mdBlock(s){
if(!s)return''
var lines=s.split('\n')
var html=''
var inList=false
for(var i=0;i<lines.length;i++){
var line=lines[i]
if(/^#{2,3}\s/.test(line)){
if(inList){html+='</ul>';inList=false}
var level=line.match(/^(#{2,3})/)[1].length
var text=line.replace(/^#{2,3}\s+/,'')
html+='<h'+level+' class="article-section-title">'+md(text)+'</h'+level+'>'
}else if(/^[-*]\s/.test(line)){
if(!inList){html+='<ul style="list-style:none;padding:0;margin:0.75rem 0">';inList=true}
html+='<li style="position:relative;padding-left:1.2rem;margin-bottom:0.4rem;font-size:0.9rem;color:rgba(255,255,255,0.85);line-height:1.6"><span style="position:absolute;left:0;color:rgba(255,255,255,0.5);font-weight:700">\u25B8</span>'+md(line.replace(/^[-*]\s+/,''))+'</li>'
}else if(line.trim()){
if(inList){html+='</ul>';inList=false}
html+='<p>'+md(line)+'</p>'
}
}
if(inList)html+='</ul>'
return html
}

function formatDate(d){
if(!d)return''
try{return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}catch(e){return d}
}

// ─── BRIEFING CONTENT ────────────────────────────────────────────────────────

function BriefingContent({briefing}){
if(!briefing)return h('div',{className:'max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 text-center'},
 h('p',{className:'text-[#5A6178] text-lg'},'Chargement du briefing\u2026')
)

var s=briefing.synthese||{}

return h('div',{className:'max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-16'},

 // Intro bar
 h('div',{className:'flex items-center gap-3 mb-8 pb-4 border-b border-[#E2E5EB]'},
  h('div',{className:'w-1 h-10 bg-[#C8955A] rounded-sm flex-shrink-0'}),
  h('p',{className:'text-sm text-[#5A6178] leading-relaxed m-0'},
   'Chaque jour, notre pipeline IA agr\u00e8ge ',h('strong',{className:'text-[#1A1F2E]'},'15 APIs'),' et ',h('strong',{className:'text-[#1A1F2E]'},'163 flux RSS'),' pour produire une synth\u00e8se structur\u00e9e des signaux g\u00e9opolitiques et financiers \u00e0 surveiller.'
  )
 ),

 // Signal du jour
 briefing.signal_du_jour?h('div',{className:'signal-du-jour mb-6'},
  h('div',{className:'signal-du-jour-label'},'Signal du jour'),
  h('p',{className:'signal-du-jour-text',dangerouslySetInnerHTML:{__html:md(briefing.signal_du_jour)}})
 ):null,

 // Synthese content
 s.contenu?h('div',{className:'article-du-jour rounded-xl p-6 sm:p-8 mb-8'},
  h('div',{className:'article-du-jour-content',dangerouslySetInnerHTML:{__html:mdBlock(s.contenu)}})
 ):null,

 // Signaux
 briefing.signaux&&briefing.signaux.length>0?h('div',{className:'mb-8'},
  h('h3',{className:'briefing-section-title'},'Enjeux cl\u00e9s du jour'),
  h('div',{className:'space-y-3'},
   ...briefing.signaux.map(function(sig,i){
    var sevClass=sig.severite==='urgent'?'severity-urgent':sig.severite==='attention'?'severity-attention':'severity-info'
    return h('div',{key:i,className:'signal-card '+sevClass},
     h('div',{className:'signal-header'},
      h('h4',{className:'signal-title',dangerouslySetInnerHTML:{__html:md(sig.titre)}}),
      h('span',{className:'signal-severity-badge '+sevClass},sig.severite)
     ),
     h('p',{className:'signal-description',dangerouslySetInnerHTML:{__html:md(sig.description)}}),
     sig.interconnexions&&sig.interconnexions.length>0?h('div',{className:'signal-interconnexions'},
      h('span',{className:'inter-label'},'Interconnexions :'),
      ...sig.interconnexions.map(function(inter,j){
       return h('div',{key:j,className:'inter-item'},
        h('span',{className:'inter-arrow'},'\u2192'),
        h('strong',null,inter.secteur),' ',
        h('span',{className:'inter-impact'},inter.impact),
        inter.explication?h('span',{className:'inter-explication'},' \u2014 '+inter.explication):null
       )
      })
     ):null,
     sig.regions&&sig.regions.length>0?h('div',{className:'signal-regions'},
      ...sig.regions.map(function(r,j){return h('span',{key:j,className:'region-tag'},r)})
     ):null
    )
   })
  )
 ):null,

 // Risk Radar
 briefing.risk_radar&&briefing.risk_radar.length>0?h('div',{className:'mb-8'},
  h('h3',{className:'briefing-section-title'},'Radar des Risques'),
  h('div',{className:'space-y-3'},
   ...briefing.risk_radar.map(function(risk,i){
    var sevClass=risk.severite==='urgent'?'severity-urgent':risk.severite==='attention'?'severity-attention':'severity-info'
    var probaLabel=risk.probabilite==='elevee'?'Probabilit\u00e9 \u00e9lev\u00e9e':risk.probabilite==='moyenne'?'Probabilit\u00e9 moyenne':'Probabilit\u00e9 faible'
    return h('div',{key:i,className:'risk-item '+sevClass},
     h('div',{className:'risk-header'},
      h('strong',{className:'risk-title',dangerouslySetInnerHTML:{__html:md(risk.risque)}}),
      h('span',{className:'risk-severity-badge '+sevClass},risk.severite)
     ),
     h('p',{className:'risk-description',dangerouslySetInnerHTML:{__html:md(risk.description)}}),
     h('div',{className:'risk-meta'},
      h('span',{className:'risk-proba'},probaLabel),
      h('span',{className:'risk-impact'},'Impact : ',risk.impact_marche||'')
     )
    )
   })
  )
 ):null,

 // Themes a surveiller
 (function(){
  var themes=briefing.themes_a_surveiller||briefing.positionnement
  if(!themes||themes.length===0)return null
  var disclaimer=briefing.themes_disclaimer||briefing.positionnement_disclaimer||'Ces \u00e9l\u00e9ments sont des observations factuelles et ne constituent pas un conseil en investissement. Consultez un professionnel agr\u00e9\u00e9 (CIF-AMF) avant toute d\u00e9cision.'
  return h('div',{className:'briefing-positionnement mb-8'},
   h('h3',{className:'briefing-section-title'},'Th\u00e8mes \u00e0 surveiller'),
   ...themes.map(function(pos,i){
    var dyn=pos.dynamique||pos.direction||'neutre'
    var dirClass=dyn==='haussiere'||dyn==='surponderer'?'pos-long':dyn==='baissiere'||dyn==='sous-ponderer'?'pos-short':dyn==='volatile'||dyn==='hedge'?'pos-hedge':'pos-neutral'
    var dirLabel=dyn==='haussiere'||dyn==='surponderer'?'Haussi\u00e8re':dyn==='baissiere'||dyn==='sous-ponderer'?'Baissi\u00e8re':dyn==='volatile'||dyn==='hedge'?'Volatile':'Neutre'
    return h('div',{key:i,className:'pos-item '+dirClass},
     h('div',{className:'pos-header'},
      h('strong',{className:'pos-actif'},pos.actif||''),
      h('span',{className:'pos-direction'},dirLabel)
     ),
     h('p',{className:'pos-details'},pos.details||'')
    )
   }),
   h('p',{className:'pos-disclaimer'},disclaimer)
  )
 })(),

 // Agenda
 briefing.agenda&&briefing.agenda.length>0?h('div',{className:'briefing-agenda mb-8'},
  h('h3',{className:'briefing-section-title'},'Agenda de la semaine'),
  ...briefing.agenda.map(function(evt,i){
   return h('div',{key:i,className:'agenda-item'},
    h('span',{className:'agenda-date'},evt.date||''),
    h('span',{className:'agenda-heure'},evt.heure||''),
    h('span',{className:'agenda-event'},evt.evenement||''),
    h('span',{className:'agenda-impact'},evt.impact_attendu||'')
   )
  })
 ):null,

 // Tags
 briefing.tags&&briefing.tags.length>0?h('div',{className:'flex flex-wrap gap-2 mt-6 pt-4 border-t border-[#E2E5EB]'},
  ...briefing.tags.map(function(t,i){
   return h('span',{key:i,className:'px-3 py-1 text-xs font-medium bg-[#006650]/10 text-[#006650] rounded-full'},t)
  })
 ):null
)
}

function App(){
var ref=useState(null)
var briefing=ref[0]
var setBriefing=ref[1]

useEffect(function(){
fetch('data/daily-briefing.json').then(function(r){return r.ok?r.json():null}).then(function(d){
if(d&&d.synthese&&d.synthese.titre)setBriefing(d)
}).catch(function(){})
},[])

return h('div',null,
 h(Navigation),
 h('main',{id:'main-content'},
  h(BriefingHero,{briefing:briefing}),
  h(BriefingContent,{briefing:briefing})
 ),
 h(Footer)
)
}

createRoot(document.getElementById('app')).render(h(App))
</script>
