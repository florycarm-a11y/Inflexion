<script type="module">
import React,{useState,useEffect,useRef,useCallback} from 'https://esm.sh/react@18.2.0'
import{createRoot}from 'https://esm.sh/react-dom@18.2.0/client'

var h=React.createElement
var MEGA_NAV=window.MEGA_NAV

// ─── HOOKS ──────────────────────────────────────────────────────────────────

function useInView(opts){
var ref=useRef(null)
var vis=useState(false)
var visible=vis[0],setVisible=vis[1]
useEffect(function(){
if(!ref.current)return
var io=new IntersectionObserver(function(entries){
if(entries[0].isIntersecting){setVisible(true);if(!(opts&&opts.repeat))io.disconnect()}
else if(opts&&opts.repeat)setVisible(false)
},{threshold:(opts&&opts.threshold)||0.12,rootMargin:(opts&&opts.rootMargin)||'0px'})
io.observe(ref.current)
return function(){io.disconnect()}
},[])
return[ref,visible]
}

function useActiveSection(ids){
var st=useState('')
var active=st[0],setActive=st[1]
useEffect(function(){
var observer=new IntersectionObserver(function(entries){
entries.forEach(function(e){
if(e.isIntersecting)setActive(e.target.id)
})
},{threshold:0.3,rootMargin:'-80px 0px -50% 0px'})
ids.forEach(function(id){
var el=document.getElementById(id)
if(el)observer.observe(el)
})
return function(){observer.disconnect()}
},[ids.join(',')])
return active
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function Navigation(){
var st1=useState(false),open=st1[0],setOpen=st1[1]
var st2=useState(false),scrolled=st2[0],setScrolled=st2[1]
useEffect(function(){
var fn=function(){setScrolled(window.scrollY>60)}
window.addEventListener('scroll',fn,{passive:true})
return function(){window.removeEventListener('scroll',fn)}
},[])
useEffect(function(){
if(open)document.body.classList.add('menu-open')
else document.body.classList.remove('menu-open')
return function(){document.body.classList.remove('menu-open')}
},[open])
return h('div',null,
 h('div',{className:'fixed top-0 left-0 right-0 z-[51] h-[3px] bg-[#C8955A]'}),
 h('header',{className:'fixed top-[3px] left-0 right-0 z-50 transition-all duration-300 '+(scrolled?'nav-scrolled':'bg-transparent')},
  h('div',{className:'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8'},
   h('div',{className:'flex items-center justify-between h-16'},
    h('a',{href:'index.html',className:'flex items-center gap-2'},
     h('img',{src:'logo-header.png',alt:'Inflexion',className:'h-10 sm:h-[50px] md:h-[65px] w-auto',style:{filter:scrolled?'none':'brightness(10) saturate(0) invert(0)',transition:'filter 0.3s ease'}})
    ),
    h('nav',{className:'hidden md:flex items-center gap-1'},
     MEGA_NAV.map(function(cat,ci){
      return h('div',{key:ci,className:'mega-trigger'},
       h('span',{className:'nav-link px-3 py-2 text-sm font-medium transition-colors cursor-default select-none '+(scrolled?'text-gray-500 hover:text-[#006650]':'text-white/70 hover:text-white')},cat.label),
       h('div',{className:'mega-menu bg-white rounded-2xl shadow-xl border border-gray-100 p-5'},
        h('div',{className:'grid gap-1'},
         cat.children.map(function(item,ii){
          return h('a',{key:ii,href:item.href,className:'mega-item flex items-start gap-3 px-3 py-2.5 rounded-xl no-underline'},
           h('span',{className:'mega-icon bg-[#006650]/10 text-[#006650]'},item.icon),
           h('span',{className:'flex flex-col'},
            h('span',{className:'text-sm font-semibold text-gray-900'},item.label),
            h('span',{className:'text-xs text-gray-500 mt-0.5'},item.desc)
           )
          )
         })
        )
       )
      )
     }),
     h('a',{href:'premium.html',className:'ml-4 px-4 py-2 bg-[#006650] hover:bg-[#06402A] text-white font-semibold text-sm rounded-lg transition-colors'},'R\u00e9server un diagnostic')
    ),
    h('button',{className:'hamburger md:hidden p-2 '+(open?'open':''),'aria-label':'Menu',onClick:function(){setOpen(!open)}},
     h('span',{style:scrolled?{}:{background:'#fff'}}),h('span',{style:scrolled?{}:{background:'#fff'}}),h('span',{style:scrolled?{}:{background:'#fff'}})
    )
   )
  )
 ),
 h('div',{className:'mobile-overlay fixed inset-0 z-[60] flex flex-col '+(open?'open':''),style:{backgroundColor:'#006650'}},
  h('div',{className:'flex items-center justify-between px-6 pt-5 pb-4 flex-shrink-0'},
   h('img',{src:'logo-header.png',alt:'Inflexion',className:'h-8 w-auto',style:{filter:'brightness(10) saturate(0)'}}),
   h('button',{onClick:function(){setOpen(false)},className:'w-11 h-11 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors','aria-label':'Fermer'},
    h('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',className:'text-white'},h('path',{d:'M18 6L6 18M6 6l12 12'}))
   )
  ),
  h('div',{className:'flex-1 overflow-y-auto px-6 pt-2 pb-4'},
   MEGA_NAV.map(function(cat,ci){
    return[
     h('p',{key:'h'+ci,className:'menu-item text-[11px] uppercase tracking-[.2em] text-white/40 font-semibold mb-3'+(ci>0?' mt-8':''),style:{animationDelay:(0.05+ci*0.18)+'s'}},cat.label)
    ].concat(cat.children.map(function(item,ii){
     return h('a',{key:'m'+ci+'-'+ii,href:item.href,onClick:function(){setOpen(false)},className:'menu-item flex items-center gap-3 py-3 text-white/90 hover:text-white transition-colors border-b border-white/8',style:{animationDelay:(0.08+ci*0.18+ii*0.05)+'s'}},
      h('span',{className:'text-base'},item.icon),
      h('span',{className:'text-base sm:text-lg md:text-[20px] font-medium'},item.label)
     )
    }))
   }).flat()
  ),
  h('div',{className:'px-6 pt-4 pb-20 flex-shrink-0'},
   h('a',{href:'premium.html',onClick:function(){setOpen(false)},className:'menu-item block w-full text-center px-6 py-3.5 bg-white/10 hover:bg-white/15 text-white font-semibold rounded-xl transition-colors text-base',style:{animationDelay:'0.85s'}},'R\u00e9server un diagnostic')
  )
 )
)
}

// ─── REVEAL WRAPPER ─────────────────────────────────────────────────────────

function Reveal(props){
var r=useInView({threshold:0.08})
var ref=r[0],visible=r[1]
return h('div',{ref:ref,className:'reveal-section'+(visible?' visible':'')+(props.className?' '+props.className:''),style:props.delay?{transitionDelay:props.delay+'s'}:undefined},props.children)
}

// ─── HERO ────────────────────────────────────────────────────────────────────

function BriefingHero(props){
var briefing=props.briefing
var heroRef=useRef(null)
useEffect(function(){
var el=heroRef.current
if(!el)return
var onScroll=function(){
var r=el.getBoundingClientRect()
var p=Math.max(0,Math.min(1,-r.top/(r.height||1)))
var content=el.querySelector('.hero-content')
if(content){content.style.transform='translateY('+p*40+'px)';content.style.opacity=1-p*0.6}
}
window.addEventListener('scroll',onScroll,{passive:true})
return function(){window.removeEventListener('scroll',onScroll)}
},[])

var dateStr=''
if(briefing&&briefing.date){
try{dateStr=new Date(briefing.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}catch(e){}
}

var sentimentLabel=briefing&&briefing.sentiment_global?briefing.sentiment_global:'neutre'
var sentimentColor=sentimentLabel==='haussier'?'#10b981':sentimentLabel==='baissier'?'#ef4444':sentimentLabel==='mixte'?'#eab308':'#94a3b8'
var sentimentBg=sentimentLabel==='haussier'?'rgba(16,185,129,.15)':sentimentLabel==='baissier'?'rgba(239,68,68,.15)':sentimentLabel==='mixte'?'rgba(234,179,8,.15)':'rgba(148,163,184,.15)'

var signalCount=briefing&&briefing.signaux?briefing.signaux.length:0
var riskCount=briefing&&briefing.risk_radar?briefing.risk_radar.length:0
var sourcesCount=briefing&&briefing.sources_count?briefing.sources_count:0

return h('section',{ref:heroRef,className:'hero-dynamic relative pt-28 pb-28 md:pt-36 md:pb-36'},
 h('div',{className:'hero-content relative z-[3] max-w-5xl mx-auto px-4 sm:px-6',style:{willChange:'transform,opacity'}},

  // Top meta line
  h('div',{className:'anim-fade-up flex items-center gap-3 mb-8'},
   h('span',{className:'flex items-center gap-2 px-3 py-1.5 rounded-full',style:{background:'rgba(51,184,148,.15)',border:'1px solid rgba(51,184,148,.3)'}},
    h('span',{style:{width:6,height:6,borderRadius:'50%',background:'#33B894',animation:'pulse-live 2s ease infinite',display:'inline-block'}}),
    h('span',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#33B894]'},'LIVE')
   ),
   h('span',{className:'text-[11px] uppercase tracking-wider text-white/40 font-medium'},'Briefing strat\u00e9gique')
  ),

  // Title
  h('h1',{className:'anim-fade-up anim-d1 text-2xl sm:text-3xl md:text-[2.75rem] lg:text-[3.25rem] font-bold text-white leading-[1.1] tracking-tight max-w-3xl',style:{fontFamily:'Libre Baskerville, Georgia, serif'}},
   briefing&&briefing.synthese&&briefing.synthese.titre?briefing.synthese.titre:'Briefing du jour'
  ),

  // Subtitle
  briefing&&briefing.synthese&&briefing.synthese.sous_titre?
   h('p',{className:'anim-fade-up anim-d2 mt-5 text-base md:text-lg text-white/55 leading-relaxed max-w-2xl'},briefing.synthese.sous_titre):
   h('p',{className:'anim-fade-up anim-d2 mt-5 text-base md:text-lg text-white/55 leading-relaxed max-w-2xl'},'Synth\u00e8se IA quotidienne \u2014 signaux g\u00e9opolitiques, financiers et risk radar'),

  // Meta bar
  h('div',{className:'anim-fade-up anim-d3 mt-10 flex flex-wrap items-center gap-4'},
   // Date
   h('div',{className:'flex items-center gap-2'},
    h('div',{className:'w-8 h-[2px] bg-[#C8955A]'}),
    dateStr?h('span',{className:'text-sm text-white/50'},dateStr):null
   ),
   // Sentiment pill
   h('span',{className:'px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider',style:{color:sentimentColor,background:sentimentBg,border:'1px solid '+sentimentColor+'33'}},sentimentLabel),
   // Quick stats
   h('div',{className:'hidden sm:flex items-center gap-4 ml-auto'},
    sourcesCount>0?h('span',{className:'font-data text-[11px] text-white/30'},sourcesCount+' sources'):null,
    signalCount>0?h('span',{className:'font-data text-[11px] text-white/30'},signalCount+' signaux'):null,
    riskCount>0?h('span',{className:'font-data text-[11px] text-white/30'},riskCount+' risques'):null
   )
  )

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function md(s){
if(!s)return''
return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code class="font-data text-[0.85em] px-1 py-0.5 rounded bg-[#006650]/8 text-[#006650]">$1</code>')
}
function mdBlock(s){
if(!s)return''
var lines=s.split('\n')
var html=''
var inList=false
for(var i=0;i<lines.length;i++){
var line=lines[i]
if(/^#{2,3}\s/.test(line)){
if(inList){html+='</ul>';inList=false}
var level=line.match(/^(#{2,3})/)[1].length
var text=line.replace(/^#{2,3}\s+/,'')
if(level===2)html+='<h2 style="font-family:Libre Baskerville,Georgia,serif;font-size:1.25rem;font-weight:700;color:#1A1F2E;margin:2rem 0 0.75rem;padding-bottom:0.5rem;border-bottom:2px solid #E2E5EB">'+md(text)+'</h2>'
else html+='<h3 style="font-family:Libre Baskerville,Georgia,serif;font-size:1.05rem;font-weight:700;color:#1A1F2E;margin:1.5rem 0 0.5rem">'+md(text)+'</h3>'
}else if(/^[-*]\s/.test(line)){
if(!inList){html+='<ul style="list-style:none;padding:0;margin:0.75rem 0">';inList=true}
html+='<li style="position:relative;padding-left:1.5rem;margin-bottom:0.5rem;font-size:0.9rem;color:#5A6178;line-height:1.65"><span style="position:absolute;left:0;color:#C8955A;font-weight:700;font-size:0.75rem;top:0.2rem">\u25B8</span>'+md(line.replace(/^[-*]\s+/,''))+'</li>'
}else if(line.trim()){
if(inList){html+='</ul>';inList=false}
html+='<p style="font-size:0.95rem;color:#3D4355;line-height:1.75;margin:0.75rem 0">'+md(line)+'</p>'
}
}
if(inList)html+='</ul>'
return html
}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App(){
var ref=useState(null)
var briefing=ref[0]
var setBriefing=ref[1]

useEffect(function(){
fetch('data/daily-briefing.json').then(function(r){return r.ok?r.json():null}).then(function(d){
if(d&&d.synthese&&d.synthese.titre)setBriefing(d)
}).catch(function(){})
},[])

return h('div',null,
 h(Navigation),
 h('main',{id:'main-content'},
  h(BriefingHero,{briefing:briefing}),
  h(BriefingContent,{briefing:briefing})
 ),
 h(Footer)
)
}

createRoot(document.getElementById('app')).render(h(App))
</script>
