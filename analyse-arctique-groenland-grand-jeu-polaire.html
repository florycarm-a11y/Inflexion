<style>
*{margin:0;padding:0;box-sizing:border-box}

@keyframes hero-gradient-shift{
0%{background-position:0% 50%}
25%{background-position:100% 25%}
50%{background-position:100% 75%}

100%{background-position:0% 50%}
}

.hero-dynamic::after{
content:'';

}
.hero-wave{

// ─── ARTICLE HERO ────────────────────────────────────────────────────────────

function ArticleHero(){
const heroRef=useRef(null)
useEffect(()=>{
const el=heroRef.current
if(!el)return
const onScroll=()=>{
const r=el.getBoundingClientRect()
const p=Math.max(0,Math.min(1,-r.top/(r.height||1)))
el.style.setProperty('--scroll',p)
el.querySelector('.hero-content').style.transform=`translateY(${p*40}px)`
el.querySelector('.hero-content').style.opacity=1-p*0.6
}
window.addEventListener('scroll',onScroll,{passive:true})
return()=>window.removeEventListener('scroll',onScroll)
},[])
return h('section',{ref:heroRef,className:'hero-dynamic relative pt-28 pb-24 md:pt-36 md:pb-28'},
 h('div',{className:'hero-content relative z-[3] max-w-3xl mx-auto px-4 sm:px-6',style:{willChange:'transform,opacity'}},

   h('span',{className:'px-3 py-1 text-[10px] font-semibold uppercase tracking-wider text-white rounded bg-[#2563eb]'},'G\u00c9OPOLITIQUE'),

 )

   ),

   // I. Groenland
   h('h2',null,'I. Le Groenland au coeur du grand jeu\u00a0: convoitise am\u00e9ricaine et r\u00e9sistance danoise'),
   h('p',null,
    'L\u2019\u00e9pisode le plus spectaculaire de la comp\u00e9tition arctique r\u00e9cente est la tentative de ',h('strong',null,'Donald Trump d\u2019annexer le Groenland'),'. D\u00e8s d\u00e9cembre 2025, Trump a nomm\u00e9 Jeff Landry envoy\u00e9 sp\u00e9cial pour le Groenland, avec pour mission explicite de \u00ab\u00a0faire du Groenland une partie des \u00c9tats-Unis\u00a0\u00bb. En janvier 2026, il a menac\u00e9 d\u2019imposer une ',h('strong',null,'taxe de 25\u00a0% sur les importations europ\u00e9ennes'),' si le Danemark refusait de c\u00e9der le territoire, tout en refusant d\u2019exclure l\u2019usage de la force militaire (source\u00a0: ',h('a',{href:'https://www.cnbc.com/2026/01/07/why-trump-wants-greenland-and-what-makes-it-so-important-for-security.html',target:'_blank',className:'text-[#006650] hover:underline'},'CNBC'),', ',h('a',{href:'https://www.npr.org/2026/01/07/nx-s1-5670244/trump-greenland',target:'_blank',className:'text-[#006650] hover:underline'},'NPR'),').'
   ),
   h('p',null,
    'Le 21 janvier, au Forum de Davos 2026, Trump a effectu\u00e9 un revirement partiel en s\u2019engageant \u00e0 ne pas utiliser la force ni les tarifs douaniers. Mais un \u00ab\u00a0',h('em',null,'framework deal'),'\u00a0\u00bb reste sur la table \u2014 ses contours restent flous (source\u00a0: ',h('a',{href:'https://www.aljazeera.com/news/2026/1/22/trumps-greenland-framework-deal-what-we-know-about-it-what-we-dont',target:'_blank',className:'text-[#006650] hover:underline'},'Al Jazeera'),').'
   ),
   h('p',null,
    'La motivation strat\u00e9gique est triple. ',h('strong',null,'Premi\u00e8rement'),', le Groenland chevauche le ',h('strong',null,'GIUK gap'),' (Groenland\u2013Islande\u2013Royaume-Uni), corridor maritime essentiel pour contr\u00f4ler l\u2019acc\u00e8s \u00e0 l\u2019Atlantique Nord face aux sous-marins russes. ',h('strong',null,'Deuxi\u00e8mement'),', ses ressources min\u00e9rales \u2014 terres rares, graphite, uranium, zinc, p\u00e9trole \u2014 en font un enjeu de souverainet\u00e9 technologique. ',h('strong',null,'Troisi\u00e8mement'),', la base a\u00e9rienne de Thul\u00e9 (Pituffik Space Base) constitue un maillon cl\u00e9 du syst\u00e8me d\u2019alerte antimissile am\u00e9ricain (source\u00a0: ',h('a',{href:'https://www.csis.org/analysis/greenland-rare-earths-and-arctic-security',target:'_blank',className:'text-[#006650] hover:underline'},'CSIS'),', ',h('a',{href:'https://time.com/7344877/trump-greenland-annexation-threats-purchase-national-security-economic/',target:'_blank',className:'text-[#006650] hover:underline'},'TIME'),').'
   ),
   h('p',null,
    'C\u00f4t\u00e9 groenlandais, ',h('strong',null,'85\u00a0% de la population'),' s\u2019oppose \u00e0 un rattachement am\u00e9ricain. Le mouvement ind\u00e9pendantiste gagne du terrain \u2014 les \u00e9lections parlementaires de 2026 produisent un paysage fragment\u00e9 o\u00f9 les voix en faveur d\u2019une ind\u00e9pendance acc\u00e9l\u00e9r\u00e9e se multiplient. Le Parlement europ\u00e9en a vot\u00e9 le 19 janvier 2026 une r\u00e9solution de soutien \u00e0 l\u2019int\u00e9grit\u00e9 territoriale du Groenland, les ministres nordiques r\u00e9affirmant le droit \u00e0 l\u2019autod\u00e9termination (source\u00a0: ',h('a',{href:'https://www.europarl.europa.eu/news/en/agenda/plenary-news/2026-01-19/1/support-for-greenland-s-territorial-integrity-and-sovereignty',target:'_blank',className:'text-[#006650] hover:underline'},'Parlement europ\u00e9en'),').'
   ),

   h('div',{className:'insight-box not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#006650] mb-2'},'Paradoxe groenlandais'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le Groenland d\u00e9pend du Danemark pour ',h('strong',null,'~60\u00a0% de son budget'),' via une subvention annuelle de ~3,9\u00a0milliards de couronnes danoises (~$570\u00a0M). L\u2019ind\u00e9pendance impliquerait de trouver des revenus alternatifs \u2014 pr\u00e9cis\u00e9ment l\u00e0 o\u00f9 l\u2019exploitation mini\u00e8re entre en jeu. Mais l\u2019interdiction de l\u2019extraction d\u2019uranium vot\u00e9e en 2021 bloque le projet phare de Kvanefjeld, cr\u00e9ant un dilemme entre aspirations souverainistes et r\u00e9alit\u00e9s \u00e9conomiques.'
    )
   ),

   // II. Terres rares
   h('h2',null,'II. La course aux min\u00e9raux critiques\u00a0: le tr\u00e9sor enfoui sous la glace'),
   h('p',null,
    'Le Groenland poss\u00e8de ',h('strong',null,'25 des 34 min\u00e9raux critiques'),' identifi\u00e9s par l\u2019UE dans sa liste officielle. Le gisement de ',h('strong',null,'Tanbreez'),', avec ses 28,2\u00a0millions de tonnes m\u00e9triques de terres rares, est potentiellement le plus important au monde. En juin 2025, l\u2019US Export-Import Bank a adress\u00e9 une lettre d\u2019int\u00e9r\u00eat pour un ',h('strong',null,'pr\u00eat de 120\u00a0millions de dollars'),' \u00e0 Critical Metals Corp pour financer le d\u00e9veloppement de Tanbreez (source\u00a0: ',h('a',{href:'https://www.mining.com/critical-metals-to-build-pilot-plant-in-greenland/',target:'_blank',className:'text-[#006650] hover:underline'},'MINING.COM'),').'
   ),
   h('p',null,
    'Parall\u00e8lement, le projet de graphite d\u2019',h('strong',null,'Amitsoq'),' a obtenu deux validations majeures\u00a0: la d\u00e9signation de \u00ab\u00a0Projet strat\u00e9gique\u00a0\u00bb par l\u2019UE sous le Critical Raw Materials Act en juin 2025, et une licence d\u2019exploitation de 30\u00a0ans accord\u00e9e par le Groenland en d\u00e9cembre 2025 \u00e0 GreenRoc Mining Plc (source\u00a0: ',h('a',{href:'https://www.chathamhouse.org/2025/10/race-greenlands-rare-earth-minerals-heating-uk-should-work-europe-sustainable-strategy',target:'_blank',className:'text-[#006650] hover:underline'},'Chatham House'),').'
   ),
   h('p',null,
    'Pourtant, ',h('strong',null,'aucune mine de terres rares n\u2019est en production commerciale'),' au Groenland \u00e0 ce jour. Les obstacles sont multiples\u00a0: l\u2019interdiction d\u2019extraction d\u2019uranium de 2021 (qui a bloqu\u00e9 le projet Kvanefjeld), les conditions climatiques extr\u00eames (temp\u00e9ratures descendant \u00e0 \u221240\u00b0C), l\u2019absence quasi-totale d\u2019infrastructures mini\u00e8res (pas de routes entre les localit\u00e9s), les r\u00e9sistances environnementales des communaut\u00e9s locales, et la complexit\u00e9 r\u00e9glementaire entre la gouvernance autonome groenlandaise et le cadre danois (source\u00a0: ',h('a',{href:'https://www.atlanticcouncil.org/dispatches/greenlands-critical-minerals-require-patient-statecraft/',target:'_blank',className:'text-[#006650] hover:underline'},'Atlantic Council'),').'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Enjeu industriel mondial'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'La Chine contr\u00f4le actuellement ',h('strong',null,'~60\u00a0% de la production mondiale'),' et ',h('strong',null,'~90\u00a0% du raffinage'),' des terres rares \u2014 utilis\u00e9es dans les \u00e9oliennes, v\u00e9hicules \u00e9lectriques, \u00e9lectronique de d\u00e9fense et semi-conducteurs. Le d\u00e9veloppement des gisements groenlandais est une question de ',h('strong',null,'souverainet\u00e9 technologique'),' pour l\u2019Occident, mais les experts estiment qu\u2019une production significative ne sera pas possible avant ',h('strong',null,'2030-2035'),' au plus t\u00f4t.'
    )
   ),

   // III. Russie
   h('h2',null,'III. La Russie\u00a0: le ma\u00eetre de la glace'),
   h('p',null,
    'La Russie est la puissance arctique dominante en termes de capacit\u00e9s op\u00e9rationnelles. Avec ',h('strong',null,'54\u00a0brise-glaces, dont 8 \u00e0 propulsion nucl\u00e9aire'),', Moscou dispose d\u2019une flotte sans \u00e9quivalent mondial. En comparaison, les \u00c9tats-Unis ne poss\u00e8dent que deux brise-glaces lourds op\u00e9rationnels. La Russie pr\u00e9voit ',h('strong',null,'14 brise-glaces suppl\u00e9mentaires'),' d\u2019ici 2030, dont le Lider \u2014 d\u00e9crit par Poutine comme un navire de ',h('strong',null,'150\u00a0MW sans \u00e9quivalent mondial'),' \u2014 en construction au chantier naval Zvezda (source\u00a0: ',h('a',{href:'https://www.armyrecognition.com/news/navy-news/2026/russia-builds-arctic-power-edge-over-u-s-with-lider-nuclear-icebreaker-by-2030',target:'_blank',className:'text-[#006650] hover:underline'},'Army Recognition'),').'
   ),
   h('p',null,
    'La militarisation de l\u2019Arctique russe s\u2019est acc\u00e9l\u00e9r\u00e9e depuis la guerre en Ukraine. Moscou a ',h('strong',null,'r\u00e9ouvert des bases sovi\u00e9tiques'),', d\u00e9ploy\u00e9 des syst\u00e8mes radar avanc\u00e9s, cr\u00e9\u00e9 un nouveau ',h('strong',null,'Commandement arctique'),' d\u00e9di\u00e9, et test\u00e9 des syst\u00e8mes d\u2019armes sp\u00e9cifiques \u00e0 l\u2019environnement polaire. Les brise-glaces eux-m\u00eames sont de plus en plus \u00ab\u00a0weaponis\u00e9s\u00a0\u00bb \u2014 capables de remplir des fonctions militaires en plus de leurs missions logistiques (source\u00a0: ',h('a',{href:'https://www.csis.org/analysis/ice-curtain-russias-arctic-military-presence',target:'_blank',className:'text-[#006650] hover:underline'},'CSIS'),', ',h('a',{href:'https://ecfr.eu/publication/the-bear-beneath-the-ice-russias-ambitions-in-the-arctic/',target:'_blank',className:'text-[#006650] hover:underline'},'ECFR'),').'
   ),
   h('p',null,
    'La ',h('strong',null,'route maritime du Nord (NSR)'),' est l\u2019autre pilier de la strat\u00e9gie russe. En 2025, la route a enregistr\u00e9 ',h('strong',null,'103 transits par 88 navires'),' distincts, avec un volume total de 37\u00a0millions de tonnes de fret \u2014 en l\u00e9ger recul de 2,3\u00a0% par rapport \u00e0 2024, loin de l\u2019objectif de 80\u00a0Mt fix\u00e9 par Moscou. La NSR reste limit\u00e9e \u00e0 une saison navigable de ',h('strong',null,'quatre mois et demi'),' (source\u00a0: ',h('a',{href:'https://www.highnorthnews.com/en/northern-sea-route-2025-season-concludes-stable-transit-traffic-amid-challenging-ice-conditions',target:'_blank',className:'text-[#006650] hover:underline'},'High North News'),', ',h('a',{href:'https://euromaidanpress.com/2026/02/10/russia-arctic-shipping-route-decline/',target:'_blank',className:'text-[#006650] hover:underline'},'Euromaidan Press'),').'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Axe Moscou\u2013P\u00e9kin sur le passage arctique'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le 14 octobre 2025, la Russie et la Chine ont sign\u00e9 un accord pour ',h('strong',null,'d\u00e9velopper conjointement la route maritime du Nord'),', transformant le passage en \u00e9pine dorsale de la \u00ab\u00a0Route de la Soie polaire\u00a0\u00bb. La Chine a effectu\u00e9 un ',h('strong',null,'record de 14 voyages de conteneurs'),' via l\u2019Arctique en 2025, avec des plans d\u2019expansion pour 2026. Le trajet Shanghai\u2013Rotterdam est raccourci de ',h('strong',null,'7\u00a0000\u00a0km'),' (\u221240\u00a0% vs Suez), r\u00e9duisant les co\u00fbts de carburant de plus de 20\u00a0%.'
    )
   ),

   // IV. OTAN et sécurité
   h('h2',null,'IV. L\u2019OTAN et la nouvelle fronti\u00e8re nord\u00a0: Arctic Sentry'),
   h('p',null,
    'Face \u00e0 la mont\u00e9e en puissance russe, l\u2019OTAN a op\u00e9r\u00e9 un virage strat\u00e9gique majeur. En f\u00e9vrier 2026, l\u2019Alliance a lanc\u00e9 ',h('strong',null,'Arctic Sentry'),', coordonn\u00e9 par le Joint Force Command Norfolk. En octobre 2025, le ',h('strong',null,'Centre d\u2019op\u00e9rations a\u00e9riennes combin\u00e9es (CAOC) de Bod\u00f8'),', en Norv\u00e8ge, a \u00e9t\u00e9 inauguré \u2014 il supervise d\u00e9sormais les op\u00e9rations a\u00e9riennes dans la r\u00e9gion nordique, la mer Baltique, l\u2019Atlantique Nord et la mer de Barents (source\u00a0: ',h('a',{href:'https://www.nato.int/en/what-we-do/deterrence-and-defence/arctic-security',target:'_blank',className:'text-[#006650] hover:underline'},'OTAN'),').'
   ),
   h('p',null,
    'Les d\u00e9ploiements se concr\u00e9tisent. Le Royaume-Uni ',h('strong',null,'double son contingent en Norv\u00e8ge arctique \u00e0 2\u00a0000 hommes'),' sur trois ans. La Su\u00e8de dirige une nouvelle force terrestre bas\u00e9e en Finlande d\u2019au moins ',h('strong',null,'4\u00a0000 soldats'),', avec des contributions britanniques, danoises, fran\u00e7aises, norv\u00e9giennes, islandaises et italiennes. En Alaska, le s\u00e9nateur Sullivan a d\u00e9clar\u00e9 que l\u2019\u00c9tat conna\u00eet le ',h('strong',null,'\u00ab\u00a0plus grand renforcement militaire depuis la Seconde Guerre mondiale\u00a0\u00bb'),' (source\u00a0: ',h('a',{href:'https://gvwire.com/2026/02/11/nato-is-stepping-up-arctic-security-heres-why/',target:'_blank',className:'text-[#006650] hover:underline'},'GV Wire'),', ',h('a',{href:'https://www.alaskasnewssource.com/2026/03/03/sullivan-alaska-experiencing-largest-military-buildup-since-wwii-amid-rising-arctic-threats/',target:'_blank',className:'text-[#006650] hover:underline'},'Alaska\u2019s News Source'),').'
   ),
   h('p',null,
    'L\u2019adh\u00e9sion de la Finlande (2023) et de la Su\u00e8de (2024) \u00e0 l\u2019OTAN a transform\u00e9 la g\u00e9ographie de l\u2019Alliance dans le Grand Nord\u00a0: ',h('strong',null,'sept des huit \u00c9tats arctiques sont d\u00e9sormais membres de l\u2019OTAN'),', ne laissant que la Russie en dehors. Un rapport du Hudson Institute recommande le d\u00e9ploiement massif de ',h('strong',null,'drones autonomes'),' dans l\u2019Arctique pour combler les lacunes de surveillance dans cet espace immense (source\u00a0: ',h('a',{href:'https://ipdefenseforum.com/2026/02/report-recommends-large-arctic-drone-presence-for-nato/',target:'_blank',className:'text-[#006650] hover:underline'},'Indo-Pacific Defense Forum'),').'
   ),

   // V. Norvège, Canada, Chine
   h('h2',null,'V. Norv\u00e8ge, Canada, Chine\u00a0: les autres joueurs du grand \u00e9chiquier'),
   h('h3',null,'La Norv\u00e8ge\u00a0: entre p\u00e9trole et pr\u00e9caution'),
   h('p',null,
    'Oslo poursuit une strat\u00e9gie paradoxale. D\u2019un c\u00f4t\u00e9, la Norv\u00e8ge a ouvert un ',h('strong',null,'nombre record de licences d\u2019exploration p\u00e9troli\u00e8re'),' en 2025 via le cycle APA 2025\u00a0: 68 nouveaux blocs en mer de Barents, 57 licences de production attribu\u00e9es \u00e0 19 entreprises en 2026. Les deux champs producteurs arctiques \u2014 ',h('strong',null,'Johan Castberg et Goliat'),' \u2014 sont op\u00e9r\u00e9s par Equinor et V\u00e5r Energi. Le champ ',h('strong',null,'Wisting'),', plus grand gisement arctique non d\u00e9velopp\u00e9 du pays, attend une d\u00e9cision finale d\u2019investissement en 2026 (source\u00a0: ',h('a',{href:'https://oilprice.com/Latest-Energy-News/World-News/Norways-Oil-Industry-Raises-2026-Investment-Forecast.html',target:'_blank',className:'text-[#006650] hover:underline'},'OilPrice'),', ',h('a',{href:'https://worldoil.com/magazine/2026/january/features/regional-report-focus-on-arctic-oil-and-gas-sharpened-during-2025/',target:'_blank',className:'text-[#006650] hover:underline'},'World Oil'),').'
   ),
   h('p',null,
    'De l\u2019autre, Oslo a ',h('strong',null,'gel\u00e9 l\u2019exploration mini\u00e8re en eaux profondes'),' jusqu\u2019\u00e0 2029 au moins, signalant une approche de pr\u00e9caution sur les ressources sous-marines. La ferm\u00e9ture de la Mine 7 au Svalbard en 2023 a mis fin \u00e0 la production charbon\u00e8re norv\u00e9gienne dans l\u2019archipel (source\u00a0: ',h('a',{href:'https://bellona.org/news/arctic/2025-04-norway-opens-new-arctic-oil-fields-named-after-sea-ice-phenomenon-that-the-very-same-oil-will-contribute-to-melting',target:'_blank',className:'text-[#006650] hover:underline'},'Bellona'),').'
   ),

   h('h3',null,'Le Canada\u00a0: le passage du Nord-Ouest en question'),
   h('p',null,
    'Le Canada maintient que le passage du Nord-Ouest rel\u00e8ve de ses ',h('strong',null,'eaux int\u00e9rieures historiques'),', une position contest\u00e9e par Washington qui le consid\u00e8re comme un ',h('strong',null,'d\u00e9troit international'),' ouvert au transit libre. La fonte acc\u00e9l\u00e9r\u00e9e des glaces rend ce diff\u00e9rend juridique de plus en plus concret\u00a0: chaque ann\u00e9e, la fen\u00eatre navigable s\u2019\u00e9largit. Les Inuit, via l\u2019ICC Canada, d\u00e9fendent leurs droits souverains sur ces eaux en invoquant la D\u00e9claration des Nations Unies sur les droits des peuples autochtones (source\u00a0: ',h('a',{href:'https://www.belfercenter.org/research-analysis/explainer-northwest-passages-shipping-potential-legal-status-and-whats-stake',target:'_blank',className:'text-[#006650] hover:underline'},'Belfer Center'),').'
   ),
   h('p',null,
    'En 2025, les garde-c\u00f4tes am\u00e9ricains ont ',h('strong',null,'suivi deux navires de recherche chinois'),' op\u00e9rant dans les eaux internationales au large de l\u2019Alaska \u2014 un signal de la pr\u00e9sence croissante de P\u00e9kin dans la r\u00e9gion.'
   ),

   h('h3',null,'La Chine\u00a0: le \u00ab\u00a0near-Arctic state\u00a0\u00bb'),
   h('p',null,
    'P\u00e9kin se pr\u00e9sente comme un \u00ab\u00a0\u00c9tat quasi-arctique\u00a0\u00bb depuis son Livre blanc de 2018, d\u00e9ployant la ',h('strong',null,'Route de la Soie polaire'),' comme extension du BRI. Outre le d\u00e9veloppement conjoint de la NSR avec la Russie, la Chine investit dans les ',h('strong',null,'infrastructures num\u00e9riques arctiques'),' \u2014 satellites et c\u00e2bles sous-marins \u2014 pour \u00e9tendre son empreinte technologique dans la r\u00e9gion. Les compagnies maritimes NewNew Shipping et Sea Legend Shipping ont effectu\u00e9 ',h('strong',null,'14 voyages record'),' de conteneurs via l\u2019Arctique en 2025, avec des plans d\u2019expansion pour 2026 (source\u00a0: ',h('a',{href:'https://gcaptain.com/china-expands-arctic-container-shipping-with-record-14-voyages-in-2025/',target:'_blank',className:'text-[#006650] hover:underline'},'gCaptain'),', ',h('a',{href:'https://www.thearcticinstitute.org/chinas-digital-footprint-arctic-strategic-role-satellite-subsea-cable-infrastructure/',target:'_blank',className:'text-[#006650] hover:underline'},'The Arctic Institute'),').'
   ),
   h('p',null,
    'Cependant, le bilan de la Route de la Soie polaire reste mitig\u00e9. Plusieurs projets d\u2019investissement chinois ont \u00e9chou\u00e9 \u2014 notamment un corridor arctique via la Norv\u00e8ge, la Finlande et l\u2019Estonie, abandonn\u00e9 face aux r\u00e9sistances locales. La strat\u00e9gie chinoise s\u2019apparente davantage \u00e0 un ',h('strong',null,'jeu de long terme'),' qu\u2019\u00e0 une percée imm\u00e9diate (source\u00a0: ',h('a',{href:'https://www.rand.org/pubs/commentary/2025/02/is-the-polar-silk-road-a-highway-or-is-it-at-an-impasse.html',target:'_blank',className:'text-[#006650] hover:underline'},'RAND'),', ',h('a',{href:'https://www.thearcticinstitute.org/china-polar-silk-road-long-game-failed-strategy/',target:'_blank',className:'text-[#006650] hover:underline'},'The Arctic Institute'),').'
   ),

   // VI. Conseil de l'Arctique et coopération
   h('h2',null,'VI. Le Conseil de l\u2019Arctique\u00a0: une coop\u00e9ration en sursis'),
   h('p',null,
    'Le Conseil de l\u2019Arctique, cr\u00e9\u00e9 en 1996 comme \u00ab\u00a0forum intergouvernemental de r\u00e9f\u00e9rence pour la coop\u00e9ration arctique\u00a0\u00bb, traverse sa pire crise existentielle. L\u2019invasion russe de l\u2019Ukraine en f\u00e9vrier 2022 a provoqu\u00e9 un ',h('strong',null,'gel des activit\u00e9s'),' par les sept autres membres. Environ ',h('strong',null,'70 projets sur 140'),' des groupes de travail ont \u00e9t\u00e9 repris sans participation russe \u00e0 partir de juin 2022 (source\u00a0: ',h('a',{href:'https://www.belfercenter.org/research-analysis/revitalizing-arctic-council',target:'_blank',className:'text-[#006650] hover:underline'},'Belfer Center'),').'
   ),
   h('p',null,
