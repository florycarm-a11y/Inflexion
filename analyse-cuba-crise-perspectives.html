     h('p',{className:'text-[15px] text-[#1A1F2E] leading-relaxed'},

   h('h2',null,'I. Diagnostic : une crise multidimensionnelle'),

   h('h3',null,'L\u2019\u00e9tranglement \u00e9nerg\u00e9tique'),
   h('p',null,
    'Le 4 mars 2026, Cuba a enregistr\u00e9 un d\u00e9ficit \u00e9lectrique de ',h('strong',null,'2\u00a0025 MW'),', le plus \u00e9lev\u00e9 depuis 2022, affectant ',h('strong',null,'64\u00a0% du territoire national'),' (source\u00a0: CiberCuba, Al Jazeera). Avant m\u00eame la panne de Guiteras, le r\u00e9seau ne g\u00e9n\u00e9rait que ',h('strong',null,'1\u00a0180 MW pour une demande de 2\u00a0250 MW'),' \u2014 un d\u00e9ficit structurel de plus de 1\u00a0000 MW. C\u2019est le cinqui\u00e8me blackout national en dix-huit mois. La panne de la centrale thermique Antonio Guiteras a plong\u00e9 l\u2019ouest de l\u2019\u00eele dans l\u2019obscurit\u00e9 pendant plusieurs jours \u2014 la r\u00e9paration, achev\u00e9e le 7 mars, a permis une reprise partielle (source\u00a0: Al Jazeera). Les coupures, qui atteignaient d\u00e9j\u00e0 12 \u00e0 14 heures quotidiennes fin 2025, d\u00e9passent d\u00e9sormais ',h('strong',null,'20 heures par jour'),' dans plusieurs provinces.'
   ),
   h('p',null,
    'L\u2019origine est structurelle. Le parc de centrales thermiques cubain, h\u00e9rit\u00e9 de l\u2019\u00e8re sovi\u00e9tique, fonctionne avec un taux de panne chronique. Mais le facteur d\u00e9clencheur de 2026 est le ',h('strong',null,'tarissement des approvisionnements p\u00e9troliers'),'. L\u2019intervention am\u00e9ricaine au Venezuela a coup\u00e9 la principale source d\u2019importation de brut cubain. Le Mexique a cess\u00e9 ses livraisons sous pression de Washington. En f\u00e9vrier 2026, Cuba a suspendu le ravitaillement en k\u00e9ros\u00e8ne de ses a\u00e9roports \u2014 Air France annonce la suspension de ses vols vers La Havane \u00e0 compter du 29 mars (source\u00a0: Le Figaro, France 24).'

   h('p',null,

   ),
   h('p',null,
    'Le tourisme, pilier \u00e9conomique de l\u2019\u00eele, s\u2019est effondr\u00e9. Les h\u00f4tels ferment, les \u00e9v\u00e9nements culturels sont annul\u00e9s, et l\u2019absence de k\u00e9ros\u00e8ne coupe physiquement Cuba du reste du monde. Les secteurs nickel, tabac et sucre sont paralys\u00e9s par les p\u00e9nuries d\u2019\u00e9nergie et de transport. Un carton de trente \u0153ufs co\u00fbte d\u00e9sormais plus de 3\u00a0000 CUP \u2014 pr\u00e8s de la moiti\u00e9 du salaire moyen mensuel d\u2019\u00c9tat (6\u00a0500 CUP, soit moins de 13 dollars). Cuba n\u2019\u00e9tant pas membre du FMI, aucun programme de sauvetage multilat\u00e9ral n\u2019est envisageable.'
