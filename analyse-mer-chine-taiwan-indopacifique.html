   h('h2',null,'Th\u00e8se centrale'),
   h('p',null,
    'La mer de Chine m\u00e9ridionale n\u2019est plus un \u00ab\u00a0point chaud\u00a0\u00bb parmi d\u2019autres \u2014 c\u2019est le ',h('strong',null,'nexus strat\u00e9gique du XXIe si\u00e8cle'),', o\u00f9 convergent trois dynamiques d\u00e9stabilisantes\u00a0: une escalade militaire conventionnelle (PLA), une guerre informationnelle et cyber sans pr\u00e9c\u00e9dent (dimension I \u00e0 6,9/7), et une d\u00e9pendance technologique mondiale concentr\u00e9e sur un seul point de d\u00e9faillance \u2014 Ta\u00efwan. Cette convergence cr\u00e9e un ',h('strong',null,'risque de d\u00e9corr\u00e9lation strat\u00e9gique'),'\u00a0: les acteurs \u00e9conomiques continuent d\u2019op\u00e9rer comme si le statu quo \u00e9tait garanti, alors que les signaux militaires, cyber et informationnels indiquent une fen\u00eatre de risque critique entre 2026 et 2028.'
   ),
   h('p',null,
    'Pour les d\u00e9cideurs europ\u00e9ens et fran\u00e7ais, la question n\u2019est pas de savoir ',h('em',null,'si'),' un conflit en mer de Chine les affectera, mais ',h('strong',null,'par quel canal et \u00e0 quelle vitesse'),'. Semi-conducteurs, routes maritimes, cha\u00eenes d\u2019approvisionnement IA, alliances de d\u00e9fense\u00a0: chaque dimension de cette crise touche directement l\u2019\u00e9conomie fran\u00e7aise.'
   ),

   // Partie I
   h('h2',null,'I. Tensions militaires\u00a0: la zone grise permanente'),

   h('h3',null,'Les exercices PLA\u00a0: mont\u00e9e en puissance'),
   h('p',null,
    'L\u2019Arm\u00e9e populaire de lib\u00e9ration (PLA) a conduit ',h('strong',null,'quatre exercices majeurs autour de Ta\u00efwan en 2024'),' \u2014 Joint Sword 2024A (mai), Joint Sword 2024B (octobre), et deux exercices non nomm\u00e9s en mars et d\u00e9cembre. Chacun a impliqu\u00e9 des ',h('strong',null,'simulations de blocus naval et a\u00e9rien'),' de l\u2019\u00eele, avec des trajectoires de missiles balistiques survolant le d\u00e9troit de Ta\u00efwan. Le nombre de violations de la ligne m\u00e9diane du d\u00e9troit est pass\u00e9 de z\u00e9ro (avant ao\u00fbt 2022) \u00e0 plus de ',h('strong',null,'1\u00a0800 incursions document\u00e9es en 2024'),' (source\u00a0: minist\u00e8re de la D\u00e9fense ta\u00efwanais, CSIS).'
   ),
   h('p',null,
    'La militarisation des r\u00e9cifs se poursuit\u00a0: sept \u00eelots artificiels dans les Spratly sont d\u00e9sormais \u00e9quip\u00e9s de ',h('strong',null,'pistes d\u2019atterrissage, syst\u00e8mes de missiles anti-navires HQ-9B et radars OTH'),'. Mischief Reef, Subi Reef et Fiery Cross disposent de capacit\u00e9s de commandement int\u00e9gr\u00e9es. Le SIPRI estime que la Chine a augment\u00e9 ses d\u00e9penses navales de ',h('strong',null,'12\u00a0% en 2024'),', portant la flotte de la PLAN \u00e0 ',h('strong',null,'370 navires de combat'),' \u2014 la plus grande marine du monde en nombre (source\u00a0: IISS Military Balance 2025, SIPRI).'
   ),

   h('h3',null,'Zone grise et coercition quotidienne'),
   h('p',null,
    'Au-del\u00e0 des exercices, la PLA et les milices maritimes chinoises m\u00e8nent une ',h('strong',null,'campagne de zone grise permanente'),'. Les garde-c\u00f4tes chinois (CCG) ont d\u00e9ploy\u00e9 le ',h('em',null,'Monster'),', le plus grand navire garde-c\u00f4tes du monde (12\u00a0000 tonnes), au Second Thomas Shoal, o\u00f9 les forces philippines maintiennent un d\u00e9tachement sur le BRP Sierra Madre \u00e9chou\u00e9. Les incidents de water cannon, laser \u00e9blouissant et collision d\u00e9lib\u00e9r\u00e9e se sont multipli\u00e9s\u00a0: ',h('strong',null,'47 incidents document\u00e9s en 2024'),' contre les Philippines seules (source\u00a0: CSIS AMTI, Nikkei Asia).'
   ),
   h('p',null,
    'Les violations de la zone d\u2019identification a\u00e9rienne (ADIZ) ta\u00efwanaise sont devenues quotidiennes. En moyenne, ',h('strong',null,'12 a\u00e9ronefs militaires chinois'),' p\u00e9n\u00e8trent l\u2019ADIZ chaque jour, for\u00e7ant Ta\u00efwan \u00e0 d\u00e9ployer ses chasseurs F-16V \u2014 une strat\u00e9gie d\u2019\u00e9puisement qui co\u00fbte \u00e0 Taipei un surcro\u00eet estim\u00e9 \u00e0 ',h('strong',null,'900 millions de dollars par an'),' en maintenance a\u00e9ronautique (source\u00a0: RAND Corporation, Atlantic Council).'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Risque critique \u2014 Fen\u00eatre 2026-2028'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'L\u2019amiral Philip Davidson (ancien commandant de l\u2019INDOPACOM) a estim\u00e9 que la Chine pourrait tenter une action de force sur Ta\u00efwan ',h('strong',null,'\u00ab\u00a0d\u2019ici 2027\u00a0\u00bb'),' \u2014 la \u00ab\u00a0Davidson Window\u00a0\u00bb. Les indicateurs actuels (acc\u00e9l\u00e9ration de la production navale, entra\u00eenement amphibie, exercices de blocus) sont coh\u00e9rents avec cette \u00e9ch\u00e9ance. Le 20e Congr\u00e8s du PCC a confirm\u00e9 la \u00ab\u00a0r\u00e9unification\u00a0\u00bb comme objectif strat\u00e9gique non n\u00e9gociable.'
    )
   ),

   // Partie II
   h('h2',null,'II. Guerre informationnelle et cyber\u00a0: la dimension invisible'),

   h('h3',null,'Volt Typhoon et Salt Typhoon\u00a0: pr\u00e9-positionnement strat\u00e9gique'),
   h('p',null,
    'Les r\u00e9v\u00e9lations de 2024-2025 sur les groupes ',h('strong',null,'Volt Typhoon'),' et ',h('strong',null,'Salt Typhoon'),' ont transform\u00e9 la compr\u00e9hension de la menace cyber chinoise. Volt Typhoon, attribu\u00e9 au PLA par le FBI, la NSA et les Five Eyes, a ',h('strong',null,'p\u00e9n\u00e9tr\u00e9 les r\u00e9seaux d\u2019infrastructures critiques am\u00e9ricaines'),' \u2014 r\u00e9seaux \u00e9lectriques, syst\u00e8mes hydrauliques, t\u00e9l\u00e9communications, ports \u2014 non pas pour espionner, mais pour ',h('strong',null,'\u00ab\u00a0pr\u00e9-positionner\u00a0\u00bb des capacit\u00e9s de sabotage'),' activables en cas de conflit (source\u00a0: CISA, Microsoft Threat Intelligence, FBI Director Wray testimony).'
   ),
   h('p',null,
    'Salt Typhoon a cibl\u00e9 directement les ',h('strong',null,'op\u00e9rateurs t\u00e9l\u00e9coms am\u00e9ricains'),' \u2014 AT&T, Verizon, T-Mobile \u2014 acc\u00e9dant aux m\u00e9tadonn\u00e9es d\u2019appels de hauts responsables gouvernementaux et, dans certains cas, au contenu des communications. Le directeur du FBI Christopher Wray a qualifi\u00e9 Volt Typhoon de ',h('strong',null,'\u00ab\u00a0menace d\u00e9terminante de notre \u00e9poque\u00a0\u00bb'),'. La dimension C (Cyber) de notre \u00e9valuation SEMPLICE atteint 5,0/7, et la dimension I (Information) culmine \u00e0 ',h('strong',null,'6,9/7 \u2014 le score le plus \u00e9lev\u00e9 de toutes nos \u00e9valuations'),' (source\u00a0: Brookings, Atlantic Council Cyber Statecraft Initiative).'
   ),

   h('h3',null,'Guerre cognitive et d\u00e9sinformation'),
   h('p',null,
    'Parall\u00e8lement aux op\u00e9rations cyber, P\u00e9kin m\u00e8ne une campagne de ',h('strong',null,'guerre cognitive (cognitive warfare)'),' visant \u00e0 \u00e9roder la volont\u00e9 de r\u00e9sistance ta\u00efwanaise et la cr\u00e9dibilit\u00e9 des engagements am\u00e9ricains. Les op\u00e9rations incluent\u00a0: amplification de contenus s\u00e9paratistes ta\u00efwanais, deepfakes ciblant des responsables politiques, campagnes de d\u00e9sinformation sur les r\u00e9seaux sociaux (TikTok, Weibo, Twitter/X), et infiltration de m\u00e9dias en mandarin. Le Digital Forensic Research Lab (DFRLab) de l\u2019Atlantic Council a document\u00e9 ',h('strong',null,'plus de 4\u00a0600 comptes coordonn\u00e9s'),' ciblant Ta\u00efwan en 2024 (source\u00a0: DFRLab, RAND).'
   ),
   h('p',null,
    'Cette dimension informationnelle est particuli\u00e8rement dangereuse car elle op\u00e8re en dessous du seuil de r\u00e9ponse militaire. La \u00ab\u00a0l\u00e9galit\u00e9 grise\u00a0\u00bb des op\u00e9rations d\u2019influence rend toute attribution et riposte probl\u00e9matiques. L\u2019objectif strat\u00e9gique est clair\u00a0: ',h('strong',null,'cr\u00e9er les conditions d\u2019un fait accompli'),', o\u00f9 la communaut\u00e9 internationale juge qu\u2019une intervention est trop co\u00fbteuse ou trop tardive.'
   ),

   h('div',{className:'insight-box not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#006650] mb-2'},'Signal SEMPLICE \u2014 Dimension I : 6,9/7'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'La dimension Information atteint un score in\u00e9dit dans notre cadre d\u2019\u00e9valuation. Elle traduit la ',h('strong',null,'convergence sans pr\u00e9c\u00e9dent de la guerre informationnelle, du pr\u00e9-positionnement cyber et de la manipulation cognitive'),'. Ce score est sup\u00e9rieur \u00e0 celui de l\u2019Ukraine pr\u00e9-invasion (I\u00a0: 5,8/7 en d\u00e9cembre 2021). Les indicateurs I11 (warfare informationnel) et I12 (manipulation narrative) sont en zone rouge.'
    )
   ),

   // Partie III
   h('h2',null,'III. L\u2019enjeu semi-conducteurs\u00a0: le talon d\u2019Achille mondial'),

   h('h3',null,'TSMC\u00a0: 92\u00a0% des puces avanc\u00e9es'),
   h('p',null,
    'Taiwan Semiconductor Manufacturing Company (TSMC) produit ',h('strong',null,'92\u00a0% des semi-conducteurs les plus avanc\u00e9s au monde'),' (noeuds inf\u00e9rieurs \u00e0 7 nm). Ce monopole de fait est sans \u00e9quivalent dans l\u2019histoire \u00e9conomique moderne\u00a0: aucun autre secteur ne d\u00e9pend \u00e0 ce point d\u2019un seul fabricant, situ\u00e9 dans une zone \u00e0 risque g\u00e9opolitique maximal. Les puces TSMC sont pr\u00e9sentes dans ',h('strong',null,'chaque iPhone, chaque data center IA, chaque syst\u00e8me d\u2019armes avanc\u00e9'),' occidental (source\u00a0: SIA, CSIS, Brookings).'
   ),
   h('p',null,
    'Les revenus de TSMC ont atteint ',h('strong',null,'87,1 milliards de dollars en 2024'),' (+33\u00a0%), tir\u00e9s par la demande en puces IA (Nvidia, Apple, AMD). L\u2019entreprise investit ',h('strong',null,'32 milliards de dollars en CapEx pour 2025'),', principalement dans les noeuds 3 nm et 2 nm. La technologie N2 (pr\u00e9vue pour 2025-2026) utilisera des transistors gate-all-around (GAA), renfor\u00e7ant l\u2019avance technologique de TSMC sur Samsung et Intel (source\u00a0: TSMC earnings reports, Nikkei Asia).'
   ),

   h('h3',null,'CHIPS Act et reshoring\u00a0: la diversification en marche'),
   h('p',null,
    'Face \u00e0 cette concentration des risques, les \u00c9tats-Unis ont adopt\u00e9 le ',h('strong',null,'CHIPS and Science Act'),' (52,7 milliards de dollars), et l\u2019UE le ',h('strong',null,'European Chips Act'),' (43 milliards d\u2019euros). TSMC construit actuellement ',h('strong',null,'trois usines en Arizona'),' (investissement total\u00a0: 65 milliards de dollars), dont la premi\u00e8re (Fab 21, noeud 4 nm) doit entrer en production courant 2025. Le Japon accueille une usine TSMC \u00e0 Kumamoto (noeud 12/28 nm, op\u00e9rationnelle depuis f\u00e9vrier 2024), et l\u2019Allemagne une fab TSMC \u00e0 Dresde avec Bosch et Infineon (source\u00a0: SIA, European Commission, Nikkei Asia).'
   ),
   h('p',null,
    'Cependant, ces efforts de reshoring ne r\u00e9duiront pas la d\u00e9pendance \u00e0 court terme. Les usines am\u00e9ricaines de TSMC produiront des noeuds ',h('strong',null,'N4 et N3'),' \u2014 mais le noeud N2 le plus avanc\u00e9 restera \u00e0 Ta\u00efwan. La mont\u00e9e en cadence prend ',h('strong',null,'3 \u00e0 5 ans'),'. Samsung Foundry et Intel Foundry Services restent en retard de 12 \u00e0 18 mois. En cas de conflit, le ',h('strong',null,'d\u00e9troit de Ta\u00efwan \u2014 par lequel transitent 88\u00a0% des plus grands porte-conteneurs mondiaux'),' \u2014 serait le premier chokepoint coup\u00e9 (source\u00a0: RAND, Bloomberg).'
   ),

   h('div',{className:'insight-box alert not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#DC2626] mb-2'},'Vuln\u00e9rabilit\u00e9 critique \u2014 Supply chain semi-conducteurs'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Une perturbation de la production TSMC \u00e0 Ta\u00efwan \u2014 m\u00eame temporaire (30 jours) \u2014 provoquerait une ',h('strong',null,'perte de PIB mondial estim\u00e9e entre 600 milliards et 1\u00a0000 milliards de dollars'),' (RAND). L\u2019arr\u00eat complet co\u00fbterait ',h('strong',null,'jusqu\u2019\u00e0 3\u00a0400 milliards de dollars'),' la premi\u00e8re ann\u00e9e (Rhodium Group). Pour comparaison, la pand\u00e9mie COVID a co\u00fbt\u00e9 environ 2\u00a0000 milliards en 2020.'
    )
   ),

   // Partie IV
   h('h2',null,'IV. La dimension opportunit\u00e9\u00a0: un \u00e9cosyst\u00e8me \u00e0 18\u00a0000 milliards'),

   h('h3',null,'Le dynamisme r\u00e9gional'),
   h('p',null,
    'Malgr\u00e9 les risques, la r\u00e9gion Indo-Pacifique reste le ',h('strong',null,'moteur de la croissance mondiale'),'. Le PIB combin\u00e9 des \u00e9conomies riveraines de la mer de Chine m\u00e9ridionale d\u00e9passe ',h('strong',null,'18\u00a0000 milliards de dollars'),'. L\u2019ASEAN affiche une croissance de ',h('strong',null,'4,7\u00a0% en 2024'),', port\u00e9e par le Vietnam (6,5\u00a0%), les Philippines (5,8\u00a0%) et l\u2019Indon\u00e9sie (5,1\u00a0%). Ces \u00e9conomies captent les b\u00e9n\u00e9fices du ',h('strong',null,'\u00ab\u00a0China+1\u00a0\u00bb'),', la strat\u00e9gie de diversification des multinationales hors de Chine (source\u00a0: Banque mondiale, ASEAN Secretariat, McKinsey).'
   ),
   h('p',null,
    'Le score d\u2019opportunit\u00e9 SEMPLICE de ',h('strong',null,'5,4/7 (Tr\u00e8s \u00e9lev\u00e9)'),' refl\u00e8te plusieurs dynamiques positives\u00a0: innovation technologique (dimension I opportunit\u00e9\u00a0: 6,2/7), croissance \u00e9conomique soutenue (E\u00a0: 5,9/7), maturit\u00e9 tech \u00e9lev\u00e9e (C\u00a0: 5,9/7), et capital humain en progression (S\u00a0: 5,0/7). La r\u00e9gion concentre ',h('strong',null,'60\u00a0% de la R&D mondiale en semi-conducteurs'),', 45\u00a0% des brevets IA, et h\u00e9berge les si\u00e8ges de TSMC, Samsung, ASML (Pays-Bas, mais \u00e9cosyst\u00e8me client en Asie) et Tokyo Electron.'
   ),

   h('h3',null,'Corridors commerciaux et RCEP'),
   h('p',null,
    'Le Regional Comprehensive Economic Partnership (RCEP), entr\u00e9 en vigueur en 2022, cr\u00e9e la ',h('strong',null,'plus grande zone de libre-\u00e9change au monde'),' (15 pays, 30\u00a0% du PIB mondial). L\u2019accord r\u00e9duit les barri\u00e8res tarifaires sur les composants \u00e9lectroniques, les mati\u00e8res premi\u00e8res et les biens interm\u00e9diaires, renfor\u00e7ant les cha\u00eenes de valeur r\u00e9gionales. Les \u00e9changes intrar\u00e9gionaux ont augment\u00e9 de ',h('strong',null,'8,3\u00a0% en 2024'),' (source\u00a0: UNCTAD, RCEP Secretariat).'
   ),
   h('p',null,
    'Pour les entreprises fran\u00e7aises, la r\u00e9gion offre des opportunit\u00e9s dans le ',h('strong',null,'luxe'),' (LVMH, Herm\u00e8s \u2014 march\u00e9 ASEAN en croissance de 12\u00a0%/an), l\u2019',h('strong',null,'a\u00e9ronautique'),' (Airbus \u2014 42\u00a0% des commandes mondiales proviennent d\u2019Asie-Pacifique), l\u2019',h('strong',null,'\u00e9nergie'),' (TotalEnergies, EDF \u2014 LNG et renouvelables), et la ',h('strong',null,'d\u00e9fense'),' (Naval Group \u2014 sous-marins, corvettes). Le FDI fran\u00e7ais en ASEAN a augment\u00e9 de ',h('strong',null,'18\u00a0% en 2024'),' (source\u00a0: Business France, BPI France).'
   ),

   h('div',{className:'insight-box gold not-prose'},
    h('div',{className:'text-[11px] font-semibold uppercase tracking-wider text-[#9A7506] mb-2'},'Signal opportunit\u00e9 \u2014 Corridor tech ASEAN'),
    h('p',{className:'text-sm text-[#3A3A3A] leading-relaxed'},
     'Le Vietnam, Singapour et la Malaisie captent une part croissante du ',h('strong',null,'reshoring semi-conducteurs'),'. Intel investit 7 milliards en Malaisie (packaging), Samsung 4,2 milliards au Vietnam (m\u00e9moire NAND). Pour les entreprises fran\u00e7aises du secteur \u00e9lectronique et IA, le \u00ab\u00a0triangle des puces\u00a0\u00bb ASEAN est une alternative cr\u00e9dible \u00e0 la concentration ta\u00efwanaise.'
    )
   ),

   // Partie V
   h('h2',null,'V. Impact pour les d\u00e9cideurs fran\u00e7ais'),

   h('h3',null,'AUKUS et l\u2019Indo-Pacifique fran\u00e7ais'),
   h('p',null,
    'L\u2019alliance AUKUS (Australie, Royaume-Uni, \u00c9tats-Unis) restructure l\u2019architecture de s\u00e9curit\u00e9 Indo-Pacifique. Le Pilier I (sous-marins nucl\u00e9aires australiens) affecte directement ',h('strong',null,'Naval Group'),', qui a perdu le contrat des sous-marins australiens en 2021 (56 milliards d\u2019euros). Le Pilier II (technologies avanc\u00e9es\u00a0: hypersoniques, IA, cyber, guerre \u00e9lectronique) cr\u00e9e un ',h('strong',null,'club technologique anglo-saxon'),' dont la France est exclue, malgr\u00e9 ses capacit\u00e9s dans chacun de ces domaines (source\u00a0: IISS, Brookings).'
   ),
   h('p',null,
    'La France dispose pourtant d\u2019une ',h('strong',null,'pr\u00e9sence souveraine unique en Indo-Pacifique'),'\u00a0: 1,6 million de ressortissants, 7\u00a0000 militaires (FANC en Nouvelle-Cal\u00e9donie, FAPF en Polyn\u00e9sie, FAZSOI \u00e0 La R\u00e9union), la deuxi\u00e8me ZEE mondiale (11 millions de km\u00b2, dont 62\u00a0% en Indo-Pacifique). La strat\u00e9gie fran\u00e7aise Indo-Pacifique (2019, actualis\u00e9e 2023) insiste sur un \u00ab\u00a0troisi\u00e8me voie\u00a0\u00bb entre Washington et P\u00e9kin \u2014 mais la marge de manoeuvre se r\u00e9duit (source\u00a0: minist\u00e8re des Arm\u00e9es, Quai d\u2019Orsay).'
   ),

   h('h3',null,'D\u00e9fense navale et projection'),
   h('p',null,
    'La Marine nationale d\u00e9ploie r\u00e9guli\u00e8rement des b\u00e2timents en mer de Chine m\u00e9ridionale, dont la fr\u00e9gate ',h('em',null,'Lorraine'),' (FREMM DA) en 2024 et le PHA ',h('em',null,'Tonnerre'),' dans le cadre de la mission Jeanne d\u2019Arc. Ces d\u00e9ploiements affirment la libert\u00e9 de navigation (FONOP) face aux revendications chinoises. Naval Group n\u00e9gocie des contrats de ',h('strong',null,'corvettes avec les Philippines et l\u2019Indon\u00e9sie'),', et poursuit le programme Barracuda avec l\u2019Australie (version conventionnelle pour les partenaires r\u00e9gionaux). Le march\u00e9 naval Indo-Pacifique repr\u00e9sente ',h('strong',null,'120 milliards de dollars d\u2019acquisitions pr\u00e9vues d\u2019ici 2030'),' (source\u00a0: Jane\u2019s, Naval Group, minist\u00e8re des Arm\u00e9es).'
   ),

   h('h3',null,'Supply chain semi-conducteurs et puces IA'),
   h('p',null,
    'La France h\u00e9berge STMicroelectronics (franco-italienne, leader mondial en capteurs et semi-conducteurs automobiles) et Soitec (substrats SOI). ',h('strong',null,'Ni l\u2019un ni l\u2019autre ne produit de puces avanc\u00e9es sub-7 nm'),' \u2014 une d\u00e9pendance directe \u00e0 TSMC et Samsung. Le plan France 2030 alloue ',h('strong',null,'5,5 milliards d\u2019euros au secteur \u00e9lectronique et semi-conducteurs'),', mais le retard structurel sur les noeuds avanc\u00e9s reste de 5 \u00e0 10 ans. L\u2019enjeu imm\u00e9diat est de s\u00e9curiser l\u2019acc\u00e8s aux puces IA (H100/B200 de Nvidia, fabriqu\u00e9es par TSMC) pour les programmes de d\u00e9fense et les clouds souverains (source\u00a0: European Chips Act, France 2030, Cour des comptes).'
   ),

   h('h3',null,'Matrice d\u2019impact sectoriel'),
   h('div',{className:'not-prose my-6 overflow-x-auto'},
    h('table',{className:'w-full text-sm border-collapse'},
     h('thead',null,
      h('tr',{className:'bg-[#F7F8FA]'},
