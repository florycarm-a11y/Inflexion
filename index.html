.mega-item{transition:background .15s ease}

.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

function useInView(opts={}){
const ref=useRef(null)
const[visible,setVisible]=useState(false)
useEffect(()=>{
if(!ref.current)return
const io=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);io.disconnect()}},{threshold:opts.threshold||0.15})
io.observe(ref.current)
return()=>io.disconnect()
},[])
return[ref,visible]
}

function FadeUp({children,className='',delay=0}){
const[ref,visible]=useInView()
return h('div',{ref,className,style:{opacity:visible?1:0,transform:visible?'translateY(0)':'translateY(24px)',transition:`opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`}},children)
}

function decodeEntities(s){if(!s)return s;const t=document.createElement('textarea');t.innerHTML=s;return t.value}

function mapNewsToArticles(newsData){
const articles=[]
let id=1
const catKeys={geopolitics:'geopolitique',markets:'marches',crypto:'crypto',commodities:'matieres',ai_tech:'iatech'}
for(const[apiCat,items] of Object.entries(newsData.categories||{})){
const cat=catKeys[apiCat]||'marches'
for(const item of items){
const title=decodeEntities(item.title)
const readingTime=Math.min(8,Math.max(2,Math.round((item.description||'').length/200)+2))
articles.push({id:id++,cat,title,source:item.source||'',time:item.time||'',readingTime,img:item.image||window.matchImage(title,cat),summary:decodeEntities(item.description||'').slice(0,160),href:item.url||'#'})
}
}
articles.sort((a,b)=>b.id-a.id)
return articles
}

const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/

function NewsletterCTA(){
const[email,setEmail]=useState('')
const[status,setStatus]=useState(null) // null|'sending'|'success'|'duplicate'|'error'|'invalid'
const submit=async(e)=>{
e.preventDefault()
if(!EMAIL_RE.test(email)){setStatus('invalid');return}
setStatus('sending')
try{
const res=await fetch(SUPABASE_URL+'/rest/v1/newsletter',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},body:JSON.stringify({email})})
if(res.ok||res.status===201){setStatus('success');setEmail('')}
else if(res.status===409||(await res.text()).includes('23505')){setStatus('duplicate')}
else{setStatus('error')}
}catch(_){setStatus('error')}
}
const msg={success:'Inscription confirmée — bienvenue parmi nos lecteurs.',duplicate:'Cette adresse est déjà inscrite.',error:'Une erreur est survenue. Réessayez.',invalid:'Veuillez entrer une adresse email valide.'}
const msgColor={success:'text-[#7BE0B0]',duplicate:'text-[#E8C79A]',error:'text-[#F0A090]',invalid:'text-[#F0A090]'}
return h('section',{className:'v2-chrome py-20 md:py-24',style:{backgroundColor:'#17100E'}},
 h('div',{className:'max-w-2xl mx-auto px-4 sm:px-6 text-center'},

  h('p',{className:'text-sm md:text-base text-[#D8B9AE] leading-relaxed mb-8'},'Une sélection hebdomadaire d\'analyses et de données pour garder une longueur d\'avance.'),
  status==='success'?
   h('div',{className:'flex items-center justify-center gap-2 text-[#7BE0B0] text-sm font-medium'},
    h('svg',{width:20,height:20,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round'},h('path',{d:'M20 6L9 17l-5-5'})),
    msg.success
   ):
   h('form',{onSubmit:submit,className:'flex flex-col sm:flex-row gap-3 max-w-md mx-auto'},
    h('input',{type:'email',value:email,onChange:e=>{setEmail(e.target.value);if(status==='invalid')setStatus(null)},placeholder:'votre@email.com','aria-label':'Adresse email',className:`flex-1 px-4 py-3 bg-white/10 border text-white text-sm placeholder-white/40 outline-none transition-colors ${status==='invalid'?'border-[#F0A090]':'border-white/20 focus:border-[#E05A4E]'}`}),
    h('button',{type:'submit',disabled:status==='sending',className:'px-6 py-3 bg-[#E8E4D8] hover:bg-[#FFFFFF] text-[#17100E] font-semibold text-sm transition-colors whitespace-nowrap disabled:opacity-50'},status==='sending'?'Envoi...':'S\'abonner')
   ),
  status&&status!=='success'&&status!=='sending'&&h('p',{className:`mt-4 text-sm ${msgColor[status]}`},msg[status])
 )
)
}
