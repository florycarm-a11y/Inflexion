function useInView(opts={}){
const ref=useRef(null)
const[visible,setVisible]=useState(false)
useEffect(()=>{
if(!ref.current)return
const io=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);io.disconnect()}},{threshold:opts.threshold||0.15})
io.observe(ref.current)
return()=>io.disconnect()
},[])
return[ref,visible]
}

function FadeUp({children,className='',delay=0}){
const[ref,visible]=useInView()
return h('div',{ref,className,style:{opacity:visible?1:0,transform:visible?'translateY(0)':'translateY(24px)',transition:`opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`}},children)
}

const DATA_BASE='data/'

function fmtPrice(p,prefix=''){
if(p>=1000)return prefix+p.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})
return prefix+p.toFixed(2)
}

async function fetchTickerData(){
const[marketsRes,cryptoRes]=await Promise.all([
fetch(DATA_BASE+'markets.json').then(r=>r.ok?r.json():null).catch(()=>null),
fetch(DATA_BASE+'crypto.json').then(r=>r.ok?r.json():null).catch(()=>null)
])
const items=[]
if(marketsRes?.quotes){
for(const q of marketsRes.quotes){
const up=q.change>=0
items.push({symbol:q.name,value:fmtPrice(q.price,q.symbol==='GLD'||q.symbol==='USO'?'$':''),change:(up?'+':'')+q.change.toFixed(2)+'%',up})
}
}
if(cryptoRes?.prices){
for(const c of cryptoRes.prices.slice(0,4)){
const up=c.change_24h>=0
items.push({symbol:c.symbol.toUpperCase(),value:fmtPrice(c.price,'$'),change:(up?'+':'')+c.change_24h.toFixed(2)+'%',up})
}
}
return items.length>0?items:null
}

function mapNewsToArticles(newsData){
const articles=[]
let id=1
const catKeys={geopolitics:'geopolitique',markets:'marches',crypto:'crypto',commodities:'matieres',ai_tech:'iatech'}
for(const[apiCat,items] of Object.entries(newsData.categories||{})){
const cat=catKeys[apiCat]||'marches'
for(const item of items){
const readingTime=Math.min(8,Math.max(2,Math.round((item.description||'').length/200)+2))
articles.push({id:id++,cat,title:item.title,source:item.source||'',time:item.time||'',readingTime,img:item.image||CAT_IMAGES[cat],summary:(item.description||'').slice(0,160),href:item.url||'#'})
}
}
articles.sort((a,b)=>b.id-a.id)
return articles
}

 )
))

const SUPABASE_KEY='sb_publishable_5u8lldvoUdA_pKTZIL9jdA_gJb72SZH'
const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/

function NewsletterCTA(){
const[email,setEmail]=useState('')
const[status,setStatus]=useState(null) // null|'sending'|'success'|'duplicate'|'error'|'invalid'
const submit=async(e)=>{
e.preventDefault()
if(!EMAIL_RE.test(email)){setStatus('invalid');return}
setStatus('sending')
try{
const res=await fetch(SUPABASE_URL+'/rest/v1/newsletter',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},body:JSON.stringify({email})})
if(res.ok||res.status===201){setStatus('success');setEmail('')}
else if(res.status===409||(await res.text()).includes('23505')){setStatus('duplicate')}
else{setStatus('error')}
}catch(_){setStatus('error')}
}
const msg={success:'Inscription confirmée — bienvenue parmi nos lecteurs.',duplicate:'Cette adresse est déjà inscrite.',error:'Une erreur est survenue. Réessayez.',invalid:'Veuillez entrer une adresse email valide.'}
const msgColor={success:'text-[#34D399]',duplicate:'text-yellow-400',error:'text-[#F87171]',invalid:'text-[#F87171]'}
return h(FadeUp,null,h('section',{className:'bg-[#0A1628] py-20'},
 h('div',{className:'max-w-2xl mx-auto px-4 sm:px-6 text-center'},
  h('h2',{className:'text-2xl md:text-3xl font-bold text-white mb-4',style:{fontFamily:'Libre Baskerville, Georgia, serif'}},'Recevez nos signaux faibles chaque semaine'),
  h('p',{className:'text-sm md:text-base text-white/50 leading-relaxed mb-8'},'Une sélection hebdomadaire d\'analyses et de données pour garder une longueur d\'avance.'),
  status==='success'?
   h('div',{className:'flex items-center justify-center gap-2 text-[#34D399] text-sm font-medium'},
    h('svg',{width:20,height:20,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round'},h('path',{d:'M20 6L9 17l-5-5'})),
    msg.success
   ):
   h('form',{onSubmit:submit,className:'flex flex-col sm:flex-row gap-3 max-w-md mx-auto'},
    h('input',{type:'email',value:email,onChange:e=>{setEmail(e.target.value);if(status==='invalid')setStatus(null)},placeholder:'votre@email.com',className:`flex-1 px-4 py-3 rounded-lg bg-white/10 border text-white text-sm placeholder-white/30 outline-none transition-colors ${status==='invalid'?'border-[#F87171]':'border-white/15 focus:border-[#1B6B4A]'}`}),
    h('button',{type:'submit',disabled:status==='sending',className:'px-6 py-3 bg-[#1B6B4A] hover:bg-[#2A9D6E] text-white font-semibold text-sm rounded-lg transition-colors whitespace-nowrap disabled:opacity-50'},status==='sending'?'Envoi...':'S\'abonner')
   ),
  status&&status!=='success'&&status!=='sending'&&h('p',{className:`mt-4 text-sm ${msgColor[status]}`},msg[status])
 )
))
}

function App(){
const[dark,setDark]=useState(false)
const toggleDark=()=>setDark(d=>!d)
useEffect(()=>{document.body.style.backgroundColor=dark?'#0A1628':'#FFFFFF'},[dark])
return h('div',{className:`pb-16 transition-colors duration-300 ${dark?'bg-[#0A1628] text-white':'bg-white text-[#1A1F2E]'}`},
 h(Navigation,{dark,toggleDark}),
 h(Hero),
 h(CredibilityStrip,{dark}),
 h(ArticlesGrid,{dark}),
 h(ExpertiseNav,{dark}),
 h(NewsletterCTA),
 h(Footer,{dark}),
 h(MarketTicker)
)
}

createRoot(document.getElementById('app')).render(h(App))
</script>
